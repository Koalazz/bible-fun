<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bible Fun</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; overflow: hidden; }

/* ── THEMES ── */
body.theme-a {
  --bg:       oklch(96% 0.018 78);
  --bg-alt:   oklch(91% 0.022 74);
  --bg-dark:  oklch(16% 0.02 55);
  --fg:       oklch(18% 0.02 55);
  --fg-muted: oklch(50% 0.018 60);
  --accent:   oklch(58% 0.19 46);
  --border:   oklch(84% 0.022 72);
  --card:     oklch(99.5% 0.008 80);
  --tl-bg:    oklch(18% 0.02 55);
  --tl-fg:    oklch(95% 0.012 78);
}
body.theme-b {
  --bg:       oklch(13% 0.018 255);
  --bg-alt:   oklch(18% 0.02 255);
  --bg-dark:  oklch(9% 0.015 255);
  --fg:       oklch(93% 0.012 75);
  --fg-muted: oklch(58% 0.016 70);
  --accent:   oklch(64% 0.19 46);
  --border:   oklch(26% 0.02 255);
  --card:     oklch(18% 0.018 255);
  --tl-bg:    oklch(9% 0.015 255);
  --tl-fg:    oklch(93% 0.012 75);
}
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--fg); }
.chapter-route {
  width: 100vw;
  height: 100vh;
  background: var(--bg-dark);
  overflow: hidden;
}
.chapter-frame {
  display: block;
  width: 100%;
  height: 100%;
  border: 0;
  background: var(--bg-dark);
}

/* ── LAYOUT ── */
.app {
  height: 100vh;
  display: grid;
  grid-template-rows: 50px 1fr;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--bg-dark);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 2px solid var(--accent);
  z-index: 20;
  overflow: hidden;
  white-space: nowrap;
}
.hdr-brand { font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); }
.hdr-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:oklch(95% .012 78); }
.hdr-space { flex:1; }
.theme-btns { display:flex; gap:6px; }
.theme-btn {
  font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase; padding:3px 13px;
  border:1.5px solid oklch(36% .015 255); background:transparent;
  color:oklch(60% .012 70); cursor:pointer; border-radius:2px; transition:all .2s;
}
.theme-btn.active { border-color:var(--accent); background:var(--accent); color:#fff; }

/* ── BODY ── */
.body {
  display: grid;
  grid-template-columns: 240px 1fr;
  overflow: hidden;
}

/* ── BOOK COLUMN (left) ── */
.book-col {
  background: var(--tl-bg);
  color: var(--tl-fg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid oklch(28% .015 255);
}

.book-col-header {
  padding: 14px 18px 12px;
  border-bottom: 1px solid oklch(28% .015 255);
  flex-shrink: 0;
}
.book-col-label {
  font-size: 9px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
  color: var(--accent); margin-bottom:4px;
}
.book-col-title {
  font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800;
  text-transform:uppercase; color:var(--tl-fg); line-height:1.1;
}

.book-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 0;
}
.book-list::-webkit-scrollbar { width:3px; }
.book-list::-webkit-scrollbar-thumb { background:oklch(36% .015 255); border-radius:2px; }

.book-item {
  padding: 14px 18px;
  cursor: pointer;
  border-bottom: 1px solid oklch(24% .012 255);
  transition: background .15s;
  position: relative;
}
.book-item:last-child { border-bottom: none; }
.book-item:hover { background: oklch(22% .015 255 / 0.6); }
.book-item.active { background: oklch(22% .018 255 / 0.85); }
body.theme-a .book-item:hover { background: oklch(22% .015 55 / 0.4); }
body.theme-a .book-item.active { background: oklch(20% .018 55 / 0.75); }

.book-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
}

.book-testament {
  font-size: 9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color: var(--accent); margin-bottom: 3px;
}
.book-name {
  font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800;
  text-transform:uppercase; letter-spacing:.04em; line-height:1.1;
  color: var(--tl-fg); margin-bottom: 2px;
}
.book-subtitle {
  font-family:'Lora',serif; font-style:italic; font-size:11px;
  color: oklch(55% .012 70); margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.book-meta {
  display: flex; gap: 8px; align-items: center;
  font-size: 9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  color: oklch(42% .012 255);
}
.book-meta-avail { color: var(--accent); }
body.theme-a .book-meta { color: oklch(52% .012 55); }

/* ── CHAPTER COLUMN (right) ── */
.chapter-col {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

.chapter-col-header {
  padding: 18px 28px 16px;
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}
body.theme-b .chapter-col-header { border-color: oklch(24% .015 255); }

.ch-testament {
  font-size: 9px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
  color: var(--accent); margin-bottom: 3px;
}
.ch-book-name {
  font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:800;
  text-transform:uppercase; letter-spacing:.04em; line-height:1; color: var(--fg);
}
.ch-book-full {
  font-family:'Lora',serif; font-style:italic; font-size:13px;
  color: var(--fg-muted); margin-top: 3px;
}
.ch-stats {
  font-size: 11px; font-weight:600; letter-spacing:.08em;
  color: var(--fg-muted); white-space:nowrap;
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
}
.ch-stats-avail { color: var(--accent); font-weight:700; }

/* Chapter list */
.chapter-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 0;
}
.chapter-list::-webkit-scrollbar { width:4px; }
.chapter-list::-webkit-scrollbar-thumb { background: var(--border); border-radius:2px; }

/* Each chapter row */
.ch-row {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center;
  gap: 0;
  padding: 0 28px;
  min-height: 60px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  text-decoration: none;
  color: inherit;
}
body.theme-b .ch-row { border-color: oklch(20% .012 255); }
.ch-row:last-child { border-bottom: none; }

.ch-row.available {
  cursor: pointer;
}
.ch-row.available:hover {
  background: oklch(58% .19 46 / .06);
}
.ch-row.unavailable {
  cursor: default;
  opacity: 0.45;
}

.ch-row-num {
  font-family:'Barlow Condensed',sans-serif;
  font-size: 22px; font-weight:800; letter-spacing:.02em;
  color: var(--fg-muted);
  line-height: 1;
}
.ch-row.available .ch-row-num { color: var(--accent); }

.ch-row-body {}
.ch-row-label {
  font-size: 9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color: var(--fg-muted); margin-bottom: 2px;
}
.ch-row.available .ch-row-label { color: oklch(55% .015 46); }
.ch-row-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size: 15px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
  line-height:1.15; color: var(--fg);
}
.ch-row.unavailable .ch-row-title { color: var(--fg-muted); }

.ch-row-action {
  font-size: 10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
}
.ch-row-arrow {
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px; font-weight:800;
  color: var(--accent); opacity:.7;
  transition: opacity .2s, transform .2s;
}
.ch-row.available:hover .ch-row-arrow { opacity: 1; transform: translateX(3px); }
.ch-row-soon {
  font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color: oklch(38% .01 255); background: oklch(22% .01 255 / .6);
  padding: 2px 8px; border-radius:2px;
}
body.theme-a .ch-row-soon { background: oklch(88% .01 70 / .8); color: oklch(55% .01 55); }

/* ── MOBILE ── */
@media (max-width: 680px) {
  html, body, #root { overflow: auto; height: auto; min-height: 100%; }

  .app { height: auto; min-height: 100svh; grid-template-rows: 44px auto; }

  /* Header: tighten up */
  .header { padding: 0 14px; gap: 8px; }
  .hdr-title { display: none; }

  /* Body: single column, book row on top */
  .body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }

  /* Book column: horizontal pill strip */
  .book-col {
    border-right: none;
    border-bottom: 1px solid oklch(24% .012 255);
    height: auto;
    flex-direction: row;
    align-items: center;
    overflow: visible;
  }
  .book-col-header { display: none; }
  .book-list {
    display: flex;
    flex-direction: row;
    padding: 8px 12px;
    gap: 8px;
    overflow-x: auto;
    overflow-y: visible;
    flex: 1;
  }
  .book-list::-webkit-scrollbar { display: none; }

  .book-item {
    flex-shrink: 0;
    padding: 8px 14px;
    border-bottom: none;
    border-radius: 4px;
    border: 1.5px solid oklch(28% .015 255);
  }
  .book-item.active { border-color: var(--accent); }
  .book-item.active::before { display: none; }
  .book-subtitle, .book-meta { display: none; }
  .book-name { font-size: 15px; margin-bottom: 0; }
  .book-testament { font-size: 8px; margin-bottom: 1px; }

  /* Chapter col header: stack vertically, smaller */
  .chapter-col-header {
    padding: 12px 16px;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .ch-book-name { font-size: 22px; }
  .ch-book-full { display: none; }
  .ch-stats { align-items: flex-start; flex-direction: row; gap: 8px; }

  /* Chapter rows: tighter */
  .ch-row { padding: 0 16px; min-height: 52px; grid-template-columns: 44px 1fr auto; }
  .ch-row-num { font-size: 18px; }
  .ch-row-title { font-size: 13px; }
  .ch-row-label { display: none; }
}
</style>
</head>

const { useState, useEffect } = React;

const CHAPTER_001_HTML = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>Acts Chapter 1 — Waiting for the Promise</title>\n<link href=\"https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Barlow:wght@300;400;500;600&display=swap\" rel=\"stylesheet\" />\n<script src=\"https://unpkg.com/react@18.3.1/umd/react.development.js\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"><\/script>\n<script src=\"https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"><\/script>\n<script src=\"https://unpkg.com/@babel/standalone@7.29.0/babel.min.js\" integrity=\"sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y\" crossorigin=\"anonymous\"><\/script>\n<script>\nconst ACTS_CH1 = {\n  \"book\": \"Acts\",\n  \"chapter\": 1,\n  \"chapter_title\": \"Waiting for the Promise\",\n  \"chapter_summary\": \"After his resurrection, Jesus spends forty days with his followers, teaching them about God's kingdom and promising that the Holy Spirit will soon come upon them. He then ascends visibly into the sky from the Mount of Olives, leaving his disciples to return to Jerusalem, where they pray together and choose a twelfth apostle to replace Judas, who had betrayed Jesus and died.\",\n  \"date_range\": {\n    \"approximate\": \"Spring AD 30 (or AD 33)\",\n    \"notes\": \"The crucifixion is dated by most scholars to either AD 30 or AD 33; the Ascension occurs 40 days after Easter, placing it in late April or mid-May.\"\n  },\n  \"persons\": [\n    { \"id\": \"jesus\",               \"name\": \"Jesus\",                      \"role\": \"Risen Lord\",               \"summary\": \"The central figure of the entire book, Jesus appears to his apostles over forty days after his resurrection, giving final instructions before ascending to heaven.\",                                                                              \"color\": \"#E8591A\" },\n    { \"id\": \"peter\",               \"name\": \"Peter\",                      \"role\": \"Apostle, Leader\",           \"summary\": \"The most prominent apostle, Peter takes the lead in the Upper Room by addressing the group about replacing Judas, citing scripture and overseeing the selection.\",                                                                         \"color\": \"#5B8FA8\" },\n    { \"id\": \"the_eleven\",          \"name\": \"The Eleven\",                 \"role\": \"Apostles\",                  \"summary\": \"The eleven remaining apostles witness the Ascension and return to Jerusalem, gathering in the Upper Room to pray and wait for the Holy Spirit.\",                                                                                           \"color\": \"#A09070\" },\n    { \"id\": \"the_women\",           \"name\": \"The Women\",                  \"role\": \"Group — Disciples\",         \"summary\": \"An unnamed group of women who followed Jesus from Galilee join the apostles in constant prayer in the Upper Room, signalling that the early community included both men and women.\",                                                       \"color\": \"#C68B6E\" },\n    { \"id\": \"mary_mother_of_jesus\",\"name\": \"Mary\",                       \"role\": \"Mother of Jesus\",           \"summary\": \"Mary, the mother of Jesus, is explicitly named among those gathered in the Upper Room in prayer — her final appearance in the New Testament narrative.\",                                                                                  \"color\": \"#9B7EB0\" },\n    { \"id\": \"brothers_of_jesus\",   \"name\": \"Brothers of Jesus\",          \"role\": \"Group — Disciples\",         \"summary\": \"Jesus's brothers, previously skeptical during his ministry, appear here as part of the praying community — a change of heart after the resurrection. James will later lead the Jerusalem church.\",                                        \"color\": \"#7A8FA0\" },\n    { \"id\": \"matthias\",            \"name\": \"Matthias\",                   \"role\": \"Apostle (newly chosen)\",    \"summary\": \"Chosen by lot from among the wider group of disciples to fill the vacancy left by Judas and restore the Twelve to their full number.\",                                                                                                  \"color\": \"#6B8F71\" },\n    { \"id\": \"joseph_barsabbas\",    \"name\": \"Joseph Barsabbas\",           \"role\": \"Disciple, candidate\",       \"summary\": \"The other finalist considered to replace Judas alongside Matthias. Though the lot falls to Matthias, his presence shows the broader circle of faithful disciples.\",                                                                       \"color\": \"#7DAA7D\" },\n    { \"id\": \"two_men_in_white\",    \"name\": \"Two Men in White\",           \"role\": \"Angels\",                    \"summary\": \"Two angelic figures appear at the Ascension and redirect the disciples from gazing upward toward the mission ahead — setting the tone for the entire book of Acts.\",                                                                      \"color\": \"#D4C4A0\" },\n    { \"id\": \"judas_iscariot\",      \"name\": \"Judas Iscariot\",             \"role\": \"Betrayer (deceased)\",       \"summary\": \"Judas betrayed Jesus and subsequently died. Peter recounts this story to explain why a replacement apostle is needed.\",                                                                                                                  \"color\": \"#A0746A\" },\n    { \"id\": \"theophilus\",          \"name\": \"Theophilus\",                 \"role\": \"Addressee\",                 \"summary\": \"The book is addressed to Theophilus — the same recipient as Luke's Gospel — framing Acts as a carefully researched sequel for an educated Greek-speaking audience.\",                                                                     \"color\": \"#9A8F80\" }\n  ],\n  \"locations\": [\n    { \"id\": \"jerusalem\",       \"name\": \"Jerusalem\",        \"lat\": 31.7683, \"lng\": 35.2137, \"description\": \"The holy city — both the end-point of Jesus's earthly ministry and the starting point of the apostles' mission to the world.\" },\n    { \"id\": \"mount_of_olives\", \"name\": \"Mount of Olives\",  \"lat\": 31.7781, \"lng\": 35.2458, \"description\": \"A ridge east of Jerusalem across the Kidron Valley — the site of Jesus's Ascension into heaven.\" },\n    { \"id\": \"upper_room\",      \"name\": \"Upper Room\",       \"lat\": 31.7717, \"lng\": 35.2288, \"description\": \"A large upstairs room in Jerusalem where the disciples gathered to pray after the Ascension.\" }\n  ],\n  \"events\": [\n    {\n      \"id\": \"prologue_to_theophilus\",\n      \"sequence\": 1,\n      \"verses\": \"1:1–2\",\n      \"title\": \"Prologue: A Letter to Theophilus\",\n      \"description\": \"The author opens by reminding Theophilus of the first volume — the Gospel of Luke — and establishes Acts as a deliberate continuation of a larger story about Jesus.\",\n      \"location_id\": null,\n      \"persons_present\": [\"theophilus\"],\n      \"timeline_label\": \"Opening Dedication\",\n      \"scroll_anchor\": \"prologue\"\n    },\n    {\n      \"id\": \"forty_days_teaching\",\n      \"sequence\": 2,\n      \"verses\": \"1:3\",\n      \"title\": \"Forty Days of Resurrection Appearances\",\n      \"description\": \"After his death, Jesus appeared alive to his apostles many times over forty days, giving convincing proofs of his resurrection and teaching about the kingdom of God.\",\n      \"location_id\": \"jerusalem\",\n      \"persons_present\": [\"jesus\", \"the_eleven\"],\n      \"timeline_label\": \"Days 1–40\",\n      \"scroll_anchor\": \"forty-days\"\n    },\n    {\n      \"id\": \"promise_of_the_spirit\",\n      \"sequence\": 3,\n      \"verses\": \"1:4–5\",\n      \"title\": \"The Promise of the Holy Spirit\",\n      \"description\": \"While eating with his disciples, Jesus commands them not to leave Jerusalem but to wait for the gift the Father promised — the Holy Spirit, who will come within days.\",\n      \"location_id\": \"jerusalem\",\n      \"persons_present\": [\"jesus\", \"the_eleven\"],\n      \"timeline_label\": \"Day 40 — Final Meal\",\n      \"scroll_anchor\": \"promise\"\n    },\n    {\n      \"id\": \"question_about_the_kingdom\",\n      \"sequence\": 4,\n      \"verses\": \"1:6–8\",\n      \"title\": \"\\\"Will You Restore the Kingdom?\\\"\",\n      \"description\": \"The apostles ask if Jesus will restore Israel's kingdom. He redirects them: they will receive power when the Holy Spirit comes, and be his witnesses to Jerusalem, Judea, Samaria, and the ends of the earth.\",\n      \"location_id\": \"jerusalem\",\n      \"persons_present\": [\"jesus\", \"the_eleven\"],\n      \"timeline_label\": \"Day 40 — Final Commission\",\n      \"scroll_anchor\": \"kingdom\"\n    },\n    {\n      \"id\": \"ascension\",\n      \"sequence\": 5,\n      \"verses\": \"1:9–11\",\n      \"title\": \"The Ascension of Jesus\",\n      \"description\": \"As the disciples watch, Jesus is taken up and a cloud hides him from sight. Two men in white appear and promise he will return in the same way he departed.\",\n      \"location_id\": \"mount_of_olives\",\n      \"persons_present\": [\"jesus\", \"peter\", \"the_eleven\", \"two_men_in_white\"],\n      \"timeline_label\": \"Day 40 — Ascension\",\n      \"scroll_anchor\": \"ascension\"\n    },\n    {\n      \"id\": \"return_to_jerusalem\",\n      \"sequence\": 6,\n      \"verses\": \"1:12\",\n      \"title\": \"The Walk Back to Jerusalem\",\n      \"description\": \"The eleven apostles walk back from the Mount of Olives — a Sabbath day's walk of roughly 900 metres — obeying Jesus's instruction to stay in Jerusalem.\",\n      \"location_id\": \"jerusalem\",\n      \"persons_present\": [\"peter\", \"the_eleven\"],\n      \"timeline_label\": \"Day 40 — Return\",\n      \"scroll_anchor\": \"return\"\n    },\n    {\n      \"id\": \"upper_room_prayer\",\n      \"sequence\": 7,\n      \"verses\": \"1:13–14\",\n      \"title\": \"The Upper Room: United in Prayer\",\n      \"description\": \"The eleven apostles devote themselves continuously to prayer in the upper room, joined by women who followed Jesus, Mary his mother, and his brothers — about 120 people in all.\",\n      \"location_id\": \"upper_room\",\n      \"persons_present\": [\"peter\", \"the_eleven\", \"the_women\", \"mary_mother_of_jesus\", \"brothers_of_jesus\"],\n      \"timeline_label\": \"Days 40–50 — Prayer\",\n      \"scroll_anchor\": \"upper-room\"\n    },\n    {\n      \"id\": \"peter_addresses_the_community\",\n      \"sequence\": 8,\n      \"verses\": \"1:15–20\",\n      \"title\": \"Peter Speaks: The Fate of Judas\",\n      \"description\": \"Peter stands before the 120 believers and cites two psalms to argue that scripture predicted Judas's betrayal and the need for a replacement, recounting how Judas died and the field became 'Akeldama' — Field of Blood.\",\n      \"location_id\": \"upper_room\",\n      \"persons_present\": [\"peter\", \"the_eleven\", \"the_women\", \"mary_mother_of_jesus\", \"brothers_of_jesus\"],\n      \"timeline_label\": \"Before Pentecost\",\n      \"scroll_anchor\": \"peter-speaks\"\n    },\n    {\n      \"id\": \"selection_of_matthias\",\n      \"sequence\": 9,\n      \"verses\": \"1:21–26\",\n      \"title\": \"Matthias Chosen to Replace Judas\",\n      \"description\": \"Two candidates emerge — Joseph Barsabbas and Matthias. After prayer, the community casts lots; the lot falls to Matthias, who is added to the eleven, restoring the Twelve.\",\n      \"location_id\": \"upper_room\",\n      \"persons_present\": [\"peter\", \"the_eleven\", \"the_women\", \"mary_mother_of_jesus\", \"brothers_of_jesus\", \"matthias\", \"joseph_barsabbas\"],\n      \"timeline_label\": \"Before Pentecost\",\n      \"scroll_anchor\": \"matthias\"\n    }\n  ],\n  \"theological_themes\": [\n    \"The promise and power of the Holy Spirit\",\n    \"Continuity: Acts as the sequel to the Gospel of Luke\",\n    \"Witness: being sent to the ends of the earth\",\n    \"Scriptural fulfillment and the interpretation of the Old Testament\",\n    \"Community, prayer, and shared waiting\",\n    \"Restoration of the Twelve as a symbolic act\"\n  ],\n  \"discussion_questions\": [\n    \"The disciples asked Jesus when he would restore the kingdom. In what ways do people today misunderstand what God's kingdom looks like? How does Jesus's answer redirect their expectations?\",\n    \"The community spent ten days in prayer between the Ascension and Pentecost. What does this waiting period suggest about how God's purposes unfold, and how does it challenge our desire for immediate results?\",\n    \"Peter quotes from the Psalms to make sense of Judas's death and the need for a replacement. What does this tell us about how the early church read their scriptures?\",\n    \"Matthias was chosen by lot after prayer. What does this method of decision-making say about the community's trust in God?\",\n    \"The 'ends of the earth' in Acts 1:8 was a phrase that meant Rome or beyond. What is your personal 'end of the earth' — the place or person farthest from your natural circle that the Spirit might be calling you toward?\"\n  ],\n  \"routes\": [\n    {\n      \"person_id\": \"jesus\",\n      \"label\": \"Jesus\",\n      \"path\": [\n        { \"order\": 1, \"location_id\": \"jerusalem\",       \"event_id\": \"forty_days_teaching\" },\n        { \"order\": 2, \"location_id\": \"jerusalem\",       \"event_id\": \"promise_of_the_spirit\" },\n        { \"order\": 3, \"location_id\": \"mount_of_olives\", \"event_id\": \"ascension\" }\n      ]\n    },\n    {\n      \"person_id\": \"the_eleven\",\n      \"label\": \"The Eleven\",\n      \"path\": [\n        { \"order\": 1, \"location_id\": \"jerusalem\",       \"event_id\": \"forty_days_teaching\" },\n        { \"order\": 2, \"location_id\": \"mount_of_olives\", \"event_id\": \"ascension\" },\n        { \"order\": 3, \"location_id\": \"jerusalem\",       \"event_id\": \"return_to_jerusalem\" },\n        { \"order\": 4, \"location_id\": \"upper_room\",      \"event_id\": \"upper_room_prayer\" }\n      ]\n    },\n    {\n      \"person_id\": \"peter\",\n      \"label\": \"Peter\",\n      \"path\": [\n        { \"order\": 1, \"location_id\": \"mount_of_olives\", \"event_id\": \"ascension\" },\n        { \"order\": 2, \"location_id\": \"jerusalem\",       \"event_id\": \"return_to_jerusalem\" },\n        { \"order\": 3, \"location_id\": \"upper_room\",      \"event_id\": \"upper_room_prayer\" },\n        { \"order\": 4, \"location_id\": \"upper_room\",      \"event_id\": \"peter_addresses_the_community\" },\n        { \"order\": 5, \"location_id\": \"upper_room\",      \"event_id\": \"selection_of_matthias\" }\n      ]\n    },\n    {\n      \"person_id\": \"two_men_in_white\",\n      \"label\": \"Two Angels\",\n      \"path\": [\n        { \"order\": 1, \"location_id\": \"mount_of_olives\", \"event_id\": \"ascension\" }\n      ]\n    },\n    {\n      \"person_id\": \"the_women\",\n      \"label\": \"The Women\",\n      \"path\": [\n        { \"order\": 1, \"location_id\": \"upper_room\", \"event_id\": \"upper_room_prayer\" }\n      ]\n    },\n    {\n      \"person_id\": \"mary_mother_of_jesus\",\n      \"label\": \"Mary\",\n      \"path\": [\n        { \"order\": 1, \"location_id\": \"upper_room\", \"event_id\": \"upper_room_prayer\" }\n      ]\n    },\n    {\n      \"person_id\": \"brothers_of_jesus\",\n      \"label\": \"Brothers\",\n      \"path\": [\n        { \"order\": 1, \"location_id\": \"upper_room\", \"event_id\": \"upper_room_prayer\" }\n      ]\n    },\n    {\n      \"person_id\": \"matthias\",\n      \"label\": \"Matthias\",\n      \"path\": [\n        { \"order\": 1, \"location_id\": \"upper_room\", \"event_id\": \"selection_of_matthias\" }\n      ]\n    },\n    {\n      \"person_id\": \"joseph_barsabbas\",\n      \"label\": \"J. Barsabbas\",\n      \"path\": [\n        { \"order\": 1, \"location_id\": \"upper_room\", \"event_id\": \"selection_of_matthias\" }\n      ]\n    }\n  ],\n  \"timeline\": [\n    { \"event_id\": \"prologue_to_theophilus\",       \"position\": 1, \"label\": \"Dedication\",    \"relative_time\": \"Narrated retrospectively\" },\n    { \"event_id\": \"forty_days_teaching\",          \"position\": 2, \"label\": \"40 Days\",       \"relative_time\": \"Days 1–40 post-resurrection\" },\n    { \"event_id\": \"promise_of_the_spirit\",        \"position\": 3, \"label\": \"Final Meal\",    \"relative_time\": \"Day 40\" },\n    { \"event_id\": \"question_about_the_kingdom\",   \"position\": 4, \"label\": \"Commission\",    \"relative_time\": \"Day 40\" },\n    { \"event_id\": \"ascension\",                    \"position\": 5, \"label\": \"Ascension\",     \"relative_time\": \"Day 40 — Ascension Thursday\" },\n    { \"event_id\": \"return_to_jerusalem\",          \"position\": 6, \"label\": \"Return\",        \"relative_time\": \"Day 40 — afternoon\" },\n    { \"event_id\": \"upper_room_prayer\",            \"position\": 7, \"label\": \"Waiting\",       \"relative_time\": \"Days 40–50\" },\n    { \"event_id\": \"peter_addresses_the_community\",\"position\": 8, \"label\": \"Peter's Speech\",\"relative_time\": \"During the wait\" },\n    { \"event_id\": \"selection_of_matthias\",        \"position\": 9, \"label\": \"Matthias\",      \"relative_time\": \"Before Pentecost\" }\n  ]\n};\n\n<\/script>\n<script type=\"text/babel\">\n\n// tweaks-panel.jsx\n// Reusable Tweaks shell + form-control helpers.\n//\n// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,\n// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so\n// individual prototypes don't re-roll it. Ships a consistent set of controls so you\n// don't hand-draw <input type=\"range\">, segmented radios, steppers, etc.\n//\n// Usage (in an HTML file that loads React + Babel):\n//\n//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n//     \"primaryColor\": \"#D97757\",\n//     \"fontSize\": 16,\n//     \"density\": \"regular\",\n//     \"dark\": false\n//   }/*EDITMODE-END*/;\n//\n//   function App() {\n//     const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);\n//     return (\n//       <div style={{ fontSize: t.fontSize, color: t.primaryColor }}>\n//         Hello\n//         <TweaksPanel>\n//           <TweakSection label=\"Typography\" />\n//           <TweakSlider label=\"Font size\" value={t.fontSize} min={10} max={32} unit=\"px\"\n//                        onChange={(v) => setTweak('fontSize', v)} />\n//           <TweakRadio  label=\"Density\" value={t.density}\n//                        options={['compact', 'regular', 'comfy']}\n//                        onChange={(v) => setTweak('density', v)} />\n//           <TweakSection label=\"Theme\" />\n//           <TweakColor  label=\"Primary\" value={t.primaryColor}\n//                        onChange={(v) => setTweak('primaryColor', v)} />\n//           <TweakToggle label=\"Dark mode\" value={t.dark}\n//                        onChange={(v) => setTweak('dark', v)} />\n//         </TweaksPanel>\n//       </div>\n//     );\n//   }\n//\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst __TWEAKS_STYLE = `\n  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;\n    max-height:calc(100vh - 32px);display:flex;flex-direction:column;\n    background:rgba(250,249,247,.78);color:#29261b;\n    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);\n    border:.5px solid rgba(255,255,255,.6);border-radius:14px;\n    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);\n    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}\n  .twk-hd{display:flex;align-items:center;justify-content:space-between;\n    padding:10px 8px 10px 14px;cursor:move;user-select:none}\n  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}\n  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);\n    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}\n  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}\n  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;\n    overflow-y:auto;overflow-x:hidden;min-height:0;\n    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}\n  .twk-body::-webkit-scrollbar{width:8px}\n  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}\n  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;\n    border:2px solid transparent;background-clip:content-box}\n  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);\n    border:2px solid transparent;background-clip:content-box}\n  .twk-row{display:flex;flex-direction:column;gap:5px}\n  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}\n  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;\n    color:rgba(41,38,27,.72)}\n  .twk-lbl>span:first-child{font-weight:500}\n  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}\n\n  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;\n    color:rgba(41,38,27,.45);padding:10px 0 0}\n  .twk-sect:first-child{padding-top:0}\n\n  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;\n    border:.5px solid rgba(0,0,0,.1);border-radius:7px;\n    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}\n  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}\n  select.twk-field{padding-right:22px;\n    background-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>\");\n    background-repeat:no-repeat;background-position:right 8px center}\n\n  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;\n    border-radius:999px;background:rgba(0,0,0,.12);outline:none}\n  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;\n    width:14px;height:14px;border-radius:50%;background:#fff;\n    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}\n  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;\n    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}\n\n  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;\n    background:rgba(0,0,0,.06);user-select:none}\n  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;\n    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);\n    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}\n  .twk-seg.dragging .twk-seg-thumb{transition:none}\n  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;\n    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;\n    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;\n    overflow-wrap:anywhere}\n\n  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;\n    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}\n  .twk-toggle[data-on=\"1\"]{background:#34c759}\n  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;\n    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}\n  .twk-toggle[data-on=\"1\"] i{transform:translateX(14px)}\n\n  .twk-num{display:flex;align-items:center;height:26px;padding:0 0 0 8px;\n    border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6)}\n  .twk-num-lbl{font-weight:500;color:rgba(41,38,27,.6);cursor:ew-resize;\n    user-select:none;padding-right:8px}\n  .twk-num input{flex:1;min-width:0;height:100%;border:0;background:transparent;\n    font:inherit;font-variant-numeric:tabular-nums;text-align:right;padding:0 8px 0 0;\n    outline:none;color:inherit;-moz-appearance:textfield}\n  .twk-num input::-webkit-inner-spin-button,.twk-num input::-webkit-outer-spin-button{\n    -webkit-appearance:none;margin:0}\n  .twk-num-unit{padding-right:8px;color:rgba(41,38,27,.45)}\n\n  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;\n    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}\n  .twk-btn:hover{background:rgba(0,0,0,.88)}\n  .twk-btn.secondary{background:rgba(0,0,0,.06);color:inherit}\n  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}\n\n  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;\n    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;\n    background:transparent;flex-shrink:0}\n  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}\n  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}\n  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}\n`;\n\n// ── useTweaks ───────────────────────────────────────────────────────────────\n// Single source of truth for tweak values. setTweak persists via the host\n// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).\nfunction useTweaks(defaults) {\n  const [values, setValues] = React.useState(defaults);\n  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a\n  // useState-style call doesn't write a \"[object Object]\" key into the persisted\n  // JSON block.\n  const setTweak = React.useCallback((keyOrEdits, val) => {\n    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null\n      ? keyOrEdits : { [keyOrEdits]: val };\n    setValues((prev) => ({ ...prev, ...edits }));\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');\n  }, []);\n  return [values, setTweak];\n}\n\n// ── TweaksPanel ─────────────────────────────────────────────────────────────\n// Floating shell. Registers the protocol listener BEFORE announcing\n// availability — if the announce ran first, the host's activate could land\n// before our handler exists and the toolbar toggle would silently no-op.\n// The close button posts __edit_mode_dismissed so the host's toolbar toggle\n// flips off in lockstep; the host echoes __deactivate_edit_mode back which\n// is what actually hides the panel.\nfunction TweaksPanel({ title = 'Tweaks', children }) {\n  const [open, setOpen] = React.useState(false);\n  const dragRef = React.useRef(null);\n  const offsetRef = React.useRef({ x: 16, y: 16 });\n  const PAD = 16;\n\n  const clampToViewport = React.useCallback(() => {\n    const panel = dragRef.current;\n    if (!panel) return;\n    const w = panel.offsetWidth, h = panel.offsetHeight;\n    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);\n    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);\n    offsetRef.current = {\n      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),\n      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),\n    };\n    panel.style.right = offsetRef.current.x + 'px';\n    panel.style.bottom = offsetRef.current.y + 'px';\n  }, []);\n\n  React.useEffect(() => {\n    if (!open) return;\n    clampToViewport();\n    if (typeof ResizeObserver === 'undefined') {\n      window.addEventListener('resize', clampToViewport);\n      return () => window.removeEventListener('resize', clampToViewport);\n    }\n    const ro = new ResizeObserver(clampToViewport);\n    ro.observe(document.documentElement);\n    return () => ro.disconnect();\n  }, [open, clampToViewport]);\n\n  React.useEffect(() => {\n    const onMsg = (e) => {\n      const t = e?.data?.type;\n      if (t === '__activate_edit_mode') setOpen(true);\n      else if (t === '__deactivate_edit_mode') setOpen(false);\n    };\n    window.addEventListener('message', onMsg);\n    window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n    return () => window.removeEventListener('message', onMsg);\n  }, []);\n\n  const dismiss = () => {\n    setOpen(false);\n    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');\n  };\n\n  const onDragStart = (e) => {\n    const panel = dragRef.current;\n    if (!panel) return;\n    const r = panel.getBoundingClientRect();\n    const sx = e.clientX, sy = e.clientY;\n    const startRight = window.innerWidth - r.right;\n    const startBottom = window.innerHeight - r.bottom;\n    const move = (ev) => {\n      offsetRef.current = {\n        x: startRight - (ev.clientX - sx),\n        y: startBottom - (ev.clientY - sy),\n      };\n      clampToViewport();\n    };\n    const up = () => {\n      window.removeEventListener('mousemove', move);\n      window.removeEventListener('mouseup', up);\n    };\n    window.addEventListener('mousemove', move);\n    window.addEventListener('mouseup', up);\n  };\n\n  if (!open) return null;\n  return (\n    <>\n      <style>{__TWEAKS_STYLE}</style>\n      <div ref={dragRef} className=\"twk-panel\" data-noncommentable=\"\"\n           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>\n        <div className=\"twk-hd\" onMouseDown={onDragStart}>\n          <b>{title}</b>\n          <button className=\"twk-x\" aria-label=\"Close tweaks\"\n                  onMouseDown={(e) => e.stopPropagation()}\n                  onClick={dismiss}>✕</button>\n        </div>\n        <div className=\"twk-body\">{children}</div>\n      </div>\n    </>\n  );\n}\n\n// ── Layout helpers ──────────────────────────────────────────────────────────\n\nfunction TweakSection({ label, children }) {\n  return (\n    <>\n      <div className=\"twk-sect\">{label}</div>\n      {children}\n    </>\n  );\n}\n\nfunction TweakRow({ label, value, children, inline = false }) {\n  return (\n    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>\n      <div className=\"twk-lbl\">\n        <span>{label}</span>\n        {value != null && <span className=\"twk-val\">{value}</span>}\n      </div>\n      {children}\n    </div>\n  );\n}\n\n// ── Controls ────────────────────────────────────────────────────────────────\n\nfunction TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {\n  return (\n    <TweakRow label={label} value={`${value}${unit}`}>\n      <input type=\"range\" className=\"twk-slider\" min={min} max={max} step={step}\n             value={value} onChange={(e) => onChange(Number(e.target.value))} />\n    </TweakRow>\n  );\n}\n\nfunction TweakToggle({ label, value, onChange }) {\n  return (\n    <div className=\"twk-row twk-row-h\">\n      <div className=\"twk-lbl\"><span>{label}</span></div>\n      <button type=\"button\" className=\"twk-toggle\" data-on={value ? '1' : '0'}\n              role=\"switch\" aria-checked={!!value}\n              onClick={() => onChange(!value)}><i /></button>\n    </div>\n  );\n}\n\nfunction TweakRadio({ label, value, options, onChange }) {\n  const trackRef = React.useRef(null);\n  const [dragging, setDragging] = React.useState(false);\n  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));\n  const idx = Math.max(0, opts.findIndex((o) => o.value === value));\n  const n = opts.length;\n\n  // The active value is read by pointer-move handlers attached for the lifetime\n  // of a drag — ref it so a stale closure doesn't fire onChange for every move.\n  const valueRef = React.useRef(value);\n  valueRef.current = value;\n\n  const segAt = (clientX) => {\n    const r = trackRef.current.getBoundingClientRect();\n    const inner = r.width - 4;\n    const i = Math.floor(((clientX - r.left - 2) / inner) * n);\n    return opts[Math.max(0, Math.min(n - 1, i))].value;\n  };\n\n  const onPointerDown = (e) => {\n    setDragging(true);\n    const v0 = segAt(e.clientX);\n    if (v0 !== valueRef.current) onChange(v0);\n    const move = (ev) => {\n      if (!trackRef.current) return;\n      const v = segAt(ev.clientX);\n      if (v !== valueRef.current) onChange(v);\n    };\n    const up = () => {\n      setDragging(false);\n      window.removeEventListener('pointermove', move);\n      window.removeEventListener('pointerup', up);\n    };\n    window.addEventListener('pointermove', move);\n    window.addEventListener('pointerup', up);\n  };\n\n  return (\n    <TweakRow label={label}>\n      <div ref={trackRef} role=\"radiogroup\" onPointerDown={onPointerDown}\n           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>\n        <div className=\"twk-seg-thumb\"\n             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,\n                      width: `calc((100% - 4px) / ${n})` }} />\n        {opts.map((o) => (\n          <button key={o.value} type=\"button\" role=\"radio\" aria-checked={o.value === value}>\n            {o.label}\n          </button>\n        ))}\n      </div>\n    </TweakRow>\n  );\n}\n\nfunction TweakSelect({ label, value, options, onChange }) {\n  return (\n    <TweakRow label={label}>\n      <select className=\"twk-field\" value={value} onChange={(e) => onChange(e.target.value)}>\n        {options.map((o) => {\n          const v = typeof o === 'object' ? o.value : o;\n          const l = typeof o === 'object' ? o.label : o;\n          return <option key={v} value={v}>{l}</option>;\n        })}\n      </select>\n    </TweakRow>\n  );\n}\n\nfunction TweakText({ label, value, placeholder, onChange }) {\n  return (\n    <TweakRow label={label}>\n      <input className=\"twk-field\" type=\"text\" value={value} placeholder={placeholder}\n             onChange={(e) => onChange(e.target.value)} />\n    </TweakRow>\n  );\n}\n\nfunction TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {\n  const clamp = (n) => {\n    if (min != null && n < min) return min;\n    if (max != null && n > max) return max;\n    return n;\n  };\n  const startRef = React.useRef({ x: 0, val: 0 });\n  const onScrubStart = (e) => {\n    e.preventDefault();\n    startRef.current = { x: e.clientX, val: value };\n    const decimals = (String(step).split('.')[1] || '').length;\n    const move = (ev) => {\n      const dx = ev.clientX - startRef.current.x;\n      const raw = startRef.current.val + dx * step;\n      const snapped = Math.round(raw / step) * step;\n      onChange(clamp(Number(snapped.toFixed(decimals))));\n    };\n    const up = () => {\n      window.removeEventListener('pointermove', move);\n      window.removeEventListener('pointerup', up);\n    };\n    window.addEventListener('pointermove', move);\n    window.addEventListener('pointerup', up);\n  };\n  return (\n    <div className=\"twk-num\">\n      <span className=\"twk-num-lbl\" onPointerDown={onScrubStart}>{label}</span>\n      <input type=\"number\" value={value} min={min} max={max} step={step}\n             onChange={(e) => onChange(clamp(Number(e.target.value)))} />\n      {unit && <span className=\"twk-num-unit\">{unit}</span>}\n    </div>\n  );\n}\n\nfunction TweakColor({ label, value, onChange }) {\n  return (\n    <div className=\"twk-row twk-row-h\">\n      <div className=\"twk-lbl\"><span>{label}</span></div>\n      <input type=\"color\" className=\"twk-swatch\" value={value}\n             onChange={(e) => onChange(e.target.value)} />\n    </div>\n  );\n}\n\nfunction TweakButton({ label, onClick, secondary = false }) {\n  return (\n    <button type=\"button\" className={secondary ? 'twk-btn secondary' : 'twk-btn'}\n            onClick={onClick}>{label}</button>\n  );\n}\n\nObject.assign(window, {\n  useTweaks, TweaksPanel, TweakSection, TweakRow,\n  TweakSlider, TweakToggle, TweakRadio, TweakSelect,\n  TweakText, TweakNumber, TweakColor, TweakButton,\n});\n\n<\/script>\n<style>\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body, #root { height: 100%; overflow: hidden; }\n\n/* ── THEMES ── */\nbody.theme-a {\n  --bg:        oklch(96% 0.018 78);\n  --bg-alt:    oklch(91% 0.022 74);\n  --bg-dark:   oklch(16% 0.02 55);\n  --fg:        oklch(18% 0.02 55);\n  --fg-muted:  oklch(50% 0.018 60);\n  --accent:    oklch(58% 0.19 46);\n  --border:    oklch(84% 0.022 72);\n  --card:      oklch(99.5% 0.008 80);\n  --map-water: oklch(72% 0.08 220);\n  --map-land:  oklch(88% 0.04 94);\n  --map-road:  oklch(68% 0.06 70);\n  --map-judea: oklch(85% 0.05 88);\n  --map-border:oklch(55% 0.06 50);\n  --tl-bg:     oklch(18% 0.02 55);\n  --tl-fg:     oklch(95% 0.012 78);\n}\nbody.theme-b {\n  --bg:        oklch(13% 0.018 255);\n  --bg-alt:    oklch(18% 0.02 255);\n  --bg-dark:   oklch(9% 0.015 255);\n  --fg:        oklch(93% 0.012 75);\n  --fg-muted:  oklch(58% 0.016 70);\n  --accent:    oklch(64% 0.19 46);\n  --border:    oklch(26% 0.02 255);\n  --card:      oklch(18% 0.018 255);\n  --map-water: oklch(32% 0.07 220);\n  --map-land:  oklch(28% 0.04 88);\n  --map-road:  oklch(42% 0.04 75);\n  --map-judea: oklch(25% 0.04 88);\n  --map-border:oklch(55% 0.08 50);\n  --tl-bg:     oklch(9% 0.015 255);\n  --tl-fg:     oklch(93% 0.012 75);\n}\nbody { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--fg); }\n\n/* ── PAGE SKELETON ── */\n/* header / [timeline | map] stacked vertically */\n.app {\n  height: 100vh;\n  display: grid;\n  grid-template-rows: 50px 1fr;\n  overflow: hidden;\n}\n\n/* ── HEADER ── */\n.header {\n  background: var(--bg-dark);\n  padding: 0 28px;\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  border-bottom: 2px solid var(--accent);\n  z-index: 20;\n  overflow: hidden;\n  white-space: nowrap;\n}\n.hdr-book { font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); }\n.hdr-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:oklch(95% .012 78); white-space:nowrap; }\n.hdr-sub { font-family:'Lora',serif; font-style:italic; font-size:12px; color:oklch(65% .012 70); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }\n.hdr-space { flex:1; }\n.theme-btns { display:flex; gap:6px; }\n.theme-btn {\n  font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;\n  letter-spacing:.1em; text-transform:uppercase; padding:3px 13px;\n  border:1.5px solid oklch(36% .015 255); background:transparent;\n  color:oklch(60% .012 70); cursor:pointer; border-radius:2px; transition:all .2s;\n}\n.theme-btn.active { border-color:var(--accent); background:var(--accent); color:#fff; }\n\n/* ── BODY: timeline left, map right ── */\n.body {\n  display: grid;\n  grid-template-columns: 240px 1fr;\n  overflow: hidden;\n}\n\n/* ── TIMELINE COLUMN ── */\n.tl-col {\n  background: var(--tl-bg);\n  color: var(--tl-fg);\n  display: flex;\n  flex-direction: column;\n  overflow: hidden;\n  border-right: 1px solid oklch(28% .015 255);\n  min-width: 0;\n}\n\n/* Chapter label strip */\n.tl-chapter-strip {\n  padding: 14px 18px 12px;\n  border-bottom: 1px solid oklch(28% .015 255);\n  flex-shrink: 0;\n}\n.tl-ch-label {\n  font-size: 9px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;\n  color: var(--accent); margin-bottom:4px;\n}\n.tl-ch-title {\n  font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800;\n  text-transform:uppercase; line-height:1.1; color:var(--tl-fg);\n  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\n}\n.tl-ch-title em { color:var(--accent); font-style:normal; }\n\n/* Scrollable event list */\n.tl-list {\n  flex: 1;\n  overflow-y: auto;\n  overflow-x: hidden;\n  position: relative;\n}\n.tl-list::-webkit-scrollbar { width:3px; }\n.tl-list::-webkit-scrollbar-thumb { background:oklch(36% .015 255); border-radius:2px; }\n\n/* Vertical spine */\n.tl-spine {\n  padding: 8px 0 80px;\n  position: relative;\n}\n.tl-spine::before {\n  content:'';\n  position:absolute;\n  left: 38px;\n  top:0; bottom:0;\n  width:2px;\n  background: linear-gradient(to bottom, transparent, oklch(36% .015 255) 5%, oklch(36% .015 255) 95%, transparent);\n}\n\n/* Year separator badge */\n.tl-year-sep {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 10px 10px 6px 14px;\n  position: relative;\n  z-index: 2;\n}\n.tl-year-badge {\n  font-family: 'Barlow Condensed', sans-serif;\n  font-size: 11px;\n  font-weight: 800;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n  color: var(--accent);\n  background: oklch(22% .018 255);\n  border: 1px solid oklch(36% .015 255);\n  padding: 2px 10px;\n  border-radius: 2px;\n  white-space: nowrap;\n  position: relative;\n  z-index: 2;\n}\nbody.theme-a .tl-year-badge { background: oklch(22% .018 55); border-color: oklch(36% .015 55); }\n.tl-year-line {\n  flex: 1;\n  height: 1px;\n  background: oklch(30% .012 255);\n  opacity: .5;\n}\n\n/* Each item — tall so scroll is slow and deliberate */\n.tl-item {\n  display: grid;\n  grid-template-columns: 76px 1fr;\n  cursor: pointer;\n  position: relative;\n  transition: background .15s;\n  padding-right: 4px;\n  min-height: 130px;\n}\n.tl-item:hover { background: oklch(22% .015 255 / 0.6); }\n.tl-item.active { background: oklch(22% .018 255 / 0.8); }\nbody.theme-a .tl-item:hover { background: oklch(22% .015 255 / 0.5); }\nbody.theme-a .tl-item.active { background: oklch(20% .018 55 / 0.8); }\n\n/* left: seq number + dot */\n.tl-l {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  padding-top: 14px;\n}\n.tl-seq {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:10px; font-weight:700;\n  color: oklch(45% .01 255);\n  margin-bottom:5px;\n  letter-spacing:.05em;\n}\n.tl-item.active .tl-seq { color: var(--accent); }\n.tl-dot {\n  width:16px; height:16px; border-radius:50%;\n  border:2px solid oklch(38% .015 255);\n  background: oklch(16% .018 255);\n  position:relative; z-index:1;\n  transition: all .28s;\n  display:flex; align-items:center; justify-content:center;\n  flex-shrink:0;\n}\nbody.theme-a .tl-dot { background: oklch(22% .018 55); border-color: oklch(36% .015 55); }\n.tl-item.active .tl-dot {\n  border-color: var(--accent);\n  background: var(--accent);\n  box-shadow: 0 0 0 3px oklch(58% .19 46 / .2);\n}\n.tl-dot-pip {\n  width:5px; height:5px; border-radius:50%; background:#fff;\n  opacity:0; transition:opacity .28s;\n}\n.tl-item.active .tl-dot-pip { opacity:1; }\n\n/* right: text */\n.tl-r {\n  padding: 22px 10px 22px 6px;\n  border-bottom: 1px solid oklch(24% .012 255);\n}\n.tl-item:last-child .tl-r { border-bottom: none; }\n.tl-date {\n  font-size:10px; font-weight:700; letter-spacing:.1em;\n  font-family:'Barlow Condensed',sans-serif;\n  color: oklch(55% .015 255); margin-bottom:2px;\n}\n.tl-item.active .tl-date { color: var(--accent); }\n.tl-rel-time {\n  font-size:8px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;\n  color: oklch(36% .012 255); margin-bottom:5px;\n}\n.tl-item.active .tl-rel-time { color: oklch(55% .015 46); }\n.tl-ev-title {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:14px; font-weight:700; text-transform:uppercase;\n  line-height:1.15; color: var(--tl-fg);\n  margin-bottom: 3px;\n}\n.tl-ev-verses {\n  font-size:9px; font-weight:600; letter-spacing:.1em;\n  color: oklch(50% .015 255); margin-top:2px;\n}\n.tl-item.active .tl-ev-verses { color: var(--accent); }\n\n/* ── MAP COLUMN ── */\n.map-col {\n  position: relative;\n  background: var(--map-land);\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n  min-width: 0;\n}\n\n/* Event banner at top of map */\n.map-event-banner {\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  z-index: 10;\n  background: oklch(16% 0.02 55 / 0.92);\n  border-bottom: 2px solid var(--accent);\n  padding: 10px 20px;\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 0 16px;\n  align-items: center;\n  backdrop-filter: blur(6px);\n  transition: background .3s;\n}\nbody.theme-b .map-event-banner {\n  background: oklch(9% 0.015 255 / 0.92);\n}\n.ban-verses {\n  font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;\n  color:var(--accent); white-space:nowrap;\n}\n.ban-content {}\n.ban-title {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:16px; font-weight:800; text-transform:uppercase;\n  letter-spacing:.04em; color:oklch(95% .012 78);\n  line-height:1.1; margin-bottom:2px;\n}\n.ban-desc {\n  font-family:'Lora',serif; font-style:italic;\n  font-size:11.5px; line-height:1.5;\n  color:oklch(65% .012 70);\n  display: -webkit-box;\n  -webkit-line-clamp: 2;\n  -webkit-box-orient: vertical;\n  overflow: hidden;\n}\n.ban-loc {\n  display:flex; align-items:center; gap:5px;\n  font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;\n  color:oklch(55% .012 70); white-space:nowrap;\n}\n.ban-loc-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }\n\n/* ── MAP SVG — fill panel, use xMidYMid slice so it always covers ── */\n.map-svg-wrap {\n  position: absolute;\n  inset: 0;\n}\n.map-svg {\n  width:100%; height:100%;\n}\n\n/* Person legend - bottom left of map */\n.map-person-legend {\n  position: absolute;\n  bottom: 18px;\n  left: 18px;\n  display: flex;\n  flex-direction: column;\n  gap: 5px;\n  z-index: 10;\n  pointer-events: none;\n}\n.map-leg-item {\n  display:flex; align-items:center; gap:7px;\n  font-size:10px; font-weight:600; letter-spacing:.06em;\n  color: var(--fg);\n  background: var(--card);\n  padding: 3px 10px 3px 7px;\n  border-radius:20px;\n  border:1px solid var(--border);\n  transition: opacity .5s, transform .4s;\n}\nbody.theme-b .map-leg-item { color: var(--tl-fg); background: oklch(18% .018 255); border-color: oklch(28% .015 255); }\n.map-leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }\n.map-leg-item.faded { opacity:.3; }\n.map-leg-item.entering { animation: legEnter .4s ease forwards; }\n@keyframes legEnter {\n  from { opacity:0; transform:translateX(-8px); }\n  to   { opacity:1; transform:translateX(0); }\n}\n\n/* Map overlay labels */\n.map-corner-label {\n  position:absolute; bottom:18px; right:18px;\n  font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;\n  color:var(--fg-muted); opacity:.5; z-index:5; pointer-events:none;\n}\n\n.map-playback {\n  position: absolute;\n  right: 18px;\n  bottom: 42px;\n  z-index: 12;\n  width: min(460px, calc(100% - 36px));\n  background: oklch(99.5% 0.008 80 / .9);\n  border: 1px solid var(--border);\n  box-shadow: 0 12px 34px oklch(10% 0.02 55 / .14);\n  padding: 10px 12px;\n  backdrop-filter: blur(8px);\n}\nbody.theme-b .map-playback {\n  background: oklch(13% 0.018 255 / .9);\n  border-color: oklch(28% .015 255);\n}\n.playback-top {\n  display:flex;\n  align-items:center;\n  justify-content:space-between;\n  gap:10px;\n  margin-bottom:9px;\n}\n.playback-label {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:11px;\n  font-weight:800;\n  letter-spacing:.16em;\n  text-transform:uppercase;\n  color:var(--fg-muted);\n  white-space:nowrap;\n  overflow:hidden;\n  text-overflow:ellipsis;\n}\n.playback-buttons { display:flex; gap:6px; flex-shrink:0; }\n.playback-btn {\n  width:30px;\n  height:26px;\n  border:1px solid var(--border);\n  background:var(--card);\n  color:var(--fg);\n  border-radius:3px;\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:13px;\n  font-weight:800;\n  cursor:pointer;\n  line-height:1;\n}\nbody.theme-b .playback-btn { background:oklch(18% .018 255); border-color:oklch(30% .015 255); color:var(--tl-fg); }\n.playback-track {\n  position:relative;\n  height:28px;\n  display:grid;\n
