_theophilus: { label: 'Tilegnelse', relative_time: 'Fortalt tilbageblik' },\n      forty_days_teaching: { label: '40 dage', relative_time: 'Dag 1-40 efter opstandelsen' },\n      promise_of_the_spirit: { label: 'Sidste måltid', relative_time: 'Dag 40' },\n      question_about_the_kingdom: { label: 'Udsendelse', relative_time: 'Dag 40' },\n      ascension: { label: 'Himmelfart', relative_time: 'Dag 40 — Kristi himmelfartsdag' },\n      return_to_jerusalem: { label: 'Tilbage', relative_time: 'Dag 40 — eftermiddag' },\n      upper_room_prayer: { label: 'Ventetid', relative_time: 'Dag 40-50' },\n      peter_addresses_the_community: { label: 'Peters tale', relative_time: 'Under ventetiden' },\n      selection_of_matthias: { label: 'Matthias', relative_time: 'Før pinse' }\n    },\n    times: {\n      prologue_to_theophilus: { date: 'ca. år 62-80', period: 'Affattelsestidspunkt' },\n      forty_days_teaching: { date: 'april år 30', period: 'Dag 1-40 efter opstandelsen' },\n      promise_of_the_spirit: { date: 'sidst i april år 30', period: 'Dag 40 — sidste måltid' },\n      question_about_the_kingdom: { date: 'sidst i april år 30', period: 'Dag 40 — kort før himmelfarten' },\n      ascension: { date: '18. maj år 30', period: 'Dag 40 — Kristi himmelfartsdag' },\n      return_to_jerusalem: { date: '18. maj år 30', period: 'Dag 40 — eftermiddag' },\n      upper_room_prayer: { date: '18.-28. maj år 30', period: 'Dag 40-50 — ti dages bøn' },\n      peter_addresses_the_community: { date: 'sidst i maj år 30', period: 'Under de ti dages venten' },\n      selection_of_matthias: { date: 'sidst i maj år 30', period: 'Før pinse — dag 50' }\n    }\n  }\n};\n\nfunction localizeChapter(base, lang) {\n  const t = CHAPTER_TEXT[lang];\n  if (!t) return base;\n  return {\n    ...base,\n    book: t.book,\n    chapter_title: t.chapterTitle,\n    persons: base.persons.map(p => ({ ...p, name: t.persons[p.id] || p.name })),\n    locations: base.locations.map(l => ({ ...l, ...(t.locations[l.id] || {}) })),\n    events: base.events.map(e => ({ ...e, ...(t.events[e.id] || {}) })),\n    routes: base.routes.map(r => ({ ...r, label: t.persons[r.person_id] || r.label })),\n    timeline: base.timeline.map(tl => ({ ...tl, ...(t.timeline[tl.event_id] || {}) }))\n  };\n}\n\nconst DATA = localizeChapter(ACTS_CH1, INITIAL_LANG);\nconst UI_TEXT = CHAPTER_TEXT[INITIAL_LANG] || {};\nconst MAP_TEXT = UI_TEXT.map || {};\nconst mapText = key => MAP_TEXT[key] || key;\nfunction setLanguage(lang) {\n  localStorage.setItem(LANGUAGE_KEY, lang);\n  window.location.reload();\n}\nfunction yearMarker(value = '') {\n  const match = value.match(/AD\\s*\\d+(?:[–-]\\d+)?/) || value.match(/år\\s*\\d+(?:[–-]\\d+)?/);\n  return match ? match[0].trim() : '';\n}\n\nfunction compactTimeLabel(value = '', includeYear = false) {\n  const marker = yearMarker(value);\n  const shortLabel = value\n    .replace(/^c\\.\\s*/, '')\n    .replace(/Late /, '')\n    .replace(/sidst i /, '')\n    .replace(/,?\\s*AD\\s*\\d+(?:[–-]\\d+)?\\b/g, '')\n    .replace(/\\s*år\\s*\\d+(?:[–-]\\d+)?\\b/g, '')\n    .trim();\n  return includeYear && marker ? `${marker} ${shortLabel}`.trim() : (shortLabel || marker);\n}\n\nfunction shouldShowYear(tl, idx) {\n  const current = yearMarker(ABSOLUTE_TIMES[tl.event_id]?.date || tl.relative_time);\n  if (!current) return false;\n  const previous = DATA.timeline[idx - 1];\n  if (!previous) return true;\n  return current !== yearMarker(ABSOLUTE_TIMES[previous.event_id]?.date || previous.relative_time);\n}\n\n/* ── PERSON COLORS ── */\nconst PCOLORS = {\n  jesus:               '#E8591A',\n  peter:               '#5B8FA8',\n  the_eleven:          '#A09070',\n  matthias:            '#6B8F71',\n  mary_mother_of_jesus:'#9B7EB0',\n  judas_iscariot:      '#A0746A',\n  the_women:           '#C68B6E',\n  brothers_of_jesus:   '#7A8FA0',\n  joseph_barsabbas:    '#7DAA7D',\n  two_men_in_white:    '#D4C4A0',\n  theophilus:          '#9A8F80',\n};\n\n/* ── MAP COORDINATES (SVG 1000×800 viewBox, zoomed tight to Jerusalem area) ── */\nconst VW = 1000, VH = 800;\nconst LOCS = {\n  jerusalem:       { x: 380, y: 420, label: DATA.locations.find(l => l.id === 'jerusalem')?.name || 'Jerusalem' },\n  mount_of_olives: { x: 680, y: 210, label: DATA.locations.find(l => l.id === 'mount_of_olives')?.name || 'Mount of Olives' },\n  upper_room:      { x: 310, y: 490, label: INITIAL_LANG === 'da' ? 'Øvresalen (Zions bjerg)' : 'Upper Room (Mt Zion)' },\n};\n\nconst ABSOLUTE_TIMES = UI_TEXT.times || {\n  prologue_to_theophilus:       { date: 'c. AD 62–80',        period: 'Date of composition' },\n  forty_days_teaching:          { date: 'April AD 30',         period: 'Days 1–40 post-resurrection' },\n  promise_of_the_spirit:        { date: 'Late April AD 30',    period: 'Day 40 — final meal' },\n  question_about_the_kingdom:   { date: 'Late April AD 30',    period: 'Day 40 — moments before Ascension' },\n  ascension:                    { date: 'May 18, AD 30',       period: 'Day 40 — Ascension Thursday' },\n  return_to_jerusalem:          { date: 'May 18, AD 30',       period: 'Day 40 — afternoon' },\n  upper_room_prayer:            { date: 'May 18–28, AD 30',    period: 'Days 40–50 — ten days of prayer' },\n  peter_addresses_the_community:{ date: 'Late May AD 30',      period: 'During the 10-day wait' },\n  selection_of_matthias:        { date: 'Late May AD 30',      period: 'Before Pentecost — Day 50' },\n};\n\n/* Build route stops with pixel coords */\nfunction buildRoutes() {\n  const out = {};\n  DATA.routes.forEach(r => {\n    out[r.person_id] = {\n      color: PCOLORS[r.person_id] || '#888',\n      label: r.label,\n      stops: r.path.map(s => ({\n        ...s,\n        ...(LOCS[s.location_id] || { x: 360, y: 360 }),\n      })),\n    };\n  });\n  return out;\n}\nconst ROUTES = buildRoutes();\n\n/* Compute per-event person state */\nfunction personStateAt(eventId) {\n  const evIdx = DATA.events.findIndex(e => e.id === eventId);\n  const ev    = DATA.events[evIdx];\n  const result = {};\n\n  Object.entries(ROUTES).forEach(([pid, route]) => {\n    let lastStop = null;\n    route.stops.forEach(stop => {\n      const si = DATA.events.findIndex(e => e.id === stop.event_id);\n      if (si <= evIdx) lastStop = stop;\n    });\n    if (!lastStop) return;\n    const active = ev?.persons_present?.includes(pid) ?? false;\n    result[pid] = {\n      color: route.color,\n      label: route.label,\n      pos:   { x: lastStop.x, y: lastStop.y },\n      active,\n      faded: !active,\n    };\n  });\n  return result;\n}\n\n/* ── MAP TERRAIN ── */\nfunction Terrain() {\n  return (\n    <g>\n      {/* Base land */}\n      <rect x=\"0\" y=\"0\" width={VW} height={VH} fill=\"var(--map-land)\" />\n\n      {/* ── REGION FILLS with distinct colors ── */}\n      {/* Judea — central region around Jerusalem */}\n      <path d=\"M 50 300 Q 150 260 300 270 Q 450 280 580 300 Q 700 320 780 360 Q 820 380 820 440 Q 820 520 760 560 Q 700 600 580 620 Q 450 640 300 630 Q 180 620 100 580 Q 40 550 30 480 Q 20 420 50 300 Z\"\n        fill=\"oklch(87% 0.055 90)\" opacity=\"1\" />\n      <text x=\"160\" y=\"580\" fontSize=\"13\" fontFamily=\"Barlow Condensed\" fontWeight=\"800\"\n        fill=\"oklch(48% 0.07 75)\" letterSpacing=\"3\" opacity=\".7\">{mapText('JUDEA')}</text>\n\n      {/* Peraea — east of Jordan */}\n      <path d=\"M 820 200 Q 860 220 920 260 Q 970 300 980 380 Q 990 450 960 520 Q 940 570 900 600 Q 870 620 840 600 Q 820 560 820 500 Q 820 420 820 360 Q 820 280 820 200 Z\"\n        fill=\"oklch(82% 0.045 110)\" opacity=\".85\" />\n      <text x=\"880\" y=\"380\" fontSize=\"11\" fontFamily=\"Barlow Condensed\" fontWeight=\"700\"\n        fill=\"oklch(42% 0.06 90)\" letterSpacing=\"2\" opacity=\".65\" transform=\"rotate(90,880,380)\">{mapText('PERAEA')}</text>\n\n      {/* Northern region hint */}\n      <path d=\"M 50 300 Q 150 260 300 270 Q 450 280 580 300 Q 650 310 720 290 Q 780 270 820 200 Q 820 120 780 70 Q 700 30 500 20 Q 300 10 150 50 Q 60 80 40 160 Q 20 230 50 300 Z\"\n        fill=\"oklch(85% 0.04 130)\" opacity=\".6\" />\n      <text x=\"200\" y=\"120\" fontSize=\"12\" fontFamily=\"Barlow Condensed\" fontWeight=\"700\"\n        fill=\"oklch(40% 0.06 120)\" letterSpacing=\"2\" opacity=\".55\">{mapText('SAMARIA')}</text>\n\n      {/* ── REGION BORDERS — thick, clearly visible ── */}\n      {/* Judea north border */}\n      <path d=\"M 50 300 Q 200 265 380 272 Q 520 278 650 295 Q 730 308 790 330\"\n        fill=\"none\" stroke=\"var(--map-border)\" strokeWidth=\"2.5\" opacity=\".55\" strokeDasharray=\"12 5\" />\n      {/* Judea east border — Jordan River / Dead Sea edge */}\n      <path d=\"M 790 330 Q 818 370 820 430 Q 820 500 800 560\"\n        fill=\"none\" stroke=\"var(--map-border)\" strokeWidth=\"2.5\" opacity=\".55\" strokeDasharray=\"12 5\" />\n      {/* Peraea west border = Jordan */}\n      <path d=\"M 820 140 Q 828 220 825 320 Q 822 420 818 520 Q 815 580 820 650\"\n        fill=\"none\" stroke=\"var(--map-water)\" strokeWidth=\"6\" opacity=\".7\" strokeLinecap=\"round\" />\n\n      {/* ── DEAD SEA ── */}\n      <path d=\"M 818 400 Q 835 390 870 400 Q 920 420 940 470 Q 960 520 940 570 Q 920 620 880 640 Q 850 650 830 630 Q 815 610 815 570 Q 814 500 818 400 Z\"\n        fill=\"var(--map-water)\" opacity=\".85\" />\n      <text x=\"880\" y=\"520\" textAnchor=\"middle\" fontSize=\"11\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"700\" fill=\"oklch(35% 0.06 220)\"\n        letterSpacing=\"1.5\" opacity=\".8\">{mapText('DEAD_SEA')}</text>\n\n      {/* ── JORDAN RIVER ── */}\n      <path d=\"M 825 30 C 832 120 830 220 825 320 C 821 390 818 420 818 450\"\n        fill=\"none\" stroke=\"var(--map-water)\" strokeWidth=\"6\" opacity=\".75\" strokeLinecap=\"round\" />\n      <text x=\"842\" y=\"200\" fontSize=\"10\" fill=\"oklch(38% 0.07 220)\" opacity=\".65\"\n        fontFamily=\"Barlow\" fontWeight=\"500\" transform=\"rotate(84,842,200)\">{mapText('JORDAN_RIVER')}</text>\n\n      {/* ── Mediterranean Sea (west edge hint) ── */}\n      <path d=\"M 0 0 L 0 800 L 40 800 Q 30 600 25 400 Q 20 200 40 0 Z\"\n        fill=\"var(--map-water)\" opacity=\".5\" />\n      <text x=\"18\" y=\"400\" fontSize=\"9\" fill=\"oklch(35% 0.06 220)\" opacity=\".55\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"700\" letterSpacing=\"1\"\n        transform=\"rotate(-90,18,400)\">{mapText('MEDITERRANEAN')}</text>\n\n      {/* ── KIDRON VALLEY ── */}\n      <path d=\"M 660 80 Q 590 170 550 260 Q 525 330 515 400 Q 508 460 510 520\"\n        fill=\"none\" stroke=\"oklch(55% 0.05 80)\" strokeWidth=\"3.5\" opacity=\".4\" />\n      <text x=\"560\" y=\"290\" fontSize=\"10\" fill=\"oklch(42% 0.05 80)\" opacity=\".55\"\n        fontFamily=\"Barlow\" transform=\"rotate(68,560,290)\">{mapText('KIDRON_VALLEY')}</text>\n\n      {/* ── JERUSALEM CITY WALLS ── */}\n      <rect x=\"292\" y=\"345\" width=\"165\" height=\"125\" rx=\"8\"\n        fill=\"oklch(80% 0.06 80)\" opacity=\".3\"\n        stroke=\"oklch(42% 0.08 60)\" strokeWidth=\"3\" />\n      <rect x=\"292\" y=\"345\" width=\"165\" height=\"125\" rx=\"8\"\n        fill=\"none\" stroke=\"oklch(62% 0.09 55)\" strokeWidth=\"1.5\" opacity=\".6\" strokeDasharray=\"6 4\" />\n\n      {/* ── TEMPLE MOUNT ── */}\n      <rect x=\"382\" y=\"358\" width=\"68\" height=\"52\" rx=\"4\"\n        fill=\"oklch(75% 0.08 75)\" opacity=\".45\"\n        stroke=\"oklch(48% 0.08 60)\" strokeWidth=\"2\" />\n      <text x=\"416\" y=\"388\" textAnchor=\"middle\" fontSize=\"9.5\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"700\" fill=\"oklch(30% 0.06 55)\" opacity=\".9\">{mapText('TEMPLE')}</text>\n\n      {/* ── ROAD: Mt Olives → Jerusalem ── */}\n      <path d=\"M 648 228 Q 600 275 560 315 Q 520 352 475 382 Q 445 400 410 413\"\n        fill=\"none\" stroke=\"var(--map-road)\" strokeWidth=\"5\" opacity=\".6\"\n        strokeDasharray=\"10 6\" strokeLinecap=\"round\" />\n      <text x=\"545\" y=\"335\" fontSize=\"10\" fill=\"oklch(38% 0.06 70)\" opacity=\".55\"\n        fontFamily=\"Barlow\" transform=\"rotate(44,545,335)\">{mapText('WALK')}</text>\n\n      {/* ── HINNOM VALLEY ── */}\n      <path d=\"M 140 565 Q 220 598 305 590 Q 348 586 378 572 Q 398 560 408 542\"\n        fill=\"none\" stroke=\"oklch(55% 0.05 80)\" strokeWidth=\"2.5\" opacity=\".35\" />\n      <text x=\"220\" y=\"625\" fontSize=\"9.5\" fill=\"oklch(42% 0.05 80)\" opacity=\".45\"\n        fontFamily=\"Barlow\">{mapText('HINNOM_VALLEY')}</text>\n\n      {/* ── AKELDAMA (Field of Blood) ── */}\n      <circle cx=\"355\" cy=\"572\" r=\"10\"\n        fill=\"oklch(60% 0.14 30)\" opacity=\".25\"\n        stroke=\"var(--accent)\" strokeWidth=\"2\" />\n      <text x=\"372\" y=\"577\" fontSize=\"10\"\n        fill=\"var(--accent)\" opacity=\".7\"\n        fontFamily=\"Barlow\" fontStyle=\"italic\" fontWeight=\"500\">Akeldama</text>\n\n      {/* ── MOUNT OF OLIVES ridge ── */}\n      <ellipse cx=\"668\" cy=\"255\" rx=\"115\" ry=\"85\"\n        fill=\"oklch(82% 0.05 100)\" opacity=\".45\"\n        stroke=\"oklch(55% 0.06 80)\" strokeWidth=\"1.5\" />\n      <text x=\"668\" y=\"148\" textAnchor=\"middle\" fontSize=\"13\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"800\" fill=\"oklch(35% 0.07 70)\"\n        letterSpacing=\"1.5\" opacity=\".75\">{mapText('MOUNT_OF_OLIVES')}</text>\n\n      {/* ── Bethany ── */}\n      <circle cx=\"790\" cy=\"240\" r=\"6\" fill=\"oklch(55% 0.07 80)\" opacity=\".45\" />\n      <text x=\"802\" y=\"244\" fontSize=\"11\" fill=\"oklch(38% 0.06 75)\" opacity=\".6\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"600\">{mapText('BETHANY')}</text>\n\n      {/* ── Bethlehem ── */}\n      <circle cx=\"310\" cy=\"720\" r=\"6\" fill=\"oklch(55% 0.07 80)\" opacity=\".4\" />\n      <text x=\"322\" y=\"724\" fontSize=\"11\" fill=\"oklch(38% 0.06 75)\" opacity=\".5\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"600\">{mapText('BETHLEHEM')}</text>\n\n      {/* ── Scale bar ── */}\n      <g transform=\"translate(60,755)\">\n        <line x1=\"0\" y1=\"0\" x2=\"90\" y2=\"0\" stroke=\"var(--fg-muted)\" strokeWidth=\"2\" opacity=\".5\" />\n        <line x1=\"0\" y1=\"-5\" x2=\"0\" y2=\"5\" stroke=\"var(--fg-muted)\" strokeWidth=\"2\" opacity=\".5\" />\n        <line x1=\"90\" y1=\"-5\" x2=\"90\" y2=\"5\" stroke=\"var(--fg-muted)\" strokeWidth=\"2\" opacity=\".5\" />\n        <text x=\"45\" y=\"18\" textAnchor=\"middle\" fontSize=\"11\" fill=\"var(--fg-muted)\" opacity=\".55\" fontFamily=\"Barlow\">~1 km</text>\n      </g>\n\n      {/* ── North arrow ── */}\n      <g transform=\"translate(60,95)\">\n        <circle cx=\"0\" cy=\"0\" r=\"22\" fill=\"oklch(50% 0 0 / .08)\" stroke=\"var(--fg-muted)\" strokeWidth=\"1.5\" opacity=\".4\" />\n        <path d=\"M0,-16 L-6,8 L0,4 L6,8 Z\" fill=\"var(--fg-muted)\" opacity=\".55\" />\n        <text y=\"38\" textAnchor=\"middle\" fontSize=\"13\" fill=\"var(--fg-muted)\" opacity=\".55\"\n          fontFamily=\"Barlow Condensed\" fontWeight=\"800\">N</text>\n      </g>\n    </g>\n  );\n}\n\n/* ── ROUTE LINES — removed, dots animate instead ── */\nfunction RouteLines() { return null; }\n\n/* ── LOCATION MARKERS ── */\nfunction LocationMarkers({ activeLocId }) {\n  return (\n    <g>\n      {Object.entries(LOCS).map(([id, loc]) => {\n        const on = id === activeLocId;\n        return (\n          <g key={id}>\n            {on && <circle cx={loc.x} cy={loc.y} r=\"36\" fill=\"var(--accent)\" opacity=\".09\" />}\n            {on && <circle cx={loc.x} cy={loc.y} r=\"22\" fill=\"var(--accent)\" opacity=\".07\" />}\n            <circle cx={loc.x} cy={loc.y} r={on ? 10 : 7}\n              fill={on ? 'var(--accent)' : 'var(--fg-muted)'}\n              stroke=\"var(--map-land)\" strokeWidth=\"3\"\n              style={{ transition: 'r .3s' }}\n            />\n            <text className=\"loc-label\" x={loc.x + 16} y={loc.y + 5}\n              fontSize={on ? 17 : 14}\n              fontFamily=\"Barlow Condensed\" fontWeight={on ? '800' : '600'}\n              fill={on ? 'var(--fg)' : 'var(--fg-muted)'}\n              letterSpacing=\".5\"\n              style={{ transition: 'font-size .3s' }}\n            >{loc.label}</text>\n          </g>\n        );\n      })}\n    </g>\n  );\n}\n\n/* ── PERSON DOTS — stable keys, trail effect ── */\nfunction PersonDots({ personStates, prevStates }) {\n  const pids = Object.keys(ROUTES);\n\n  const computePos = (states, pid) => {\n    const s = states?.[pid];\n    if (!s || !s.pos) return null;\n    const snapX = Math.round(s.pos.x / 20) * 20;\n    const snapY = Math.round(s.pos.y / 20) * 20;\n    const siblings = pids.filter(p => {\n      const ps = states[p];\n      if (!ps || !ps.pos) return false;\n      return Math.round(ps.pos.x/20)*20 === snapX && Math.round(ps.pos.y/20)*20 === snapY;\n    });\n    const myGroupIdx = siblings.indexOf(pid);\n    const groupSize  = siblings.length;\n    const cols = Math.min(3, groupSize);\n    const row = Math.floor(myGroupIdx / cols);\n    const col = myGroupIdx % cols;\n    const rows = Math.ceil(groupSize / cols);\n    const spacing = 30;\n    const offsetX = (col - (cols - 1) / 2) * spacing;\n    const offsetY = (row - (rows - 1) / 2) * spacing;\n    const labelAvoidance = s.pos.y < 300 ? { x: 0, y: 46 } : { x: 0, y: -46 };\n    const x = Math.max(70, Math.min(VW - 70, s.pos.x + labelAvoidance.x + offsetX));\n    const y = Math.max(120, Math.min(VH - 70, s.pos.y + labelAvoidance.y + offsetY));\n    return { x, y };\n  };\n\n  return (\n    <g>\n      {pids.map((pid) => {\n        const s = personStates[pid];\n        if (!s || !s.pos) return null;\n        const cur  = computePos(personStates, pid);\n        const prev = computePos(prevStates, pid);\n        if (!cur) return null;\n        const hasMoved = prev && (Math.abs(prev.x - cur.x) > 8 || Math.abs(prev.y - cur.y) > 8);\n        const dotR = s.active ? 14 : 10;\n        return (\n          <g key={pid} style={{ opacity: s.faded ? 0.22 : 1, transition: 'opacity 0.7s ease' }}>\n            {hasMoved && (\n              <g>\n                <line x1={prev.x} y1={prev.y} x2={cur.x} y2={cur.y}\n                  stroke={s.color} strokeWidth=\"3\" strokeLinecap=\"round\"\n                  strokeDasharray=\"5 7\" opacity=\".28\" />\n                <circle cx={prev.x} cy={prev.y} r={dotR * 0.55} fill={s.color} opacity=\".2\" />\n                <circle cx={(prev.x*2+cur.x)/3} cy={(prev.y*2+cur.y)/3} r={dotR * 0.38} fill={s.color} opacity=\".13\" />\n                <circle cx={(prev.x+cur.x*2)/3} cy={(prev.y+cur.y*2)/3} r={dotR * 0.25} fill={s.color} opacity=\".08\" />\n              </g>\n            )}\n            <circle cx={cur.x} cy={cur.y} r={dotR}\n              fill={s.color} stroke=\"var(--map-land)\" strokeWidth=\"2.5\"\n              style={{ transition: 'cx 0.9s cubic-bezier(0.4,0,0.2,1), cy 0.9s cubic-bezier(0.4,0,0.2,1), r 0.35s' }}\n            />\n            <text x={cur.x} y={cur.y + 5} textAnchor=\"middle\"\n              fontSize={s.active ? 13 : 10} fontWeight=\"800\" fill=\"white\"\n              fontFamily=\"Barlow Condensed\" pointerEvents=\"none\"\n              style={{ transition: 'x 0.9s cubic-bezier(0.4,0,0.2,1), y 0.9s cubic-bezier(0.4,0,0.2,1)' }}\n            >\n              {(s.label || '?').charAt(0)}\n            </text>\n            {s.active && (\n              <text className=\"person-name-label\" x={cur.x} y={cur.y + dotR + 16} textAnchor=\"middle\"\n                fontSize=\"12\" fontWeight=\"800\" fill={s.color}\n                fontFamily=\"Barlow Condensed\" pointerEvents=\"none\"\n                style={{ transition: 'x 0.9s cubic-bezier(0.4,0,0.2,1), y 0.9s cubic-bezier(0.4,0,0.2,1)' }}\n              >\n                {s.label}\n              </text>\n            )}\n          </g>\n        );\n      })}\n    </g>\n  );\n}\n\n\n/* ── MAP PANEL ── */\nfunction MapPanel({ activeEventId, onStep, onEventChange }) {\n  const ev      = DATA.events.find(e => e.id === activeEventId);\n  const locId   = ev?.location_id;\n  const states  = useMemo(() => personStateAt(activeEventId), [activeEventId]);\n  const loc     = DATA.locations.find(l => l.id === locId);\n  const activeIndex = DATA.timeline.findIndex(t => t.event_id === activeEventId);\n\n  // Track previous event's states to show trail\n  const prevStatesRef = useRef(null);\n  const prevEventRef  = useRef(null);\n  const [prevStates, setPrevStates] = useState(null);\n\n  useEffect(() => {\n    if (prevEventRef.current !== activeEventId) {\n      setPrevStates(prevStatesRef.current);\n      prevStatesRef.current = states;\n      prevEventRef.current  = activeEventId;\n    }\n  }, [activeEventId, states]);\n\n  const legendItems = Object.entries(states).filter(([, s]) => s.active);\n\n  return (\n    <div className=\"map-col\">\n      {/* Event banner */}\n      <div className=\"map-event-banner\">\n        <div className=\"ban-verses\">{ev?.verses}</div>\n        <div className=\"ban-content\">\n          <div className=\"ban-title\">{ev?.title}</div>\n          <div className=\"ban-desc\">{ev?.description}</div>\n        </div>\n        {loc && (\n          <div className=\"ban-loc\">\n            <div className=\"ban-loc-dot\" />\n            {loc.name}\n          </div>\n        )}\n      </div>\n\n      {/* Map */}\n      <div className=\"map-svg-wrap\">\n        <svg className=\"map-svg\" viewBox={`0 0 ${VW} ${VH}`} preserveAspectRatio=\"xMidYMid meet\">\n          <Terrain />\n          <LocationMarkers activeLocId={locId} />\n          <PersonDots personStates={states} prevStates={prevStates} />\n        </svg>\n      </div>\n\n      <div className=\"map-controls-panel\">\n        {/* Person legend */}\n        <div className=\"map-person-legend\">\n          {legendItems.map(([pid, s]) => (\n            <div key={pid} className={`map-leg-item ${s.faded ? 'faded' : ''}`}>\n              <div className=\"map-leg-dot\" style={{ background: s.color }} />\n              <span>{s.label}</span>\n            </div>\n          ))}\n        </div>\n\n        <div className=\"map-playback\">\n          <div className=\"playback-top\">\n            <div className=\"playback-label\">{activeIndex + 1}. {ev?.timeline_label || ev?.title}</div>\n            <div className=\"playback-buttons\">\n              <button className=\"playback-btn\" type=\"button\" aria-label={INITIAL_LANG === 'da' ? 'Forrige begivenhed' : 'Previous event'} onClick={() => onStep(-1)}>‹</button>\n              <button className=\"playback-btn\" type=\"button\" aria-label={INITIAL_LANG === 'da' ? 'Næste begivenhed' : 'Next event'} onClick={() => onStep(1)}>›</button>\n            </div>\n          </div>\n          <div className=\"playback-track\" style={{ '--step-count': DATA.timeline.length }}>\n            {DATA.timeline.map((tl, idx) => (\n              <button\n                key={tl.event_id}\n                type=\"button\"\n                className={`playback-step${idx < activeIndex ? ' done' : ''}${idx === activeIndex ? ' active' : ''}`}\n                aria-label={`${INITIAL_LANG === 'da' ? 'Gå til' : 'Go to'} ${tl.label}`}\n                onClick={() => onEventChange(tl.event_id)}\n              >\n                <span className=\"playback-step-time\">{compactTimeLabel(ABSOLUTE_TIMES[tl.event_id]?.date || tl.relative_time, shouldShowYear(tl, idx))}</span>\n              </button>\n            ))}\n          </div>\n        </div>\n      </div>\n\n      <div className=\"map-corner-label\">{UI_TEXT.mapCorner || 'Jerusalem Region · c. AD 30'}</div>\n    </div>\n  );\n}\n\n/* ── TIMELINE PANEL ── */\nfunction TimelinePanel({ activeEventId, onEventChange }) {\n  const scrollRef = useRef(null);\n  const entryRefs = useRef({});\n  const observing = useRef(false);\n\n  // IntersectionObserver: set active event as entries scroll into view\n  useEffect(() => {\n    const root = scrollRef.current;\n    if (!root) return;\n    const scores = {};\n    const obs = new IntersectionObserver(entries => {\n      entries.forEach(e => { scores[e.target.dataset.eid] = e.intersectionRatio; });\n      if (!observing.current) return;\n      const best = Object.entries(scores).sort((a,b) => b[1]-a[1])[0];\n      if (best && best[1] > 0.15) onEventChange(best[0]);\n    }, { root, threshold: [0.1, 0.3, 0.5], rootMargin: '-20% 0px -55% 0px' });\n\n    Object.values(entryRefs.current).forEach(el => el && obs.observe(el));\n    return () => obs.disconnect();\n  }, [onEventChange]);\n\n  const handleClick = useCallback((eid) => {\n    observing.current = false;\n    onEventChange(eid);\n    const el = entryRefs.current[eid];\n    if (el && scrollRef.current) {\n      scrollRef.current.scrollTo({ top: el.offsetTop - 30, behavior: 'smooth' });\n    }\n    setTimeout(() => { observing.current = true; }, 800);\n  }, [onEventChange]);\n\n  const handleWheel = useCallback((event) => {\n    const root = scrollRef.current;\n    if (!root || event.deltaY <= 0) return;\n    const nearBottom = root.scrollTop + root.clientHeight >= root.scrollHeight - 8;\n    if (nearBottom) window.top.location.href = '/bible/acts/002';\n  }, []);\n\n  useEffect(() => {\n    const el = entryRefs.current[activeEventId];\n    const root = scrollRef.current;\n    if (!el || !root) return;\n    observing.current = false;\n    root.scrollTo({ top: Math.max(0, el.offsetTop - 46), behavior: 'smooth' });\n    const timer = setTimeout(() => { observing.current = true; }, 900);\n    return () => clearTimeout(timer);\n  }, [activeEventId]);\n\n  return (\n    <div className=\"tl-col\">\n      <div className=\"tl-chapter-strip\">\n        <div className=\"tl-ch-label\">{UI_TEXT.shortBook || 'Acts'} · {INITIAL_LANG === 'da' ? 'Kapitel' : 'Chapter'} 1</div>\n        <div className=\"tl-ch-title\">{UI_TEXT.timelineTitle ? <>{UI_TEXT.timelineTitle[0]} <em>{UI_TEXT.timelineTitle[1]}</em></> : <>Waiting for <em>the Promise</em></>}</div>\n      </div>\n\n      <div className=\"tl-list\" ref={scrollRef} onWheel={handleWheel}>\n        <div className=\"tl-spine\">\n          {DATA.timeline.map((tl, idx) => {\n            const ev = DATA.events.find(e => e.id === tl.event_id);\n            if (!ev) return null;\n            const active = activeEventId === tl.event_id;\n            const timeInfo = ABSOLUTE_TIMES[tl.event_id];\n            // Year badges: one before prologue (composition date), one before the AD30 events\n            const showYearBadge = idx === 0 || idx === 1;\n            const yearLabel = UI_TEXT.yearBadges?.[idx === 0 ? 0 : 1] || (idx === 0 ? 'c. AD 62–80 — Written' : 'Spring AD 30 — Events');\n            return (\n              <React.Fragment key={tl.event_id}>\n                {showYearBadge && (\n                  <div className=\"tl-year-sep\">\n                    <div className=\"tl-year-badge\">{yearLabel}</div>\n                    <div className=\"tl-year-line\" />\n                  </div>\n                )}\n                <div\n                  ref={el => entryRefs.current[tl.event_id] = el}\n                  data-eid={tl.event_id}\n                  data-screen-label={`${idx+1}. ${tl.label}`}\n                  className={`tl-item${active ? ' active' : ''}`}\n                  onClick={() => handleClick(tl.event_id)}\n                >\n                  <div className=\"tl-l\">\n                    <div className=\"tl-seq\">{String(tl.position).padStart(2,'0')}</div>\n                    <div className=\"tl-dot\"><div className=\"tl-dot-pip\" /></div>\n                  </div>\n                  <div className=\"tl-r\">\n                    <div className=\"tl-date\">{timeInfo?.date || ''}</div>\n                    <div className=\"tl-rel-time\">{timeInfo?.period || tl.relative_time}</div>\n                    <div className=\"tl-ev-title\">{tl.label}</div>\n                    <div className=\"tl-ev-verses\">{ev.verses}</div>\n                  </div>\n                </div>\n              </React.Fragment>\n            );\n          })}\n          {/* bottom pad — extra tall so last item can fully scroll into the trigger zone */}\n          <div style={{ height: 'calc(100vh - 200px)' }} />\n        </div>\n      </div>\n    </div>\n  );\n}\n\n/* ── APP ── */\nfunction App() {\n  const firstTimelineEvent = DATA.timeline[0]?.event_id || DATA.events[0]?.id;\n  const [activeEv, setActiveEv] = useState(firstTimelineEvent);\n\n  useEffect(() => {\n    document.body.className = 'theme-a';\n    document.documentElement.lang = INITIAL_LANG;\n    document.title = `${DATA.book} ${INITIAL_LANG === 'da' ? 'kapitel' : 'Chapter'} 1 — ${DATA.chapter_title}`;\n    localStorage.setItem('bf-theme', 'a');\n  }, []);\n\n  const handleEventChange = useCallback(id => setActiveEv(id), []);\n  const stepEvent = useCallback((dir) => {\n    setActiveEv(prev => {\n      const current = DATA.timeline.findIndex(t => t.event_id === prev);\n      if (dir > 0 && current === DATA.timeline.length - 1) {\n        window.top.location.href = '/bible/acts/002';\n        return prev;\n      }\n      const next = (current + dir + DATA.timeline.length) % DATA.timeline.length;\n      return DATA.timeline[next].event_id;\n    });\n  }, []);\n\n  return (\n    <div className=\"app\">\n      {/* Header */}\n      <div className=\"header\">\n        <span className=\"hdr-book\">{UI_TEXT.shortBook || 'Acts'} · {INITIAL_LANG === 'da' ? 'Kap.' : 'Ch.'} 1</span>\n        <span className=\"hdr-title\">{DATA.chapter_title}</span>\n        <span className=\"hdr-sub\">{UI_TEXT.headerSub || '— Spring AD 30'}</span>\n        <div className=\"hdr-space\" />\n        <a className=\"home-link\" href=\"/bible\" target=\"_top\">\n          {INITIAL_LANG === 'da' ? 'Hjem' : 'Home'}\n        </a>\n        <button className=\"lang-btn\" type=\"button\" onClick={() => setLanguage(INITIAL_LANG === 'da' ? 'en' : 'da')}>\n          {INITIAL_LANG === 'da' ? 'En' : 'Da'}\n        </button>\n      </div>\n\n      {/* Body */}\n      <div className=\"body\">\n        <TimelinePanel activeEventId={activeEv} onEventChange={handleEventChange} />\n        <MapPanel\n          activeEventId={activeEv}\n          onStep={stepEvent}\n          onEventChange={handleEventChange}\n        />\n      </div>\n    </div>\n  );\n}\n\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>\n";
const CHAPTER_002_HTML = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>Acts Chapter 2 — Fire from Heaven</title>\n<link href=\"https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Barlow:wght@300;400;500;600&display=swap\" rel=\"stylesheet\" />\n<script src=\"https://unpkg.com/react@18.3.1/umd/react.development.js\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"><\/script>\n<script src=\"https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"><\/script>\n<script src=\"https://unpkg.com/@babel/standalone@7.29.0/babel.min.js\" integrity=\"sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y\" crossorigin=\"anonymous\"><\/script>\n<script>\nconst ACTS_CH2 = {\n  \"book\": \"Acts\",\n  \"chapter\": 2,\n  \"chapter_title\": \"Fire from Heaven\",\n  \"chapter_summary\": \"On the Jewish festival of Pentecost, the Holy Spirit descends on Jesus's followers with the sound of rushing wind and tongues of fire, enabling them to speak in languages they had never learned. Peter stands up and delivers the first public Christian sermon, explaining that Jesus was the promised Messiah who rose from the dead, and about three thousand people are baptized that day. The new community of believers begins sharing their possessions, meeting daily in the temple, and gathering in one another's homes.\",\n  \"date_range\": {\n    \"approximate\": \"Late Spring AD 30 (or AD 33)\",\n    \"notes\": \"Pentecost falls fifty days after Passover; most scholars date the crucifixion to AD 30 or AD 33, placing Pentecost in late May or early June of that year.\"\n  },\n  \"persons\": [\n    {\n      \"id\": \"holy_spirit\",\n      \"name\": \"The Holy Spirit\",\n      \"role\": \"Divine Agent\",\n      \"first_mention_verse\": \"2:4\",\n      \"summary\": \"The Holy Spirit descends on the gathered believers as tongues of fire and empowers them to speak in other languages. This fulfills Jesus's promise from chapter 1 and marks the birth of the church as a Spirit-empowered community.\",\n      \"significance\": \"The Holy Spirit is the animating power behind virtually every major event in Acts — healings, bold proclamation, visions, and the inclusion of Gentiles all flow from the Spirit's activity.\"\n    },\n    {\n      \"id\": \"peter\",\n      \"name\": \"Peter\",\n      \"role\": \"Apostle, Preacher\",\n      \"first_mention_verse\": \"2:14\",\n      \"summary\": \"Peter stands before the crowd that has gathered in response to the Pentecost phenomenon and delivers a sermon drawing on Hebrew scripture to argue that Jesus's resurrection fulfills God's ancient promises. His preaching results in roughly three thousand conversions.\",\n      \"significance\": \"Peter is the dominant human voice in the first half of Acts; his Pentecost sermon establishes the core pattern of early Christian proclamation — death, resurrection, fulfillment of prophecy, call to repentance.\"\n    },\n    {\n      \"id\": \"the_eleven\",\n      \"name\": \"The Eleven (Apostles)\",\n      \"role\": \"Apostles, Group\",\n      \"first_mention_verse\": \"2:14\",\n      \"summary\": \"The eleven remaining apostles plus Matthias stand together with Peter as he addresses the crowd, presenting a united front as the authoritative witnesses to Jesus's resurrection. They had all been gathered in one place when the Spirit fell.\",\n      \"significance\": \"The apostles serve throughout Acts as the eyewitness foundation of the church's testimony; their shared experience at Pentecost authorizes their subsequent proclamation.\"\n    },\n    {\n      \"id\": \"devout_jews\",\n      \"name\": \"Devout Jews from Every Nation\",\n      \"role\": \"Crowd, Group\",\n      \"first_mention_verse\": \"2:5\",\n      \"summary\": \"Jewish pilgrims from across the Roman world who had come to Jerusalem for Pentecost hear the disciples speaking in their own native languages. Their amazement draws a larger crowd and sets the stage for Peter's sermon.\",\n      \"significance\": \"Their presence means the gospel's first explosion reaches a diaspora audience, and those who convert will carry the message back to their home countries throughout the empire.\"\n    },\n    {\n      \"id\": \"david\",\n      \"name\": \"David\",\n      \"role\": \"Hebrew King, Prophet (referenced)\",\n      \"first_mention_verse\": \"2:25\",\n      \"summary\": \"Peter quotes extensively from Psalms attributed to David, arguing that David foresaw and foretold the resurrection of the Messiah. David functions as a prophetic authority whose ancient words are presented as finding their fulfillment in Jesus.\",\n      \"significance\": \"David's role as a prophetic ancestor of the Messiah is a recurring argument in Acts; Peter's use of Psalm 16 and Psalm 110 establishes the scriptural template for the church's apologetics throughout the book.\"\n    },\n    {\n      \"id\": \"joel\",\n      \"name\": \"Joel (the Prophet)\",\n      \"role\": \"Prophet (referenced)\",\n      \"first_mention_verse\": \"2:16\",\n      \"summary\": \"Peter quotes from Joel chapter 2 to explain that the outpouring of the Spirit on all people, including visions and prophecy among sons, daughters, and servants, is exactly what Joel predicted would happen in the last days. Joel's text is the primary hermeneutical key for understanding Pentecost.\",\n      \"significance\": \"The citation of Joel grounds the charismatic Pentecost event in the Hebrew prophetic tradition, making the case that Christianity is the fulfillment of Israel's story rather than a departure from it.\"\n    },\n    {\n      \"id\": \"new_believers\",\n      \"name\": \"The Three Thousand Converts\",\n      \"role\": \"New Believers, Group\",\n      \"first_mention_verse\": \"2:41\",\n      \"summary\": \"Approximately three thousand people respond to Peter's sermon by repenting and being baptized, and they are added to the community of believers that same day. They immediately begin participating in the apostles' teaching, communal meals, and prayer.\",\n      \"significance\": \"Their mass conversion represents the inaugural harvest of the church's mission and establishes the pattern of community life — shared resources, worship, and table fellowship — that Acts presents as the ideal.\"\n    },\n    {\n      \"id\": \"mockers\",\n      \"name\": \"Mockers in the Crowd\",\n      \"role\": \"Antagonists, Group\",\n      \"first_mention_verse\": \"2:13\",\n      \"summary\": \"Some in the crowd dismiss the disciples' behavior by accusing them of being drunk on new wine. Their mockery prompts Peter to begin his defense and explanation of the Pentecost event.\",\n      \"significance\": \"Skeptical opposition appears at the very first public act of the church, foreshadowing the pattern of resistance to the gospel that runs throughout the entire book of Acts.\"\n    }\n  ],\n  \"locations\": [\n    {\n      \"id\": \"jerusalem\",\n      \"name\": \"Jerusalem\",\n      \"modern_name\": \"Jerusalem, Israel\",\n      \"lat\": 31.7683,\n      \"lng\": 35.2137,\n      \"description\": \"The holy city of Judaism and the geographic center of Acts chapters 1–7, where the disciples were commanded to wait and where the church is born.\"\n    },\n    {\n      \"id\": \"upper_room_or_temple\",\n      \"name\": \"The House Where They Were Sitting\",\n      \"modern_name\": \"disputed\",\n      \"lat\": 31.772,\n      \"lng\": 35.229,\n      \"description\": \"The building in Jerusalem where the disciples were gathered when the Spirit fell; tradition identifies this with the Upper Room on Mount Zion, though Acts 2 does not specify.\"\n    },\n    {\n      \"id\": \"temple_area\",\n      \"name\": \"The Temple / Solomon's Portico Area\",\n      \"modern_name\": \"Temple Mount, Jerusalem\",\n      \"lat\": 31.7781,\n      \"lng\": 35.2354,\n      \"description\": \"The great Jerusalem temple complex where the new believers gathered daily for prayer and teaching after Pentecost.\"\n    }\n  ],\n  \"events\": [\n    {\n      \"id\": \"spirit_descends\",\n      \"sequence\": 1,\n      \"verses\": \"2:1-4\",\n      \"title\": \"The Holy Spirit Descends at Pentecost\",\n      \"description\": \"While all the believers are gathered together on the day of Pentecost, a sound like a violent rushing wind fills the entire house. What appear to be tongues of fire separate and rest on each person present. Everyone is filled with the Holy Spirit and begins speaking in other languages as the Spirit enables them. This is the fulfillment of Jesus's promise that the disciples would be baptized with the Holy Spirit.\",\n      \"location_id\": \"upper_room_or_temple\",\n      \"persons_present\": [\n        \"holy_spirit\",\n        \"peter\",\n        \"the_eleven\"\n      ],\n      \"timeline_label\": \"Spirit Falls\",\n      \"scroll_anchor\": \"spirit-descends\",\n      \"visual_notes\": \"Interior of a first-century Jerusalem house, roof open to a rush of wind, individual tongues of flame hovering over seated figures, expressions of awe and surprise; warm golden-orange palette.\"\n    },\n    {\n      \"id\": \"crowd_gathers\",\n      \"sequence\": 2,\n      \"verses\": \"2:5-13\",\n      \"title\": \"The Multilingual Crowd Gathers\",\n      \"description\": \"The noise draws a large crowd of Jewish pilgrims from every nation who are staying in Jerusalem for the festival. Each person hears the disciples speaking in their own native language, and the crowd is bewildered and amazed. They list off the many regions and countries they come from — Parthia, Media, Mesopotamia, Egypt, Rome, Crete, Arabia — and ask what this means. Some, however, dismiss the phenomenon by saying the disciples are drunk.\",\n      \"location_id\": \"upper_room_or_temple\",\n      \"persons_present\": [\n        \"devout_jews\",\n        \"mockers\",\n        \"peter\",\n        \"the_eleven\"\n      ],\n      \"timeline_label\": \"Crowd Assembles\",\n      \"scroll_anchor\": \"crowd-gathers\",\n      \"visual_notes\": \"Wide outdoor scene in a Jerusalem street or courtyard, diverse crowd in period dress representing different regions, faces expressing wonder and confusion, some laughing dismissively; map inset showing diaspora origins.\"\n    },\n    {\n      \"id\": \"peters_sermon\",\n      \"sequence\": 3,\n      \"verses\": \"2:14-36\",\n      \"title\": \"Peter's Pentecost Sermon\",\n      \"description\": \"Peter stands up with the eleven and raises his voice to address the crowd. He dismisses the drunkenness accusation by noting it is only nine in the morning, then quotes the prophet Joel to explain that the Spirit outpouring fulfills ancient prophecy about the last days. He moves on to testify about Jesus — his miracles, his crucifixion at their hands, and his resurrection from the dead as foretold by King David. Peter argues from Psalm 16 that David predicted the resurrection and from Psalm 110 that Jesus has been exalted to God's right hand and has poured out the Spirit they are now witnessing. He concludes by declaring that God has made Jesus both Lord and Messiah.\",\n      \"location_id\": \"upper_room_or_temple\",\n      \"persons_present\": [\n        \"peter\",\n        \"the_eleven\",\n        \"devout_jews\",\n        \"mockers\"\n      ],\n      \"timeline_label\": \"Peter Preaches\",\n      \"scroll_anchor\": \"peters-sermon\",\n      \"visual_notes\": \"Peter standing elevated above the crowd, arm outstretched, scroll or gesture toward sky; crowd of dozens around him in outdoor temple-area setting; sidebar showing Joel 2 and Psalm 16 text excerpts.\"\n    },\n    {\n      \"id\": \"crowd_responds\",\n      \"sequence\": 4,\n      \"verses\": \"2:37-40\",\n      \"title\": \"The Crowd Is Cut to the Heart\",\n      \"description\": \"The crowd is deeply moved — Luke says they were 'cut to the heart' — and asks Peter and the other apostles what they should do. Peter tells them to repent and be baptized in the name of Jesus Christ for the forgiveness of their sins, and they too will receive the gift of the Holy Spirit. He explains that the promise is for them, their children, and everyone whom the Lord calls. Peter continues urging them with many other words, warning them to save themselves from this corrupt generation.\",\n      \"location_id\": \"upper_room_or_temple\",\n      \"persons_present\": [\n        \"peter\",\n        \"the_eleven\",\n        \"devout_jews\"\n      ],\n      \"timeline_label\": \"Call to Repent\",\n      \"scroll_anchor\": \"crowd-responds\",\n      \"visual_notes\": \"Close-up of crowd faces showing conviction and urgency; Peter gesturing toward a pool or water source; emotional, low-angle perspective conveying the weight of the moment.\"\n    },\n    {\n      \"id\": \"mass_baptism\",\n      \"sequence\": 5,\n      \"verses\": \"2:41\",\n      \"title\": \"Three Thousand Are Baptized\",\n      \"description\": \"About three thousand people accept Peter's message, are baptized, and are added to the community of believers that same day. This single day's harvest represents the inaugural explosion of the new movement. The scale of the response signals that the Spirit-empowered proclamation has decisive public effect.\",\n      \"location_id\": \"jerusalem\",\n      \"persons_present\": [\n        \"peter\",\n        \"the_eleven\",\n        \"new_believers\"\n      ],\n      \"timeline_label\": \"3,000 Baptized\",\n      \"scroll_anchor\": \"mass-baptism\",\n      \"visual_notes\": \"Panoramic scene at the Pool of Siloam or temple mikveh pools, dozens of people wading in, apostles assisting; late afternoon golden light, sense of joyful urgency.\"\n    },\n    {\n      \"id\": \"community_life\",\n      \"sequence\": 6,\n      \"verses\": \"2:42-47\",\n      \"title\": \"The First Christian Community\",\n      \"description\": \"The new believers devote themselves to four practices: the apostles' teaching, communal fellowship, breaking of bread (likely a shared meal including the Lord's Supper), and prayer. Many signs and wonders are performed by the apostles, inspiring awe throughout the city. All the believers hold their possessions loosely, selling property and goods to give to anyone in need. They meet daily in the temple courts and share meals in each other's homes with glad and sincere hearts, praising God. As a result, the Lord adds to their number daily those who are being saved.\",\n      \"location_id\": \"temple_area\",\n      \"persons_present\": [\n        \"peter\",\n        \"the_eleven\",\n        \"new_believers\"\n      ],\n      \"timeline_label\": \"Community Forms\",\n      \"scroll_anchor\": \"community-life\",\n      \"visual_notes\": \"Split-panel: left shows large group in temple portico listening to teaching; right shows small group around a table sharing a meal in a home, bread and cup visible; warm, intimate lighting.\"\n    }\n  ],\n  \"routes\": [\n    {\n      \"person_id\": \"peter\",\n      \"path\": [\n        {\n          \"order\": 1,\n          \"location_id\": \"upper_room_or_temple\",\n          \"event_id\": \"spirit_descends\",\n          \"note\": \"Present in the gathering place when the Spirit falls\"\n        },\n        {\n          \"order\": 2,\n          \"location_id\": \"upper_room_or_temple\",\n          \"event_id\": \"crowd_gathers\",\n          \"note\": \"Stands with the eleven as the crowd assembles outside\"\n        },\n        {\n          \"order\": 3,\n          \"location_id\": \"upper_room_or_temple\",\n          \"event_id\": \"peters_sermon\",\n          \"note\": \"Rises to address the crowd publicly\"\n        },\n        {\n          \"order\": 4,\n          \"location_id\": \"jerusalem\",\n          \"event_id\": \"mass_baptism\",\n          \"note\": \"Oversees the baptism of three thousand converts\"\n        },\n        {\n          \"order\": 5,\n          \"location_id\": \"temple_area\",\n          \"event_id\": \"community_life\",\n          \"note\": \"Teaches daily in the temple as part of the new community\"\n        }\n      ]\n    },\n    {\n      \"person_id\": \"devout_jews\",\n      \"path\": [\n        {\n          \"order\": 1,\n          \"location_id\": \"jerusalem\",\n          \"event_id\": \"crowd_gathers\",\n          \"note\": \"Pilgrims already in Jerusalem for Pentecost are drawn by the noise\"\n        },\n        {\n          \"order\": 2,\n          \"location_id\": \"upper_room_or_temple\",\n          \"event_id\": \"peters_sermon\",\n          \"note\": \"Gather around Peter to hear his explanation\"\n        },\n        {\n          \"order\": 3,\n          \"location_id\": \"jerusalem\",\n          \"event_id\": \"mass_baptism\",\n          \"note\": \"Those who respond are baptized the same day\"\n        }\n      ]\n    }\n  ],\n  \"timeline\": [\n    {\n      \"event_id\": \"spirit_descends\",\n      \"position\": 1,\n      \"label\": \"Spirit Falls\",\n      \"relative_time\": \"Morning of Pentecost (before 9am)\",\n      \"absolute_time\": \"Late May or early June, AD 30 or 33\"\n    },\n    {\n      \"event_id\": \"crowd_gathers\",\n      \"position\": 2,\n      \"label\": \"Crowd Assembles\",\n      \"relative_time\": \"Shortly after 9am\",\n      \"absolute_time\": \"Same morning\"\n    },\n    {\n      \"event_id\": \"peters_sermon\",\n      \"position\": 3,\n      \"label\": \"Sermon Delivered\",\n      \"relative_time\": \"Mid-morning\",\n      \"absolute_time\": \"Same morning\"\n    },\n    {\n      \"event_id\": \"crowd_responds\",\n      \"position\": 4,\n      \"label\": \"Call to Repentance\",\n      \"relative_time\": \"Immediately following sermon\",\n      \"absolute_time\": \"Same morning\"\n    },\n    {\n      \"event_id\": \"mass_baptism\",\n      \"position\": 5,\n      \"label\": \"3,000 Baptized\",\n      \"relative_time\": \"That same day\",\n      \"absolute_time\": \"Pentecost, AD 30 or 33\"\n    },\n    {\n      \"event_id\": \"community_life\",\n      \"position\": 6,\n      \"label\": \"Church Community Established\",\n      \"relative_time\": \"The days following Pentecost\",\n      \"absolute_time\": \"Summer AD 30 or 33 onward\"\n    }\n  ],\n  \"theological_themes\": [\n    \"Fulfillment of Hebrew prophecy\",\n    \"The Holy Spirit as the defining mark of the new age\",\n    \"Repentance and baptism as entry into the community\",\n    \"Resurrection of Jesus as the heart of the gospel\",\n    \"Communal generosity and shared life\",\n    \"Universal reach of the Spirit across nations and languages\"\n  ],\n  \"discussion_questions\": [\n    \"Why does Peter use so much Hebrew scripture to explain the Pentecost event — what does that tell us about his audience and strategy?\",\n    \"The community in 2:42-47 is often called an ideal — is that a realistic model for communities today, or is it unique to that moment?\",\n    \"What is the significance of the Spirit enabling speech in foreign languages specifically — why language, and why those particular languages?\",\n    \"Peter's sermon makes Jesus's death partly the responsibility of the crowd (2:23, 2:36) — how does the crowd's response of being 'cut to the heart' function in the narrative?\",\n    \"How does the description of daily communal life in 2:44-46 challenge or confirm common ideas about what church is supposed to look like?\"\n  ]\n};\n\n<\/script>\n<style>\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body, #root { height: 100%; overflow: hidden; }\n\n/* ── THEMES ── */\nbody.theme-a {\n  --bg:        oklch(96% 0.018 78);\n  --bg-alt:    oklch(91% 0.022 74);\n  --bg-dark:   oklch(16% 0.02 55);\n  --fg:        oklch(18% 0.02 55);\n  --fg-muted:  oklch(50% 0.018 60);\n  --accent:    oklch(58% 0.19 46);\n  --border:    oklch(84% 0.022 72);\n  --card:      oklch(99.5% 0.008 80);\n  --map-water: oklch(72% 0.08 220);\n  --map-land:  oklch(88% 0.04 94);\n  --map-road:  oklch(68% 0.06 70);\n  --map-judea: oklch(85% 0.05 88);\n  --map-border:oklch(55% 0.06 50);\n  --tl-bg:     oklch(18% 0.02 55);\n  --tl-fg:     oklch(95% 0.012 78);\n}\nbody { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--fg); }\n\n/* ── PAGE SKELETON ── */\n/* header / [timeline | map] stacked vertically */\n.app {\n  height: 100vh;\n  display: grid;\n  grid-template-rows: 50px 1fr;\n  overflow: hidden;\n}\n\n/* ── HEADER ── */\n.header {\n  background: var(--bg-dark);\n  padding: 0 28px;\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  border-bottom: 2px solid var(--accent);\n  z-index: 20;\n  overflow: hidden;\n  white-space: nowrap;\n}\n.hdr-book { font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); }\n.hdr-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:oklch(95% .012 78); white-space:nowrap; }\n.hdr-sub { font-family:'Lora',serif; font-style:italic; font-size:12px; color:oklch(65% .012 70); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }\n.hdr-space { flex:1; }\n.home-link {\n  color: oklch(95% .012 78);\n  text-decoration: none;\n  font-size: 10px;\n  font-weight: 800;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  padding: 6px 9px;\n  border: 1px solid oklch(58% 0.19 46 / .65);\n  border-radius: 3px;\n  background: oklch(22% 0.02 55);\n}\n.lang-btn {\n  border: 1px solid oklch(58% 0.19 46 / .65);\n  background: oklch(22% 0.02 55);\n  color: oklch(95% .012 78);\n  font-size: 10px;\n  font-weight: 800;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  padding: 6px 9px;\n  border-radius: 3px;\n  cursor: pointer;\n}\n/* ── BODY: timeline left, map right ── */\n.body {\n  display: grid;\n  grid-template-columns: 240px 1fr;\n  overflow: hidden;\n}\n\n/* ── TIMELINE COLUMN ── */\n.tl-col {\n  background: var(--tl-bg);\n  color: var(--tl-fg);\n  display: flex;\n  flex-direction: column;\n  overflow: hidden;\n  border-right: 1px solid oklch(28% .015 255);\n  min-width: 0;\n}\n\n/* Chapter label strip */\n.tl-chapter-strip {\n  padding: 14px 18px 12px;\n  border-bottom: 1px solid oklch(28% .015 255);\n  flex-shrink: 0;\n}\n.tl-ch-label {\n  font-size: 9px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;\n  color: var(--accent); margin-bottom:4px;\n}\n.tl-ch-title {\n  font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800;\n  text-transform:uppercase; line-height:1.1; color:var(--tl-fg);\n  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\n}\n.tl-ch-title em { color:var(--accent); font-style:normal; }\n\n/* Scrollable event list */\n.tl-list {\n  flex: 1;\n  overflow-y: auto;\n  overflow-x: hidden;\n  position: relative;\n}\n.tl-list::-webkit-scrollbar { width:3px; }\n.tl-list::-webkit-scrollbar-thumb { background:oklch(36% .015 255); border-radius:2px; }\n\n/* Vertical spine */\n.tl-spine {\n  padding: 8px 0 80px;\n  position: relative;\n}\n.tl-spine::before {\n  content:'';\n  position:absolute;\n  left: 38px;\n  top:0; bottom:0;\n  width:2px;\n  background: linear-gradient(to bottom, transparent, oklch(36% .015 255) 5%, oklch(36% .015 255) 95%, transparent);\n}\n\n/* Year separator badge */\n.tl-year-sep {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 10px 10px 6px 14px;\n  position: relative;\n  z-index: 2;\n}\n.tl-year-badge {\n  font-family: 'Barlow Condensed', sans-serif;\n  font-size: 11px;\n  font-weight: 800;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n  color: var(--accent);\n  background: oklch(22% .018 255);\n  border: 1px solid oklch(36% .015 255);\n  padding: 2px 10px;\n  border-radius: 2px;\n  white-space: nowrap;\n  position: relative;\n  z-index: 2;\n}\nbody.theme-a .tl-year-badge { background: oklch(22% .018 55); border-color: oklch(36% .015 55); }\n.tl-year-line {\n  flex: 1;\n  height: 1px;\n  background: oklch(30% .012 255);\n  opacity: .5;\n}\n\n/* Each item — tall so scroll is slow and deliberate */\n.tl-item {\n  display: grid;\n  grid-template-columns: 76px 1fr;\n  cursor: pointer;\n  position: relative;\n  transition: background .15s;\n  padding-right: 4px;\n  min-height: 130px;\n}\n.tl-item:hover { background: oklch(22% .015 255 / 0.6); }\n.tl-item.active { background: oklch(22% .018 255 / 0.8); }\nbody.theme-a .tl-item:hover { background: oklch(22% .015 255 / 0.5); }\nbody.theme-a .tl-item.active { background: oklch(20% .018 55 / 0.8); }\n\n/* left: seq number + dot */\n.tl-l {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  padding-top: 14px;\n}\n.tl-seq {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:10px; font-weight:700;\n  color: oklch(45% .01 255);\n  margin-bottom:5px;\n  letter-spacing:.05em;\n}\n.tl-item.active .tl-seq { color: var(--accent); }\n.tl-dot {\n  width:16px; height:16px; border-radius:50%;\n  border:2px solid oklch(38% .015 255);\n  background: oklch(16% .018 255);\n  position:relative; z-index:1;\n  transition: all .28s;\n  display:flex; align-items:center; justify-content:center;\n  flex-shrink:0;\n}\nbody.theme-a .tl-dot { background: oklch(22% .018 55); border-color: oklch(36% .015 55); }\n.tl-item.active .tl-dot {\n  border-color: var(--accent);\n  background: var(--accent);\n  box-shadow: 0 0 0 3px oklch(58% .19 46 / .2);\n}\n.tl-dot-pip {\n  width:5px; height:5px; border-radius:50%; background:#fff;\n  opacity:0; transition:opacity .28s;\n}\n.tl-item.active .tl-dot-pip { opacity:1; }\n\n/* right: text */\n.tl-r {\n  padding: 22px 10px 22px 6px;\n  border-bottom: 1px solid oklch(24% .012 255);\n}\n.tl-item:last-child .tl-r { border-bottom: none; }\n.tl-date {\n  font-size:11px; font-weight:800; letter-spacing:.1em;\n  font-family:'Barlow Condensed',sans-serif;\n  color: oklch(70% .018 76); margin-bottom:3px;\n}\n.tl-item.active .tl-date { color: var(--accent); }\n.tl-rel-time {\n  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;\n  line-height:1.35;\n  color: oklch(72% .014 78); margin-bottom:6px;\n}\n.tl-item.active .tl-rel-time { color: oklch(82% .035 74); }\n.tl-ev-title {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:15px; font-weight:800; text-transform:uppercase;\n  line-height:1.18; color: var(--tl-fg);\n  margin-bottom: 4px;\n}\n.tl-ev-verses {\n  font-size:10px; font-weight:700; letter-spacing:.1em;\n  color: oklch(68% .018 76); margin-top:2px;\n}\n.tl-item.active .tl-ev-verses { color: var(--accent); }\n\n/* ── MAP COLUMN ── */\n.map-col {\n  position: relative;\n  background: var(--map-land);\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n  min-width: 0;\n}\n\n/* Event banner at top of map */\n.map-event-banner {\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  z-index: 10;\n  background: oklch(16% 0.02 55 / 0.92);\n  border-bottom: 2px solid var(--accent);\n  padding: 12px 20px;\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 0 16px;\n  align-items: center;\n  backdrop-filter: blur(6px);\n  transition: background .3s;\n}\n.ban-verses {\n  font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;\n  color:var(--accent); white-space:nowrap;\n}\n.ban-content {}\n.ban-title {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:18px; font-weight:800; text-transform:uppercase;\n  letter-spacing:.04em; color:oklch(95% .012 78);\n  line-height:1.1; margin-bottom:4px;\n}\n.ban-desc {\n  font-family:'Lora',serif; font-style:normal;\n  font-size:13px; line-height:1.55;\n  color:oklch(88% .014 78);\n  display: block;\n  overflow: visible;\n}\n.ban-loc {\n  display:flex; align-items:center; gap:5px;\n  font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;\n  color:oklch(55% .012 70); white-space:nowrap;\n}\n.ban-loc-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }\n\n/* ── MAP SVG — fill panel, use xMidYMid slice so it always covers ── */\n.map-svg-wrap {\n  position: absolute;\n  inset: 0;\n}\n.map-svg {\n  width:100%; height:100%;\n}\n\n/* Person legend - bottom left of map */\n.map-person-legend {\n  position: absolute;\n  bottom: 18px;\n  left: 18px;\n  display: flex;\n  flex-direction: column;\n  gap: 5px;\n  z-index: 10;\n  pointer-events: none;\n}\n.map-leg-item {\n  display:flex; align-items:center; gap:7px;\n  font-size:10px; font-weight:600; letter-spacing:.06em;\n  color: var(--fg);\n  background: var(--card);\n  padding: 3px 10px 3px 7px;\n  border-radius:20px;\n  border:1px solid var(--border);\n  transition: opacity .5s, transform .4s;\n}\n.map-leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }\n.map-leg-item.faded { opacity:.3; }\n.map-leg-item.entering { animation: legEnter .4s ease forwards; }\n@keyframes legEnter {\n  from { opacity:0; transform:translateX(-8px); }\n  to   { opacity:1; transform:translateX(0); }\n}\n.map-controls-panel { display: contents; }\n\n/* Map overlay labels */\n.map-corner-label {\n  position:absolute; bottom:18px; right:18px;\n  font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;\n  color:var(--fg-muted); opacity:.5; z-index:5; pointer-events:none;\n}\n\n.map-playback {\n  position: absolute;\n  right: 18px;\n  bottom: 42px;\n  z-index: 12;\n  width: min(460px, calc(100% - 36px));\n  background: oklch(99.5% 0.008 80 / .9);\n  border: 1px solid var(--border);\n  box-shadow: 0 12px 34px oklch(10% 0.02 55 / .14);\n  padding: 10px 12px;\n  backdrop-filter: blur(8px);\n}\n.playback-top {\n  display:flex;\n  align-items:center;\n  justify-content:space-between;\n  gap:10px;\n  margin-bottom:9px;\n}\n.playback-label {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:11px;\n  font-weight:800;\n  letter-spacing:.16em;\n  text-transform:uppercase;\n  color:var(--fg-muted);\n  white-space:nowrap;\n  overflow:hidden;\n  text-overflow:ellipsis;\n}\n.playback-buttons { display:flex; gap:6px; flex-shrink:0; }\n.playback-btn {\n  width:30px;\n  height:26px;\n  border:1px solid var(--border);\n  background:var(--card);\n  color:var(--fg);\n  border-radius:3px;\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:13px;\n  font-weight:800;\n  cursor:pointer;\n  line-height:1;\n}\n.playback-track {\n  position:relative;\n  height:28px;\n  display:grid;\n  grid-template-columns:repeat(var(--step-count), 1fr);\n  align-items:center;\n  gap:0;\n}\n.playback-track::before {\n  content:'';\n  position:absolute;\n  left:10px; right:10px; top:13px;\n  height:2px;\n  background:var(--border);\n}\n.playback-step {\n  position:relative;\n  z-index:1;\n  justify-self:center;\n  width:20px;\n  height:20px;\n  border:0;\n  border-radius:50%;\n  background:transparent;\n  cursor:pointer;\n}\n.playback-step::before {\n  content:'';\n  position:absolute;\n  inset:5px;\n  border-radius:50%;\n  background:var(--fg-muted);\n  opacity:.42;\n  transition:all .24s;\n}\n.playback-step.done::before { background:var(--accent); opacity:.55; }\n.playback-step.active::before {\n  inset:2px;\n  background:var(--accent);\n  opacity:1;\n  box-shadow:0 0 0 5px oklch(58% .19 46 / .18);\n}\n.playback-step-time { display: none; }\n.loc-label {\n  paint-order: stroke;\n  stroke: oklch(98% 0.008 80 / .82);\n  stroke-width: 3px;\n  stroke-linejoin: round;\n}\n.person-name-label {\n  display: none;\n  paint-order: stroke;\n  stroke: oklch(16% 0.02 55 / .62);\n  stroke-width: 4px;\n  stroke-linejoin: round;\n}\n\n/* ── MOBILE ── */\n@media (max-width: 680px) {\n  /* Stack: map on top, timeline on bottom */\n  html, body, #root {\n    height: auto;\n    min-height: 100%;\n    overflow-x: hidden;\n    overflow-y: auto;\n  }\n\n  .app {\n    height: auto;\n    min-height: 100svh;\n    grid-template-rows: 44px auto;\n    overflow: visible;\n  }\n\n  .body {\n    grid-template-columns: 1fr;\n    grid-template-rows: auto 1fr;\n    overflow: visible;\n  }\n\n  /* Map moves to top row */\n  .map-col {\n    order: -1;\n    overflow: visible;\n  }\n\n  /* Tighten header */\n  .header { padding: 0 14px; gap: 8px; }\n  .hdr-sub { display: none; }\n  .hdr-title { font-size: 16px; }\n  .home-link,\n  .lang-btn {\n    padding: 5px 7px;\n    font-size: 9px;\n  }\n\n  /* Event banner with title, description, then map below */\n  .map-event-banner {\n    position: relative;\n    grid-template-columns: 1fr;\n    grid-template-rows: auto;\n    flex: 0 0 auto;\n    padding: 8px 12px 9px;\n    gap: 3px;\n  }\n  .ban-verses { font-size: 9px; margin-bottom: 1px; }\n  .ban-title  { font-size: 16px; margin-bottom: 2px; }\n  .ban-desc {\n    display: block;\n    font-size: 11px;\n    line-height: 1.35;\n    overflow: visible;\n  }\n  .ban-loc    { display: none; }\n  .map-svg-wrap {\n    position: relative;\n    inset: auto;\n    flex: 0 0 clamp(300px, 46dvh, 430px);\n    min-height: clamp(300px, 46dvh, 430px);\n  }\n  .loc-label {\n    font-size: 28px;\n    font-weight: 800;\n    stroke-width: 5px;\n  }\n  .person-name-label { display: block; font-size: 18px; }\n\n  .map-controls-panel {\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n    padding: 8px;\n    background: oklch(93% 0.025 82);\n    border-top: 1px solid var(--border);\n  }\n\n  /* Legend: separate panel above the playback controls */\n  .map-person-legend {\n    position: relative;\n    flex-direction: row;\n    flex-wrap: wrap;\n    bottom: auto;\n    left: auto;\n    right: auto;\n    gap: 4px;\n    z-index: 14;\n    max-height: none;\n    overflow-y: auto;\n    padding: 5px;\n    background: oklch(99.5% 0.008 80 / .88);\n    border: 1px solid var(--border);\n    box-shadow: 0 8px 24px oklch(10% 0.02 55 / .12);\n    backdrop-filter: blur(8px);\n  }\n  .map-leg-item { font-size: 10px; padding: 3px 8px 3px 5px; }\n  .map-leg-dot  { width: 6px; height: 6px; }\n  .map-corner-label { display: none; }\n  .map-playback {\n    position: relative;\n    right:auto;\n    bottom:auto;\n    width:100%;\n    padding:7px 8px;\n  }\n  .playback-label { font-size:10px; }\n  .playback-btn { width:38px; height:34px; font-size:20px; }\n  .playback-track {\n    height: 38px;\n    align-items: start;\n  }\n  .playback-track::before { top:8px; }\n  .playback-step { width:18px; height:18px; }\n  .playback-step-time {\n    display: block;\n    position: absolute;\n    top: 20px;\n    left: 50%;\n    transform: translateX(-50%);\n    width: 42px;\n    color: var(--fg-muted);\n    font-size: 7px;\n    font-weight: 800;\n    letter-spacing: .02em;\n    line-height: 1.05;\n    text-align: center;\n    pointer-events: none;\n  }\n  .playback-step.active .playback-step-time { color: var(--accent); }\n  .person-name-label { display: none; }\n\n  /* Timeline: full width, shorter items */\n  .tl-col { border-right: none; border-top: 1px solid oklch(28% .015 255); }\n  .tl-chapter-strip { padding: 10px 14px 8px; }\n  .tl-ch-title { font-size: 13px; }\n\n  .tl-item { min-height: 80px; grid-template-columns: 56px 1fr; }\n  .tl-r { padding: 12px 8px 12px 4px; }\n  .tl-ev-title { font-size: 12px; }\n  .tl-date { font-size: 9px; }\n  .tl-rel-time { display: none; }\n\n  .tl-spine::before { left: 28px; }\n  .tl-l { padding-top: 10px; }\n  .tl-seq { font-size: 9px; }\n}\n</style>\n</head>\n<body class=\"theme-a\">\n<div id=\"root\"></div>\n\n<script type=\"text/babel\">\nconst { useState, useEffect, useRef, useCallback, useMemo } = React;\nconst LANGUAGE_KEY = 'bf-language';\nconst INITIAL_LANG = localStorage.getItem(LANGUAGE_KEY) || 'en';\nconst CHAPTER_TEXT = {\n  da: {\n    book: 'Apostlenes Gerninger',\n    shortBook: 'ApG',\n    chapterTitle: 'Ild fra himlen',\n    headerSub: '— Pinse · år 30',\n    timelineTitle: ['Ild fra', 'himlen'],\n    mapCorner: 'Jerusalem · pinse',\n    yearBadges: ['Pinse — Ånden falder', 'Jerusalem — offentligt vidnesbyrd'],\n    map: {\n      JUDEA: 'JUDÆA',\n      PERAEA: 'PERÆA',\n      SAMARIA: 'SAMARIA ↑',\n      DEAD_SEA: 'DET DØDE HAV',\n      JORDAN_RIVER: 'Jordanfloden',\n      MEDITERRANEAN: 'MIDDELHAVET ←',\n      KIDRON_VALLEY: 'Kidrondalen',\n      TEMPLE: 'TEMPLET',\n      WALK: '~900 m vandring',\n      HINNOM_VALLEY: 'Hinnoms dal',\n      MOUNT_OF_OLIVES: 'OLIEBJERGET',\n      BETHANY: 'Betania',\n      BETHLEHEM: 'Betlehem'\n    },\n    locations: {\n      jerusalem: { name: 'Jerusalem' },\n      upper_room_or_temple: { name: 'Huset hvor de sad' },\n      temple_area: { name: 'Tempelområdet / Salomos søjlegang' }\n    },\n    persons: {\n      holy_spirit: 'Helligånden',\n      peter: 'Peter',\n      the_eleven: 'De elleve apostle',\n      devout_jews: 'Fromme jøder fra alle folkeslag',\n      david: 'David',\n      joel: 'Joel',\n      new_believers: 'De tre tusind omvendte',\n      mockers: 'Spottere i mængden'\n    },\n    events: {\n      spirit_descends: { title: 'Helligånden falder på pinsedagen', description: 'Mens alle de troende er samlet på pinsedagen, fylder en lyd som et kraftigt vindstød hele huset. Tunger som af ild fordeler sig og sætter sig på hver enkelt. Alle bliver fyldt af Helligånden og begynder at tale på andre sprog, sådan som Ånden giver dem at tale. Det opfylder Jesu løfte om, at disciplene skulle døbes med Helligånden.', timeline_label: 'Ånden falder' },\n      crowd_gathers: { title: 'Den flersprogede skare samles', description: 'Lyden tiltrækker en stor skare jødiske pilgrimme fra alle folkeslag, som opholder sig i Jerusalem til festen. Hver enkelt hører disciplene tale på sit eget modersmål, og mængden bliver forvirret og forundret. De nævner områder som Partien, Medien, Mesopotamien, Egypten, Rom, Kreta og Arabien og spørger, hvad det betyder. Nogle afviser dog det hele og siger, at disciplene er berusede.', timeline_label: 'Skaren samles' },\n      peters_sermon: { title: 'Peters pinseprædiken', description: 'Peter træder frem sammen med de elleve og taler højt til mængden. Han afviser beskyldningen om beruselse ved at pege på, at det kun er tredje time på dagen. Derefter citerer han profeten Joel for at forklare, at Åndens udgydelse opfylder profetien om de sidste dage. Han vidner om Jesus, hans undere, hans korsfæstelse og hans opstandelse, sådan som David forudsagde i Salmerne. Peter slutter med at erklære, at Gud har gjort Jesus til både Herre og Kristus.', timeline_label: 'Peter prædiker' },\n      crowd_responds: { title: 'Skaren rammes i hjertet', description: 'Mængden bliver dybt berørt og spørger Peter og de andre apostle, hvad de skal gøre. Peter siger, at de skal omvende sig og lade sig døbe i Jesu Kristi navn til syndernes forladelse, og at de også skal få Helligåndens gave. Han forklarer, at løftet gælder dem, deres børn og alle, som Herren kalder.', timeline_label: 'Kald til omvendelse' },\n      mass_baptism: { title: 'Tre tusind bliver døbt', description: 'Omkring tre tusind mennesker tager imod Peters ord, bliver døbt og føjes til fællesskabet samme dag. Denne ene dags høst viser, at forkyndelsen i Åndens kraft får en afgørende offentlig virkning.', timeline_label: '3.000 døbt' },\n      community_life: { title: 'Det første kristne fællesskab', description: 'De nye troende holder fast ved apostlenes lære, fællesskabet, brødsbrydelsen og bønnerne. Apostlene gør mange tegn og undere, og ærefrygt fylder byen. De troende deler deres ejendele, mødes dagligt på tempelpladsen og spiser sammen i hjemmene med glæde og oprigtigt hjerte, mens Herren hver dag føjer nye til.', timeline_label: 'Fællesskabet formes' }\n    },\n    timeline: {\n      spirit_descends: { label: 'Ånden falder', relative_time: 'Pinsedag — morgen' },\n      crowd_gathers: { label: 'Skaren samles', relative_time: 'Kort efter lyden' },\n      peters_sermon: { label: 'Peter prædiker', relative_time: 'Tredje time på dagen' },\n      crowd_responds: { label: 'Omvendelse', relative_time: 'Efter prædikenen' },\n      mass_baptism: { label: '3.000 døbt', relative_time: 'Samme dag' },\n      community_life: { label: 'Fællesskab', relative_time: 'Dagligt efter pinse' }\n    }\n  }\n};\n\nfunction localizeChapter(base, lang) {\n  const t = CHAPTER_TEXT[lang];\n  if (!t) return base;\n  return {\n    ...base,\n    book: t.book,\n    chapter_title: t.chapterTitle,\n    persons: base.persons.map(p => ({ ...p, name: t.persons[p.id] || p.name })),\n    locations: base.locations.map(l => ({ ...l, ...(t.locations[l.id] || {}) })),\n    events: base.events.map(e => ({ ...e, ...(t.events[e.id] || {}) })),\n    routes: base.routes.map(r => ({ ...r, label: t.persons[r.person_id] || r.label })),\n    timeline: base.timeline.map(tl => ({ ...tl, ...(t.timeline[tl.event_id] || {}) }))\n  };\n}\n\nconst DATA = localizeChapter(ACTS_CH2, INITIAL_LANG);\nconst UI_TEXT = CHAPTER_TEXT[INITIAL_LANG] || {};\nconst MAP_TEXT = UI_TEXT.map || {};\nconst mapText = key => MAP_TEXT[key] || key;\nfunction setLanguage(lang) {\n  localStorage.setItem(LANGUAGE_KEY, lang);\n  window.location.reload();\n}\nfunction yearMarker(value = '') {\n  const match = value.match(/AD\\s*\\d+(?:[–-]\\d+)?/) || value.match(/år\\s*\\d+(?:[–-]\\d+)?/);\n  return match ? match[0].trim() : '';\n}\n\nfunction compactTimeLabel(value = '', includeYear = false) {\n  const marker = yearMarker(value);\n  const shortLabel = value\n    .replace(/^c\\.\\s*/, '')\n    .replace(/Late /, '')\n    .replace(/sidst i /, '')\n    .replace(/,?\\s*AD\\s*\\d+(?:[–-]\\d+)?\\b/g, '')\n    .replace(/\\s*år\\s*\\d+(?:[–-]\\d+)?\\b/g, '')\n    .trim();\n  return includeYear && marker ? `${marker} ${shortLabel}`.trim() : (shortLabel || marker);\n}\n\nfunction shouldShowYear(tl, idx) {\n  const current = yearMarker(ABSOLUTE_TIMES[tl.event_id]?.date || tl.relative_time);\n  if (!current) return false;\n  const previous = DATA.timeline[idx - 1];\n  if (!previous) return true;\n  return current !== yearMarker(ABSOLUTE_TIMES[previous.event_id]?.date || previous.relative_time);\n}\n\n/* ── PERSON COLORS ── */\nconst PCOLORS = {\n  holy_spirit:  '#E8591A',\n  peter:        '#5B8FA8',\n  the_eleven:   '#A09070',\n  devout_jews:  '#6B8F71',\n  mockers:      '#A0746A',\n  new_believers:'#7DAA7D',\n  david:        '#9B7EB0',\n  joel:         '#C68B6E',\n};\n\n/* ── MAP COORDINATES (SVG 1000×800 viewBox, zoomed tight to Jerusalem area) ── */\nconst VW = 1000, VH = 800;\nconst LOCS = {\n  jerusalem:            { x: 380, y: 420, label: DATA.locations.find(l => l.id === 'jerusalem')?.name || 'Jerusalem' },\n  upper_room_or_temple: { x: 315, y: 490, label: DATA.locations.find(l => l.id === 'upper_room_or_temple')?.name || 'Pentecost House' },\n  temple_area:          { x: 425, y: 382, label: DATA.locations.find(l => l.id === 'temple_area')?.name || 'Temple Area' },\n};\n\nconst ABSOLUTE_TIMES = Object.fromEntries(\n  DATA.timeline.map(t => [t.event_id, { date: t.absolute_time || '', period: t.relative_time || '' }])\n);\n\n/* Build route stops with pixel coords */\nfunction buildRoutes() {\n  const out = {};\n  DATA.routes.forEach(r => {\n    const person = DATA.persons.find(p => p.id === r.person_id);\n    out[r.person_id] = {\n      color: PCOLORS[r.person_id] || '#888',\n      label: r.label || person?.name || r.person_id,\n      stops: r.path.map(s => ({\n        ...s,\n        ...(LOCS[s.location_id] || { x: 360, y: 360 }),\n      })),\n    };\n  });\n\n  DATA.persons.forEach(person => {\n    if (out[person.id]) return;\n    const stops = DATA.events\n      .filter(ev => ev.location_id && ev.persons_present?.includes(person.id))\n      .map((ev, idx) => ({\n        order: idx + 1,\n        location_id: ev.location_id,\n        event_id: ev.id,\n        ...(LOCS[ev.location_id] || { x: 360, y: 360 }),\n      }));\n    if (!stops.length) return;\n    out[person.id] = {\n      color: PCOLORS[person.id] || '#888',\n      label: person.name,\n      stops,\n    };\n  });\n  return out;\n}\nconst ROUTES = buildRoutes();\n\n/* Compute per-event person state */\nfunction personStateAt(eventId) {\n  const evIdx = DATA.events.findIndex(e => e.id === eventId);\n  const ev    = DATA.events[evIdx];\n  const result = {};\n\n  Object.entries(ROUTES).forEach(([pid, route]) => {\n    let lastStop = null;\n    route.stops.forEach(stop => {\n      const si = DATA.events.findIndex(e => e.id === stop.event_id);\n      if (si <= evIdx) lastStop = stop;\n    });\n    if (!lastStop) return;\n    const active = ev?.persons_present?.includes(pid) ?? false;\n    result[pid] = {\n      color: route.color,\n      label: route.label,\n      pos:   { x: lastStop.x, y: lastStop.y },\n      active,\n      faded: !active,\n    };\n  });\n  return result;\n}\n\n/* ── MAP TERRAIN ── */\nfunction Terrain() {\n  return (\n    <g>\n      {/* Base land */}\n      <rect x=\"0\" y=\"0\" width={VW} height={VH} fill=\"var(--map-land)\" />\n\n      {/* ── REGION FILLS with distinct colors ── */}\n      {/* Judea — central region around Jerusalem */}\n      <path d=\"M 50 300 Q 150 260 300 270 Q 450 280 580 300 Q 700 320 780 360 Q 820 380 820 440 Q 820 520 760 560 Q 700 600 580 620 Q 450 640 300 630 Q 180 620 100 580 Q 40 550 30 480 Q 20 420 50 300 Z\"\n        fill=\"oklch(87% 0.055 90)\" opacity=\"1\" />\n      <text x=\"160\" y=\"580\" fontSize=\"13\" fontFamily=\"Barlow Condensed\" fontWeight=\"800\"\n        fill=\"oklch(48% 0.07 75)\" letterSpacing=\"3\" opacity=\".7\">{mapText('JUDEA')}</text>\n\n      {/* Peraea — east of Jordan */}\n      <path d=\"M 820 200 Q 860 220 920 260 Q 970 300 980 380 Q 990 450 960 520 Q 940 570 900 600 Q 870 620 840 600 Q 820 560 820 500 Q 820 420 820 360 Q 820 280 820 200 Z\"\n        fill=\"oklch(82% 0.045 110)\" opacity=\".85\" />\n      <text x=\"880\" y=\"380\" fontSize=\"11\" fontFamily=\"Barlow Condensed\" fontWeight=\"700\"\n        fill=\"oklch(42% 0.06 90)\" letterSpacing=\"2\" opacity=\".65\" transform=\"rotate(90,880,380)\">{mapText('PERAEA')}</text>\n\n      {/* Northern region hint */}\n      <path d=\"M 50 300 Q 150 260 300 270 Q 450 280 580 300 Q 650 310 720 290 Q 780 270 820 200 Q 820 120 780 70 Q 700 30 500 20 Q 300 10 150 50 Q 60 80 40 160 Q 20 230 50 300 Z\"\n        fill=\"oklch(85% 0.04 130)\" opacity=\".6\" />\n      <text x=\"200\" y=\"120\" fontSize=\"12\" fontFamily=\"Barlow Condensed\" fontWeight=\"700\"\n        fill=\"oklch(40% 0.06 120)\" letterSpacing=\"2\" opacity=\".55\">{mapText('SAMARIA')}</text>\n\n      {/* ── REGION BORDERS — thick, clearly visible ── */}\n      {/* Judea north border */}\n      <path d=\"M 50 300 Q 200 265 380 272 Q 520 278 650 295 Q 730 308 790 330\"\n        fill=\"none\" stroke=\"var(--map-border)\" strokeWidth=\"2.5\" opacity=\".55\" strokeDasharray=\"12 5\" />\n      {/* Judea east border — Jordan River / Dead Sea edge */}\n      <path d=\"M 790 330 Q 818 370 820 430 Q 820 500 800 560\"\n        fill=\"none\" stroke=\"var(--map-border)\" strokeWidth=\"2.5\" opacity=\".55\" strokeDasharray=\"12 5\" />\n      {/* Peraea west border = Jordan */}\n      <path d=\"M 820 140 Q 828 220 825 320 Q 822 420 818 520 Q 815 580 820 650\"\n        fill=\"none\" stroke=\"var(--map-water)\" strokeWidth=\"6\" opacity=\".7\" strokeLinecap=\"round\" />\n\n      {/* ── DEAD SEA ── */}\n      <path d=\"M 818 400 Q 835 390 870 400 Q 920 420 940 470 Q 960 520 940 570 Q 920 620 880 640 Q 850 650 830 630 Q 815 610 815 570 Q 814 500 818 400 Z\"\n        fill=\"var(--map-water)\" opacity=\".85\" />\n      <text x=\"880\" y=\"520\" textAnchor=\"middle\" fontSize=\"11\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"700\" fill=\"oklch(35% 0.06 220)\"\n        letterSpacing=\"1.5\" opacity=\".8\">{mapText('DEAD_SEA')}</text>\n\n      {/* ── JORDAN RIVER ── */}\n      <path d=\"M 825 30 C 832 120 830 220 825 320 C 821 390 818 420 818 450\"\n
