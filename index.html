ROAD: Mt Olives → Jerusalem ── */}\n      <path d=\"M 648 228 Q 600 275 560 315 Q 520 352 475 382 Q 445 400 410 413\"\n        fill=\"none\" stroke=\"var(--map-road)\" strokeWidth=\"5\" opacity=\".6\"\n        strokeDasharray=\"10 6\" strokeLinecap=\"round\" />\n      <text x=\"545\" y=\"335\" fontSize=\"10\" fill=\"oklch(38% 0.06 70)\" opacity=\".55\"\n        fontFamily=\"Barlow\" transform=\"rotate(44,545,335)\">{mapText('WALK')}</text>\n\n      {/* ── HINNOM VALLEY ── */}\n      <path d=\"M 140 565 Q 220 598 305 590 Q 348 586 378 572 Q 398 560 408 542\"\n        fill=\"none\" stroke=\"oklch(55% 0.05 80)\" strokeWidth=\"2.5\" opacity=\".35\" />\n      <text x=\"220\" y=\"625\" fontSize=\"9.5\" fill=\"oklch(42% 0.05 80)\" opacity=\".45\"\n        fontFamily=\"Barlow\">{mapText('HINNOM_VALLEY')}</text>\n\n      {/* ── AKELDAMA (Field of Blood) ── */}\n      <circle cx=\"355\" cy=\"572\" r=\"10\"\n        fill=\"oklch(60% 0.14 30)\" opacity=\".25\"\n        stroke=\"var(--accent)\" strokeWidth=\"2\" />\n      <text x=\"372\" y=\"577\" fontSize=\"10\"\n        fill=\"var(--accent)\" opacity=\".7\"\n        fontFamily=\"Barlow\" fontStyle=\"italic\" fontWeight=\"500\">Akeldama</text>\n\n      {/* ── MOUNT OF OLIVES ridge ── */}\n      <ellipse cx=\"668\" cy=\"255\" rx=\"115\" ry=\"85\"\n        fill=\"oklch(82% 0.05 100)\" opacity=\".45\"\n        stroke=\"oklch(55% 0.06 80)\" strokeWidth=\"1.5\" />\n      <text x=\"668\" y=\"148\" textAnchor=\"middle\" fontSize=\"13\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"800\" fill=\"oklch(35% 0.07 70)\"\n        letterSpacing=\"1.5\" opacity=\".75\">{mapText('MOUNT_OF_OLIVES')}</text>\n\n      {/* ── Bethany ── */}\n      <circle cx=\"790\" cy=\"240\" r=\"6\" fill=\"oklch(55% 0.07 80)\" opacity=\".45\" />\n      <text x=\"802\" y=\"244\" fontSize=\"11\" fill=\"oklch(38% 0.06 75)\" opacity=\".6\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"600\">{mapText('BETHANY')}</text>\n\n      {/* ── Bethlehem ── */}\n      <circle cx=\"310\" cy=\"720\" r=\"6\" fill=\"oklch(55% 0.07 80)\" opacity=\".4\" />\n      <text x=\"322\" y=\"724\" fontSize=\"11\" fill=\"oklch(38% 0.06 75)\" opacity=\".5\"\n        fontFamily=\"Barlow Condensed\" fontWeight=\"600\">{mapText('BETHLEHEM')}</text>\n\n      {/* ── Scale bar ── */}\n      <g transform=\"translate(60,755)\">\n        <line x1=\"0\" y1=\"0\" x2=\"90\" y2=\"0\" stroke=\"var(--fg-muted)\" strokeWidth=\"2\" opacity=\".5\" />\n        <line x1=\"0\" y1=\"-5\" x2=\"0\" y2=\"5\" stroke=\"var(--fg-muted)\" strokeWidth=\"2\" opacity=\".5\" />\n        <line x1=\"90\" y1=\"-5\" x2=\"90\" y2=\"5\" stroke=\"var(--fg-muted)\" strokeWidth=\"2\" opacity=\".5\" />\n        <text x=\"45\" y=\"18\" textAnchor=\"middle\" fontSize=\"11\" fill=\"var(--fg-muted)\" opacity=\".55\" fontFamily=\"Barlow\">~1 km</text>\n      </g>\n\n      {/* ── North arrow ── */}\n      <g transform=\"translate(60,95)\">\n        <circle cx=\"0\" cy=\"0\" r=\"22\" fill=\"oklch(50% 0 0 / .08)\" stroke=\"var(--fg-muted)\" strokeWidth=\"1.5\" opacity=\".4\" />\n        <path d=\"M0,-16 L-6,8 L0,4 L6,8 Z\" fill=\"var(--fg-muted)\" opacity=\".55\" />\n        <text y=\"38\" textAnchor=\"middle\" fontSize=\"13\" fill=\"var(--fg-muted)\" opacity=\".55\"\n          fontFamily=\"Barlow Condensed\" fontWeight=\"800\">N</text>\n      </g>\n    </g>\n  );\n}\n\n/* ── ROUTE LINES — removed, dots animate instead ── */\nfunction RouteLines() { return null; }\n\n/* ── LOCATION MARKERS ── */\nfunction LocationMarkers({ activeLocId }) {\n  return (\n    <g>\n      {Object.entries(LOCS).map(([id, loc]) => {\n        const on = id === activeLocId;\n        return (\n          <g key={id}>\n            {on && <circle cx={loc.x} cy={loc.y} r=\"36\" fill=\"var(--accent)\" opacity=\".09\" />}\n            {on && <circle cx={loc.x} cy={loc.y} r=\"22\" fill=\"var(--accent)\" opacity=\".07\" />}\n            <circle cx={loc.x} cy={loc.y} r={on ? 10 : 7}\n              fill={on ? 'var(--accent)' : 'var(--fg-muted)'}\n              stroke=\"var(--map-land)\" strokeWidth=\"3\"\n              style={{ transition: 'r .3s' }}\n            />\n            <text className=\"loc-label\" x={loc.x + 16} y={loc.y + 5}\n              fontSize={on ? 17 : 14}\n              fontFamily=\"Barlow Condensed\" fontWeight={on ? '800' : '600'}\n              fill={on ? 'var(--fg)' : 'var(--fg-muted)'}\n              letterSpacing=\".5\"\n              style={{ transition: 'font-size .3s' }}\n            >{loc.label}</text>\n          </g>\n        );\n      })}\n    </g>\n  );\n}\n\n/* ── PERSON DOTS — stable keys, trail effect ── */\nfunction PersonDots({ personStates, prevStates }) {\n  const pids = Object.keys(ROUTES);\n\n  const computePos = (states, pid) => {\n    const s = states?.[pid];\n    if (!s || !s.pos) return null;\n    const snapX = Math.round(s.pos.x / 20) * 20;\n    const snapY = Math.round(s.pos.y / 20) * 20;\n    const siblings = pids.filter(p => {\n      const ps = states[p];\n      if (!ps || !ps.pos) return false;\n      return Math.round(ps.pos.x/20)*20 === snapX && Math.round(ps.pos.y/20)*20 === snapY;\n    });\n    const myGroupIdx = siblings.indexOf(pid);\n    const groupSize  = siblings.length;\n    const cols = Math.min(3, groupSize);\n    const row = Math.floor(myGroupIdx / cols);\n    const col = myGroupIdx % cols;\n    const rows = Math.ceil(groupSize / cols);\n    const spacing = 30;\n    const offsetX = (col - (cols - 1) / 2) * spacing;\n    const offsetY = (row - (rows - 1) / 2) * spacing;\n    const labelAvoidance = s.pos.y < 300 ? { x: 0, y: 46 } : { x: 0, y: -46 };\n    const x = Math.max(70, Math.min(VW - 70, s.pos.x + labelAvoidance.x + offsetX));\n    const y = Math.max(120, Math.min(VH - 70, s.pos.y + labelAvoidance.y + offsetY));\n    return { x, y };\n  };\n\n  return (\n    <g>\n      {pids.map((pid) => {\n        const s = personStates[pid];\n        if (!s || !s.pos) return null;\n        const cur  = computePos(personStates, pid);\n        const prev = computePos(prevStates, pid);\n        if (!cur) return null;\n        const hasMoved = prev && (Math.abs(prev.x - cur.x) > 8 || Math.abs(prev.y - cur.y) > 8);\n        const dotR = s.active ? 14 : 10;\n        return (\n          <g key={pid} style={{ opacity: s.faded ? 0.22 : 1, transition: 'opacity 0.7s ease' }}>\n            {hasMoved && (\n              <g>\n                <line x1={prev.x} y1={prev.y} x2={cur.x} y2={cur.y}\n                  stroke={s.color} strokeWidth=\"3\" strokeLinecap=\"round\"\n                  strokeDasharray=\"5 7\" opacity=\".28\" />\n                <circle cx={prev.x} cy={prev.y} r={dotR * 0.55} fill={s.color} opacity=\".2\" />\n                <circle cx={(prev.x*2+cur.x)/3} cy={(prev.y*2+cur.y)/3} r={dotR * 0.38} fill={s.color} opacity=\".13\" />\n                <circle cx={(prev.x+cur.x*2)/3} cy={(prev.y+cur.y*2)/3} r={dotR * 0.25} fill={s.color} opacity=\".08\" />\n              </g>\n            )}\n            <circle cx={cur.x} cy={cur.y} r={dotR}\n              fill={s.color} stroke=\"var(--map-land)\" strokeWidth=\"2.5\"\n              style={{ transition: 'cx 0.9s cubic-bezier(0.4,0,0.2,1), cy 0.9s cubic-bezier(0.4,0,0.2,1), r 0.35s' }}\n            />\n            <text x={cur.x} y={cur.y + 5} textAnchor=\"middle\"\n              fontSize={s.active ? 13 : 10} fontWeight=\"800\" fill=\"white\"\n              fontFamily=\"Barlow Condensed\" pointerEvents=\"none\"\n              style={{ transition: 'x 0.9s cubic-bezier(0.4,0,0.2,1), y 0.9s cubic-bezier(0.4,0,0.2,1)' }}\n            >\n              {(s.label || '?').charAt(0)}\n            </text>\n            {s.active && (\n              <text className=\"person-name-label\" x={cur.x} y={cur.y + dotR + 16} textAnchor=\"middle\"\n                fontSize=\"12\" fontWeight=\"800\" fill={s.color}\n                fontFamily=\"Barlow Condensed\" pointerEvents=\"none\"\n                style={{ transition: 'x 0.9s cubic-bezier(0.4,0,0.2,1), y 0.9s cubic-bezier(0.4,0,0.2,1)' }}\n              >\n                {s.label}\n              </text>\n            )}\n          </g>\n        );\n      })}\n    </g>\n  );\n}\n\n\n/* ── MAP PANEL ── */\nfunction MapPanel({ activeEventId, onStep, onEventChange }) {\n  const ev      = DATA.events.find(e => e.id === activeEventId);\n  const locId   = ev?.location_id;\n  const states  = useMemo(() => personStateAt(activeEventId), [activeEventId]);\n  const loc     = DATA.locations.find(l => l.id === locId);\n  const activeIndex = DATA.timeline.findIndex(t => t.event_id === activeEventId);\n\n  // Track previous event's states to show trail\n  const prevStatesRef = useRef(null);\n  const prevEventRef  = useRef(null);\n  const [prevStates, setPrevStates] = useState(null);\n\n  useEffect(() => {\n    if (prevEventRef.current !== activeEventId) {\n      setPrevStates(prevStatesRef.current);\n      prevStatesRef.current = states;\n      prevEventRef.current  = activeEventId;\n    }\n  }, [activeEventId, states]);\n\n  const legendItems = Object.entries(states).filter(([, s]) => s.active);\n\n  return (\n    <div className=\"map-col\">\n      {/* Event banner */}\n      <div className=\"map-event-banner\">\n        <div className=\"ban-verses\">{ev?.verses}</div>\n        <div className=\"ban-content\">\n          <div className=\"ban-title\">{ev?.title}</div>\n          <div className=\"ban-desc\">{ev?.description}</div>\n        </div>\n        {loc && (\n          <div className=\"ban-loc\">\n            <div className=\"ban-loc-dot\" />\n            {loc.name}\n          </div>\n        )}\n      </div>\n\n      {/* Map */}\n      <div className=\"map-svg-wrap\">\n        <svg className=\"map-svg\" viewBox={`0 0 ${VW} ${VH}`} preserveAspectRatio=\"xMidYMid meet\">\n          <Terrain />\n          <LocationMarkers activeLocId={locId} />\n          <PersonDots personStates={states} prevStates={prevStates} />\n        </svg>\n      </div>\n\n      <div className=\"map-controls-panel\">\n        {/* Person legend */}\n        <div className=\"map-person-legend\">\n          {legendItems.map(([pid, s]) => (\n            <div key={pid} className={`map-leg-item ${s.faded ? 'faded' : ''}`}>\n              <div className=\"map-leg-dot\" style={{ background: s.color }} />\n              <span>{s.label}</span>\n            </div>\n          ))}\n        </div>\n\n        <div className=\"map-playback\">\n          <div className=\"playback-top\">\n            <div className=\"playback-label\">{activeIndex + 1}. {ev?.timeline_label || ev?.title}</div>\n            <div className=\"playback-buttons\">\n              <button className=\"playback-btn\" type=\"button\" aria-label={INITIAL_LANG === 'da' ? 'Forrige begivenhed' : 'Previous event'} onClick={() => onStep(-1)}>‹</button>\n              <button className=\"playback-btn\" type=\"button\" aria-label={INITIAL_LANG === 'da' ? 'Næste begivenhed' : 'Next event'} onClick={() => onStep(1)}>›</button>\n            </div>\n          </div>\n          <div className=\"playback-track\" style={{ '--step-count': DATA.timeline.length }}>\n            {DATA.timeline.map((tl, idx) => (\n              <button\n                key={tl.event_id}\n                type=\"button\"\n                className={`playback-step${idx < activeIndex ? ' done' : ''}${idx === activeIndex ? ' active' : ''}`}\n                aria-label={`${INITIAL_LANG === 'da' ? 'Gå til' : 'Go to'} ${tl.label}`}\n                onClick={() => onEventChange(tl.event_id)}\n              >\n                <span className=\"playback-step-time\">{compactTimeLabel(ABSOLUTE_TIMES[tl.event_id]?.date || tl.relative_time, shouldShowYear(tl, idx))}</span>\n              </button>\n            ))}\n          </div>\n        </div>\n      </div>\n\n      <div className=\"map-corner-label\">{UI_TEXT.mapCorner || 'Jerusalem · Pentecost'}</div>\n    </div>\n  );\n}\n\n/* ── TIMELINE PANEL ── */\nfunction TimelinePanel({ activeEventId, onEventChange }) {\n  const scrollRef = useRef(null);\n  const entryRefs = useRef({});\n  const observing = useRef(false);\n\n  // IntersectionObserver: set active event as entries scroll into view\n  useEffect(() => {\n    const root = scrollRef.current;\n    if (!root) return;\n    const scores = {};\n    const obs = new IntersectionObserver(entries => {\n      entries.forEach(e => { scores[e.target.dataset.eid] = e.intersectionRatio; });\n      if (!observing.current) return;\n      const best = Object.entries(scores).sort((a,b) => b[1]-a[1])[0];\n      if (best && best[1] > 0.15) onEventChange(best[0]);\n    }, { root, threshold: [0.1, 0.3, 0.5], rootMargin: '-20% 0px -55% 0px' });\n\n    Object.values(entryRefs.current).forEach(el => el && obs.observe(el));\n    return () => obs.disconnect();\n  }, [onEventChange]);\n\n  const handleClick = useCallback((eid) => {\n    observing.current = false;\n    onEventChange(eid);\n    const el = entryRefs.current[eid];\n    if (el && scrollRef.current) {\n      scrollRef.current.scrollTo({ top: el.offsetTop - 30, behavior: 'smooth' });\n    }\n    setTimeout(() => { observing.current = true; }, 800);\n  }, [onEventChange]);\n\n  useEffect(() => {\n    const el = entryRefs.current[activeEventId];\n    const root = scrollRef.current;\n    if (!el || !root) return;\n    observing.current = false;\n    root.scrollTo({ top: Math.max(0, el.offsetTop - 46), behavior: 'smooth' });\n    const timer = setTimeout(() => { observing.current = true; }, 900);\n    return () => clearTimeout(timer);\n  }, [activeEventId]);\n\n  return (\n    <div className=\"tl-col\">\n      <div className=\"tl-chapter-strip\">\n        <div className=\"tl-ch-label\">{UI_TEXT.shortBook || 'Acts'} · {INITIAL_LANG === 'da' ? 'Kapitel' : 'Chapter'} 2</div>\n        <div className=\"tl-ch-title\">{UI_TEXT.timelineTitle ? <>{UI_TEXT.timelineTitle[0]} <em>{UI_TEXT.timelineTitle[1]}</em></> : <>Fire from <em>Heaven</em></>}</div>\n      </div>\n\n      <div className=\"tl-list\" ref={scrollRef}>\n        <div className=\"tl-spine\">\n          {DATA.timeline.map((tl, idx) => {\n            const ev = DATA.events.find(e => e.id === tl.event_id);\n            if (!ev) return null;\n            const active = activeEventId === tl.event_id;\n            const timeInfo = ABSOLUTE_TIMES[tl.event_id];\n            // Year badges: one before prologue (composition date), one before the AD30 events\n            const showYearBadge = idx === 0 || idx === 1;\n            const yearLabel = UI_TEXT.yearBadges?.[idx === 0 ? 0 : 1] || (idx === 0 ? 'Pentecost — Spirit Falls' : 'Jerusalem — Public Witness');\n            return (\n              <React.Fragment key={tl.event_id}>\n                {showYearBadge && (\n                  <div className=\"tl-year-sep\">\n                    <div className=\"tl-year-badge\">{yearLabel}</div>\n                    <div className=\"tl-year-line\" />\n                  </div>\n                )}\n                <div\n                  ref={el => entryRefs.current[tl.event_id] = el}\n                  data-eid={tl.event_id}\n                  data-screen-label={`${idx+1}. ${tl.label}`}\n                  className={`tl-item${active ? ' active' : ''}`}\n                  onClick={() => handleClick(tl.event_id)}\n                >\n                  <div className=\"tl-l\">\n                    <div className=\"tl-seq\">{String(tl.position).padStart(2,'0')}</div>\n                    <div className=\"tl-dot\"><div className=\"tl-dot-pip\" /></div>\n                  </div>\n                  <div className=\"tl-r\">\n                    <div className=\"tl-date\">{timeInfo?.date || ''}</div>\n                    <div className=\"tl-rel-time\">{timeInfo?.period || tl.relative_time}</div>\n                    <div className=\"tl-ev-title\">{tl.label}</div>\n                    <div className=\"tl-ev-verses\">{ev.verses}</div>\n                  </div>\n                </div>\n              </React.Fragment>\n            );\n          })}\n          {/* bottom pad — extra tall so last item can fully scroll into the trigger zone */}\n          <div style={{ height: 'calc(100vh - 200px)' }} />\n        </div>\n      </div>\n    </div>\n  );\n}\n\n/* ── APP ── */\nfunction App() {\n  const firstTimelineEvent = DATA.timeline[0]?.event_id || DATA.events[0]?.id;\n  const [activeEv, setActiveEv] = useState(firstTimelineEvent);\n\n  useEffect(() => {\n    document.body.className = 'theme-a';\n    document.documentElement.lang = INITIAL_LANG;\n    document.title = `${DATA.book} ${INITIAL_LANG === 'da' ? 'kapitel' : 'Chapter'} 2 — ${DATA.chapter_title}`;\n    localStorage.setItem('bf-theme', 'a');\n  }, []);\n\n  const handleEventChange = useCallback(id => setActiveEv(id), []);\n  const stepEvent = useCallback((dir) => {\n    setActiveEv(prev => {\n      const current = DATA.timeline.findIndex(t => t.event_id === prev);\n      if (dir < 0 && current === 0) {\n        window.top.location.href = '/bible/acts/001';\n        return prev;\n      }\n      const next = (current + dir + DATA.timeline.length) % DATA.timeline.length;\n      return DATA.timeline[next].event_id;\n    });\n  }, []);\n\n  return (\n    <div className=\"app\">\n      {/* Header */}\n      <div className=\"header\">\n        <span className=\"hdr-book\">{UI_TEXT.shortBook || 'Acts'} · {INITIAL_LANG === 'da' ? 'Kap.' : 'Ch.'} 2</span>\n        <span className=\"hdr-title\">{DATA.chapter_title}</span>\n        <span className=\"hdr-sub\">{UI_TEXT.headerSub || '— Pentecost · AD 30'}</span>\n        <div className=\"hdr-space\" />\n        <a className=\"home-link\" href=\"/bible\" target=\"_top\">\n          {INITIAL_LANG === 'da' ? 'Hjem' : 'Home'}\n        </a>\n        <button className=\"lang-btn\" type=\"button\" onClick={() => setLanguage(INITIAL_LANG === 'da' ? 'en' : 'da')}>\n          {INITIAL_LANG === 'da' ? 'En' : 'Da'}\n        </button>\n      </div>\n\n      {/* Body */}\n      <div className=\"body\">\n        <TimelinePanel activeEventId={activeEv} onEventChange={handleEventChange} />\n        <MapPanel\n          activeEventId={activeEv}\n          onStep={stepEvent}\n          onEventChange={handleEventChange}\n        />\n      </div>\n    </div>\n  );\n}\n\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>\n";

      { n: 19, title: 'The Great Riot at Ephesus' },
      { n: 20, title: 'Farewell to the West' },
      { n: 21, title: 'Warnings, Worship, and Arrest in Jerusalem' },
      { n: 22, title: "Paul's Defense Before the Jerusalem Crowd" },
      { n: 23, title: 'Conspiracy, Visions, and a Secret Transfer' },
      { n: 24, title: 'Paul Before Felix: Charges, Defense, and Two Years in Limbo' },
      { n: 25, title: 'Festus, the Appeal to Caesar, and Agrippa\'s Arrival' },
      { n: 26, title: "Paul Before Agrippa: The Defense of a Life Transformed" },
      { n: 27, title: 'Storm, Shipwreck, and Providence: The Voyage to Rome' },
      { n: 28, title: 'Malta, the Viper, and the Gospel Reaches Rome' },
    ]
  }
];

function localizeBooks(lang) {
  if (lang !== 'da') return BOOKS_BASE;
  return BOOKS_BASE.map(book => ({
    ...book,
    name: book.id === 'acts' ? 'Apostlenes Gerninger' : book.name,
    fullName: book.id === 'acts' ? 'Apostlenes Gerninger' : book.fullName,
    testament: book.testament === 'New Testament' ? 'Det Nye Testamente' : book.testament,
    chapters: book.chapters.map(ch => ({ ...ch, title: CHAPTER_TITLES_DA[ch.n] || ch.title }))
  }));
}

function App() {
  const routePath = window.location.pathname.replace(/\/+$/, '');
  const [language, setLanguageState] = useState(localStorage.getItem(LANGUAGE_KEY) || 'en');
  const text = HOME_TEXT[language] || HOME_TEXT.en;
  const books = localizeBooks(language);
  const setLanguage = (lang) => {
    localStorage.setItem(LANGUAGE_KEY, lang);
    setLanguageState(lang);
  };

  if (routePath === '/bible/acts/001') {
    document.title = language === 'da' ? 'Apostlenes Gerninger kapitel 1 — Venter på løftet' : 'Acts Chapter 1 — Waiting for the Promise';
    document.documentElement.lang = language;
    return (
      <div className="chapter-route">
        <iframe className="chapter-frame" title={text.chapterFrameTitle(1)} srcDoc={CHAPTER_001_HTML} />
      </div>
    );
  }

  if (routePath === '/bible/acts/002') {
    document.title = language === 'da' ? 'Apostlenes Gerninger kapitel 2 — Ild fra himlen' : 'Acts Chapter 2 — Fire from Heaven';
    document.documentElement.lang = language;
    return (
      <div className="chapter-route">
        <iframe className="chapter-frame" title={text.chapterFrameTitle(2)} srcDoc={CHAPTER_002_HTML} />
      </div>
    );
  }

  const [activeBookId, setActiveBookId] = useState(books[0].id);
  const activeBook = books.find(book => book.id === activeBookId) || books[0];

  useEffect(() => {
    document.body.className = 'theme-a';
    document.documentElement.lang = language;
    document.title = text.documentTitle;
    localStorage.setItem('bf-theme', 'a');
  }, [language, text.documentTitle]);

  return (
    <div className="app">
      <div className="header">
        <span className="hdr-brand">{text.brand}</span>
        <span className="hdr-title">{text.title}</span>
        <div className="hdr-space" />
        <button
          className="lang-btn"
          type="button"
          aria-label={language === 'da' ? 'Skift til engelsk' : 'Switch to Danish'}
          onClick={() => setLanguage(language === 'da' ? 'en' : 'da')}
        >
          {language === 'da' ? 'En' : 'Da'}
        </button>
      </div>

      <div className="body">
        <BookColumn books={books} active={activeBook} onSelect={book => setActiveBookId(book.id)} text={text} />
        <ChapterColumn book={activeBook} text={text} />
      </div>
    </div>
  );
}

function BookColumn({ books, active, onSelect, text }) {
  return (
    <div className="book-col">
      <div className="book-col-header">
        <div className="book-col-label">{text.library}</div>
        <div className="book-col-title">{text.selectBook}</div>
      </div>
      <div className="book-list">
        {books.map(book => {
          const available = book.chapters.filter(c => c.href).length;
          const isActive = active?.id === book.id;
          return (
            <div
              key={book.id}
              className={`book-item${isActive ? ' active' : ''}`}
              onClick={() => onSelect(book)}
            >
              <div className="book-testament">{testamentCode(book.testament)}</div>
              <div className="book-name">{book.name}</div>
              <div className="book-subtitle">{book.fullName}</div>
              <div className="book-meta">
                <span className="book-meta-avail">{available} {text.ready}</span>
                <span>·</span>
                <span>{book.chapters.length} {text.chapters}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ChapterColumn({ book, text }) {
  if (!book) return <div className="chapter-col" />;
  const available = book.chapters.filter(c => c.href).length;

  return (
    <div className="chapter-col">
      <div className="chapter-col-header">
        <div>
          <div className="ch-testament">{testamentCode(book.testament)}</div>
          <div className="ch-book-name">{book.name}</div>
          <div className="ch-book-full">{book.fullName}</div>
        </div>
        <div className="ch-stats">
          <span className="ch-stats-avail">{text.available(available)}</span>
          <span>{book.chapters.length} {text.totalChapters}</span>
        </div>
      </div>

      <div className="chapter-list">
        {book.chapters.map(ch => {
          const hasLink = !!ch.href;
          return hasLink ? (
            <a key={ch.n} href={ch.href} className="ch-row available">
              <div className="ch-row-num">{String(ch.n).padStart(2, '0')}</div>
              <div className="ch-row-body">
                <div className="ch-row-label">{text.chapter} {ch.n}</div>
                <div className="ch-row-title">{ch.title || `${text.chapter} ${ch.n}`}</div>
              </div>
              <div className="ch-row-arrow">→</div>
            </a>
          ) : (
            <div key={ch.n} className="ch-row unavailable">
              <div className="ch-row-num">{String(ch.n).padStart(2, '0')}</div>
              <div className="ch-row-body">
                <div className="ch-row-label">{text.chapter} {ch.n}</div>
                <div className="ch-row-title">{ch.title || `${text.chapter} ${ch.n}`}</div>
              </div>
              <div className="ch-row-soon">{text.soon}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
