<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acts Chapter 1 — Waiting for the Promise</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="acts-ch1-data.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; overflow: hidden; }

/* ── THEMES ── */
body.theme-a {
  --bg:        oklch(96% 0.018 78);
  --bg-alt:    oklch(91% 0.022 74);
  --bg-dark:   oklch(16% 0.02 55);
  --fg:        oklch(18% 0.02 55);
  --fg-muted:  oklch(50% 0.018 60);
  --accent:    oklch(58% 0.19 46);
  --border:    oklch(84% 0.022 72);
  --card:      oklch(99.5% 0.008 80);
  --map-water: oklch(72% 0.08 220);
  --map-land:  oklch(88% 0.04 94);
  --map-road:  oklch(68% 0.06 70);
  --map-judea: oklch(85% 0.05 88);
  --map-border:oklch(55% 0.06 50);
  --tl-bg:     oklch(18% 0.02 55);
  --tl-fg:     oklch(95% 0.012 78);
}
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--fg); }

/* ── PAGE SKELETON ── */
/* header / [timeline | map] stacked vertically */
.app {
  height: 100vh;
  display: grid;
  grid-template-rows: 50px 1fr;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--bg-dark);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 2px solid var(--accent);
  z-index: 20;
  overflow: hidden;
  white-space: nowrap;
}
.hdr-book { font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); }
.hdr-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:oklch(95% .012 78); white-space:nowrap; }
.hdr-sub { font-family:'Lora',serif; font-style:italic; font-size:12px; color:oklch(65% .012 70); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }
.hdr-space { flex:1; }
.home-link {
  color: oklch(95% .012 78);
  text-decoration: none;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 6px 9px;
  border: 1px solid oklch(58% 0.19 46 / .65);
  border-radius: 3px;
  background: oklch(22% 0.02 55);
}
.lang-btn {
  border: 1px solid oklch(58% 0.19 46 / .65);
  background: oklch(22% 0.02 55);
  color: oklch(95% .012 78);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 6px 9px;
  border-radius: 3px;
  cursor: pointer;
}
/* ── BODY: timeline left, map right ── */
.body {
  display: grid;
  grid-template-columns: 240px 1fr;
  overflow: hidden;
}

/* ── TIMELINE COLUMN ── */
.tl-col {
  background: var(--tl-bg);
  color: var(--tl-fg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid oklch(28% .015 255);
  min-width: 0;
}

/* Chapter label strip */
.tl-chapter-strip {
  padding: 14px 18px 12px;
  border-bottom: 1px solid oklch(28% .015 255);
  flex-shrink: 0;
}
.tl-ch-label {
  font-size: 9px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
  color: var(--accent); margin-bottom:4px;
}
.tl-ch-title {
  font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800;
  text-transform:uppercase; line-height:1.1; color:var(--tl-fg);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tl-ch-title em { color:var(--accent); font-style:normal; }

/* Scrollable event list */
.tl-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
}
.tl-list::-webkit-scrollbar { width:3px; }
.tl-list::-webkit-scrollbar-thumb { background:oklch(36% .015 255); border-radius:2px; }

/* Vertical spine */
.tl-spine {
  padding: 8px 0 80px;
  position: relative;
}
.tl-spine::before {
  content:'';
  position:absolute;
  left: 38px;
  top:0; bottom:0;
  width:2px;
  background: linear-gradient(to bottom, transparent, oklch(36% .015 255) 5%, oklch(36% .015 255) 95%, transparent);
}

/* Year separator badge */
.tl-year-sep {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 10px 6px 14px;
  position: relative;
  z-index: 2;
}
.tl-year-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  background: oklch(22% .018 255);
  border: 1px solid oklch(36% .015 255);
  padding: 2px 10px;
  border-radius: 2px;
  white-space: nowrap;
  position: relative;
  z-index: 2;
}
body.theme-a .tl-year-badge { background: oklch(22% .018 55); border-color: oklch(36% .015 55); }
.tl-year-line {
  flex: 1;
  height: 1px;
  background: oklch(30% .012 255);
  opacity: .5;
}

/* Each item — tall so scroll is slow and deliberate */
.tl-item {
  display: grid;
  grid-template-columns: 76px 1fr;
  cursor: pointer;
  position: relative;
  transition: background .15s;
  padding-right: 4px;
  min-height: 130px;
}
.tl-item:hover { background: oklch(22% .015 255 / 0.6); }
.tl-item.active { background: oklch(22% .018 255 / 0.8); }
body.theme-a .tl-item:hover { background: oklch(22% .015 255 / 0.5); }
body.theme-a .tl-item.active { background: oklch(20% .018 55 / 0.8); }

/* left: seq number + dot */
.tl-l {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 14px;
}
.tl-seq {
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px; font-weight:700;
  color: oklch(45% .01 255);
  margin-bottom:5px;
  letter-spacing:.05em;
}
.tl-item.active .tl-seq { color: var(--accent); }
.tl-dot {
  width:16px; height:16px; border-radius:50%;
  border:2px solid oklch(38% .015 255);
  background: oklch(16% .018 255);
  position:relative; z-index:1;
  transition: all .28s;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
body.theme-a .tl-dot { background: oklch(22% .018 55); border-color: oklch(36% .015 55); }
.tl-item.active .tl-dot {
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 0 3px oklch(58% .19 46 / .2);
}
.tl-dot-pip {
  width:5px; height:5px; border-radius:50%; background:#fff;
  opacity:0; transition:opacity .28s;
}
.tl-item.active .tl-dot-pip { opacity:1; }

/* right: text */
.tl-r {
  padding: 22px 10px 22px 6px;
  border-bottom: 1px solid oklch(24% .012 255);
}
.tl-item:last-child .tl-r { border-bottom: none; }
.tl-date {
  font-size:11px; font-weight:800; letter-spacing:.1em;
  font-family:'Barlow Condensed',sans-serif;
  color: oklch(70% .018 76); margin-bottom:3px;
}
.tl-item.active .tl-date { color: var(--accent); }
.tl-rel-time {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  line-height:1.35;
  color: oklch(72% .014 78); margin-bottom:6px;
}
.tl-item.active .tl-rel-time { color: oklch(82% .035 74); }
.tl-ev-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px; font-weight:800; text-transform:uppercase;
  line-height:1.18; color: var(--tl-fg);
  margin-bottom: 4px;
}
.tl-ev-verses {
  font-size:10px; font-weight:700; letter-spacing:.1em;
  color: oklch(68% .018 76); margin-top:2px;
}
.tl-item.active .tl-ev-verses { color: var(--accent); }

/* ── MAP COLUMN ── */
.map-col {
  position: relative;
  background: var(--map-land);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Event banner at top of map */
.map-event-banner {
  position: relative;
  flex: 0 0 auto;
  z-index: 10;
  background: oklch(16% 0.02 55 / 0.92);
  border-bottom: 2px solid var(--accent);
  padding: 12px 20px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0 16px;
  align-items: center;
  backdrop-filter: blur(6px);
  transition: background .3s;
}
.ban-verses {
  font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
  color:var(--accent); white-space:nowrap;
}
.ban-content {}
.ban-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px; font-weight:800; text-transform:uppercase;
  letter-spacing:.04em; color:oklch(95% .012 78);
  line-height:1.1; margin-bottom:4px;
}
.ban-desc {
  font-family:'Lora',serif; font-style:normal;
  font-size:13px; line-height:1.55;
  color:oklch(88% .014 78);
  display: block;
  overflow: visible;
}
.ban-loc {
  display:flex; align-items:center; gap:5px;
  font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:oklch(55% .012 70); white-space:nowrap;
}
.ban-loc-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }

/* ── MAP SVG — fill panel, use xMidYMid slice so it always covers ── */
.map-svg-wrap {
  position: relative;
  flex: 1 1 0;
  min-height: 0;
}
.map-svg {
  width:100%; height:100%;
}

/* Person legend - bottom left of map */
.map-person-legend {
  position: absolute;
  bottom: 18px;
  left: 18px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  z-index: 10;
  pointer-events: none;
}
.map-leg-item {
  display:flex; align-items:center; gap:7px;
  font-size:10px; font-weight:600; letter-spacing:.06em;
  color: var(--fg);
  background: var(--card);
  padding: 3px 10px 3px 7px;
  border-radius:20px;
  border:1px solid var(--border);
  transition: opacity .5s, transform .4s;
}
.map-leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.map-leg-item.faded { opacity:.3; }
.map-leg-item.entering { animation: legEnter .4s ease forwards; }
@keyframes legEnter {
  from { opacity:0; transform:translateX(-8px); }
  to   { opacity:1; transform:translateX(0); }
}
.map-controls-panel { display: contents; }

/* Map overlay labels */
.map-corner-label {
  position:absolute; bottom:18px; right:18px;
  font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color:var(--fg-muted); opacity:.5; z-index:5; pointer-events:none;
}

.map-playback {
  position: absolute;
  right: 18px;
  bottom: 42px;
  z-index: 12;
  width: min(460px, calc(100% - 36px));
  background: oklch(99.5% 0.008 80 / .9);
  border: 1px solid var(--border);
  box-shadow: 0 12px 34px oklch(10% 0.02 55 / .14);
  padding: 10px 12px;
  backdrop-filter: blur(8px);
}
.playback-top {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:9px;
}
.playback-label {
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--fg-muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.playback-buttons { display:flex; gap:6px; flex-shrink:0; }
.playback-btn {
  width:30px;
  height:26px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--fg);
  border-radius:3px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  line-height:1;
}
.playback-track {
  position:relative;
  height:28px;
  display:grid;
  grid-template-columns:repeat(var(--step-count), 1fr);
  align-items:center;
  gap:0;
}
.playback-track::before {
  content:'';
  position:absolute;
  left:10px; right:10px; top:13px;
  height:2px;
  background:var(--border);
}
.playback-step {
  position:relative;
  z-index:1;
  justify-self:center;
  width:20px;
  height:20px;
  border:0;
  border-radius:50%;
  background:transparent;
  cursor:pointer;
}
.playback-step::before {
  content:'';
  position:absolute;
  inset:5px;
  border-radius:50%;
  background:var(--fg-muted);
  opacity:.42;
  transition:all .24s;
}
.playback-step.done::before { background:var(--accent); opacity:.55; }
.playback-step.active::before {
  inset:2px;
  background:var(--accent);
  opacity:1;
  box-shadow:0 0 0 5px oklch(58% .19 46 / .18);
}
.playback-step-time { display: none; }
.loc-label {
  paint-order: stroke;
  stroke: oklch(98% 0.008 80 / .82);
  stroke-width: 3px;
  stroke-linejoin: round;
}
.person-name-label {
  display: none;
  paint-order: stroke;
  stroke: oklch(16% 0.02 55 / .62);
  stroke-width: 4px;
  stroke-linejoin: round;
}

/* ── MOBILE ── */
@media (max-width: 680px) {
  /* Stack: map on top, timeline on bottom */
  html, body, #root {
    height: auto;
    min-height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
  }

  .app {
    height: auto;
    min-height: 100svh;
    grid-template-rows: 44px auto;
    overflow: visible;
  }

  .body {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    overflow: visible;
  }

  /* Map moves to top row */
  .map-col {
    order: -1;
    overflow: visible;
  }

  /* Tighten header */
  .header { padding: 0 14px; gap: 8px; }
  .hdr-sub { display: none; }
  .hdr-title { font-size: 16px; }
  .home-link,
  .lang-btn {
    padding: 5px 7px;
    font-size: 9px;
  }

  /* Event banner with title, description, then map below */
  .map-event-banner {
    position: relative;
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    flex: 0 0 auto;
    padding: 8px 12px 9px;
    gap: 3px;
  }
  .ban-verses { font-size: 9px; margin-bottom: 1px; }
  .ban-title  { font-size: 16px; margin-bottom: 2px; }
  .ban-desc {
    display: block;
    font-size: 11px;
    line-height: 1.35;
    overflow: visible;
  }
  .ban-loc    { display: none; }
  .map-svg-wrap {
    position: relative;
    inset: auto;
    flex: 0 0 clamp(300px, 46dvh, 430px);
    min-height: clamp(300px, 46dvh, 430px);
  }
  .loc-label {
    font-size: 28px;
    font-weight: 800;
    stroke-width: 5px;
  }
  .person-name-label { display: block; font-size: 18px; }

  .map-controls-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px;
    background: oklch(93% 0.025 82);
    border-top: 1px solid var(--border);
  }

  /* Legend: separate panel above the playback controls */
  .map-person-legend {
    position: relative;
    flex-direction: row;
    flex-wrap: wrap;
    bottom: auto;
    left: auto;
    right: auto;
    gap: 4px;
    z-index: 14;
    max-height: none;
    overflow-y: auto;
    padding: 5px;
    background: oklch(99.5% 0.008 80 / .88);
    border: 1px solid var(--border);
    box-shadow: 0 8px 24px oklch(10% 0.02 55 / .12);
    backdrop-filter: blur(8px);
  }
  .map-leg-item { font-size: 10px; padding: 3px 8px 3px 5px; }
  .map-leg-dot  { width: 6px; height: 6px; }
  .map-corner-label { display: none; }
  .map-playback {
    position: relative;
    right:auto;
    bottom:auto;
    width:100%;
    padding:7px 8px;
  }
  .playback-label { font-size:10px; }
  .playback-btn { width:38px; height:34px; font-size:20px; }
  .playback-track {
    height: 38px;
    align-items: start;
  }
  .playback-track::before { top:8px; }
  .playback-step { width:18px; height:18px; }
  .playback-step-time {
    display: block;
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 42px;
    color: var(--fg-muted);
    font-size: 7px;
    font-weight: 800;
    letter-spacing: .02em;
    line-height: 1.05;
    text-align: center;
    pointer-events: none;
  }
  .playback-step.active .playback-step-time { color: var(--accent); }
  .person-name-label { display: none; }

  /* Timeline: full width, shorter items */
  .tl-col { border-right: none; border-top: 1px solid oklch(28% .015 255); }
  .tl-chapter-strip { padding: 10px 14px 8px; }
  .tl-ch-title { font-size: 13px; }

  .tl-item { min-height: 80px; grid-template-columns: 56px 1fr; }
  .tl-r { padding: 12px 8px 12px 4px; }
  .tl-ev-title { font-size: 12px; }
  .tl-date { font-size: 9px; }
  .tl-rel-time { display: none; }

  .tl-spine::before { left: 28px; }
  .tl-l { padding-top: 10px; }
  .tl-seq { font-size: 9px; }
}
</style>
</head>
<body class="theme-a">
<div id="root"></div>

function localizeChapter(base, lang) {
  const t = CHAPTER_TEXT[lang];
  if (!t) return base;
  return {
    ...base,
    book: t.book,
    chapter_title: t.chapterTitle,
    persons: base.persons.map(p => ({ ...p, name: t.persons[p.id] || p.name })),
    locations: base.locations.map(l => ({ ...l, ...(t.locations[l.id] || {}) })),
    events: base.events.map(e => ({ ...e, ...(t.events[e.id] || {}) })),
    routes: base.routes.map(r => ({ ...r, label: t.persons[r.person_id] || r.label })),
    timeline: base.timeline.map(tl => ({ ...tl, ...(t.timeline[tl.event_id] || {}) }))
  };
}

function yearMarker(value = '') {
  const match = value.match(/AD\s*\d+(?:[–-]\d+)?/) || value.match(/år\s*\d+(?:[–-]\d+)?/);
  return match ? match[0].trim() : '';
}

function compactTimeLabel(value = '', includeYear = false) {
  const marker = yearMarker(value);
  const shortLabel = value
    .replace(/^c\.\s*/, '')
    .replace(/Late /, '')
    .replace(/sidst i /, '')
    .replace(/,?\s*AD\s*\d+(?:[–-]\d+)?\b/g, '')
    .replace(/\s*år\s*\d+(?:[–-]\d+)?\b/g, '')
    .trim();
  return includeYear && marker ? `${marker} ${shortLabel}`.trim() : (shortLabel || marker);
}

function shouldShowYear(tl, idx) {
  const current = yearMarker(ABSOLUTE_TIMES[tl.event_id]?.date || tl.relative_time);
  if (!current) return false;
  const previous = DATA.timeline[idx - 1];
  if (!previous) return true;
  return current !== yearMarker(ABSOLUTE_TIMES[previous.event_id]?.date || previous.relative_time);
}

/* Build route stops with pixel coords */
function buildRoutes() {
  const out = {};
  DATA.routes.forEach(r => {
    out[r.person_id] = {
      color: PCOLORS[r.person_id] || '#888',
      label: r.label,
      stops: r.path.map(s => ({
        ...s,
        ...(LOCS[s.location_id] || { x: 360, y: 360 }),
      })),
    };
  });
  return out;
}
const ROUTES = buildRoutes();

/* Compute per-event person state */
function personStateAt(eventId) {
  const evIdx = DATA.events.findIndex(e => e.id === eventId);
  const ev    = DATA.events[evIdx];
  const result = {};

  Object.entries(ROUTES).forEach(([pid, route]) => {
    let lastStop = null;
    route.stops.forEach(stop => {
      const si = DATA.events.findIndex(e => e.id === stop.event_id);
      if (si <= evIdx) lastStop = stop;
    });
    if (!lastStop) return;
    const active = ev?.persons_present?.includes(pid) ?? false;
    result[pid] = {
      color: route.color,
      label: route.label,
      pos:   { x: lastStop.x, y: lastStop.y },
      active,
      faded: !active,
    };
  });
  return result;
}

/* ── PERSON DOTS — stable keys, trail effect ── */
function PersonDots({ personStates, prevStates }) {
  const pids = Object.keys(ROUTES);

  const computePos = (states, pid) => {
    const s = states?.[pid];
    if (!s || !s.pos) return null;
    const snapX = Math.round(s.pos.x / 20) * 20;
    const snapY = Math.round(s.pos.y / 20) * 20;
    const siblings = pids.filter(p => {
      const ps = states[p];
      if (!ps || !ps.pos) return false;
      return Math.round(ps.pos.x/20)*20 === snapX && Math.round(ps.pos.y/20)*20 === snapY;
    });
    const myGroupIdx = siblings.indexOf(pid);
    const groupSize  = siblings.length;
    const cols = Math.min(3, groupSize);
    const row = Math.floor(myGroupIdx / cols);
    const col = myGroupIdx % cols;
    const rows = Math.ceil(groupSize / cols);
    const spacing = 30;
    const offsetX = (col - (cols - 1) / 2) * spacing;
    const offsetY = (row - (rows - 1) / 2) * spacing;
    const labelAvoidance = s.pos.y < 300 ? { x: 0, y: 46 } : { x: 0, y: -46 };
    const x = Math.max(70, Math.min(VW - 70, s.pos.x + labelAvoidance.x + offsetX));
    const y = Math.max(120, Math.min(VH - 70, s.pos.y + labelAvoidance.y + offsetY));
    return { x, y };
  };

  return (
    <g>
      {pids.map((pid) => {
        const s = personStates[pid];
        if (!s || !s.pos) return null;
        const cur  = computePos(personStates, pid);
        const prev = computePos(prevStates, pid);
        if (!cur) return null;
        const hasMoved = prev && (Math.abs(prev.x - cur.x) > 8 || Math.abs(prev.y - cur.y) > 8);
        const dotR = s.active ? 14 : 10;
        return (
          <g key={pid} style={{ opacity: s.faded ? 0.22 : 1, transition: 'opacity 0.7s ease' }}>
            {hasMoved && (
              <g>
                <line x1={prev.x} y1={prev.y} x2={cur.x} y2={cur.y}
                  stroke={s.color} strokeWidth="3" strokeLinecap="round"
                  strokeDasharray="5 7" opacity=".28" />
                <circle cx={prev.x} cy={prev.y} r={dotR * 0.55} fill={s.color} opacity=".2" />
                <circle cx={(prev.x*2+cur.x)/3} cy={(prev.y*2+cur.y)/3} r={dotR * 0.38} fill={s.color} opacity=".13" />
                <circle cx={(prev.x+cur.x*2)/3} cy={(prev.y+cur.y*2)/3} r={dotR * 0.25} fill={s.color} opacity=".08" />
              </g>
            )}
            <circle cx={cur.x} cy={cur.y} r={dotR}
              fill={s.color} stroke="var(--map-land)" strokeWidth="2.5"
              style={{ transition: 'cx 0.9s cubic-bezier(0.4,0,0.2,1), cy 0.9s cubic-bezier(0.4,0,0.2,1), r 0.35s' }}
            />
            <text x={cur.x} y={cur.y + 5} textAnchor="middle"
              fontSize={s.active ? 13 : 10} fontWeight="800" fill="white"
              fontFamily="Barlow Condensed" pointerEvents="none"
              style={{ transition: 'x 0.9s cubic-bezier(0.4,0,0.2,1), y 0.9s cubic-bezier(0.4,0,0.2,1)' }}
            >
              {(s.label || '?').charAt(0)}
            </text>
            {s.active && (
              <text className="person-name-label" x={cur.x} y={cur.y + dotR + 16} textAnchor="middle"
                fontSize="12" fontWeight="800" fill={s.color}
                fontFamily="Barlow Condensed" pointerEvents="none"
                style={{ transition: 'x 0.9s cubic-bezier(0.4,0,0.2,1), y 0.9s cubic-bezier(0.4,0,0.2,1)' }}
              >
                {s.label}
              </text>
            )}
          </g>
        );
      })}
    </g>
  );
}

function MapPanel({ activeEventId, onStep, onEventChange }) {
  const ev      = DATA.events.find(e => e.id === activeEventId);
  const locId   = ev?.location_id;
  const states  = useMemo(() => personStateAt(activeEventId), [activeEventId]);
  const loc     = DATA.locations.find(l => l.id === locId);
  const activeIndex = DATA.timeline.findIndex(t => t.event_id === activeEventId);

  // Track previous event's states to show trail
  const prevStatesRef = useRef(null);
  const prevEventRef  = useRef(null);
  const [prevStates, setPrevStates] = useState(null);

  useEffect(() => {
    if (prevEventRef.current !== activeEventId) {
      setPrevStates(prevStatesRef.current);
      prevStatesRef.current = states;
      prevEventRef.current  = activeEventId;
    }
  }, [activeEventId, states]);

  const legendItems = Object.entries(states).filter(([, s]) => s.active);

  return (
    <div className="map-col">
      {/* Event banner */}
      <div className="map-event-banner">
        <div className="ban-verses">{ev?.verses}</div>
        <div className="ban-content">
          <div className="ban-title">{ev?.title}</div>
          <div className="ban-desc">{ev?.description}</div>
        </div>
        {loc && (
          <div className="ban-loc">
            <div className="ban-loc-dot" />
            {loc.name}
          </div>
        )}
      </div>

      {/* Map */}
      <div className="map-svg-wrap">
        <svg className="map-svg" viewBox={`0 0 ${VW} ${VH}`} preserveAspectRatio="xMidYMid meet">
          <Terrain />
          <LocationMarkers activeLocId={locId} />
          <PersonDots personStates={states} prevStates={prevStates} />
        </svg>
      </div>

      <div className="map-controls-panel">
        {/* Person legend */}
        <div className="map-person-legend">
          {legendItems.map(([pid, s]) => (
            <div key={pid} className={`map-leg-item ${s.faded ? 'faded' : ''}`}>
              <div className="map-leg-dot" style={{ background: s.color }} />
              <span>{s.label}</span>
            </div>
          ))}
        </div>

        <div className="map-playback">
          <div className="playback-top">
            <div className="playback-label">{activeIndex + 1}. {ev?.timeline_label || ev?.title}</div>
            <div className="playback-buttons">
              <button className="playback-btn" type="button" aria-label={INITIAL_LANG === 'da' ? 'Forrige begivenhed' : 'Previous event'} onClick={() => onStep(-1)}>‹</button>
              <button className="playback-btn" type="button" aria-label={INITIAL_LANG === 'da' ? 'Næste begivenhed' : 'Next event'} onClick={() => onStep(1)}>›</button>
            </div>
          </div>
          <div className="playback-track" style={{ '--step-count': DATA.timeline.length }}>
            {DATA.timeline.map((tl, idx) => (
              <button
                key={tl.event_id}
                type="button"
                className={`playback-step${idx < activeIndex ? ' done' : ''}${idx === activeIndex ? ' active' : ''}`}
                aria-label={`${INITIAL_LANG === 'da' ? 'Gå til' : 'Go to'} ${tl.label}`}
                onClick={() => onEventChange(tl.event_id)}
              >
                <span className="playback-step-time">{compactTimeLabel(ABSOLUTE_TIMES[tl.event_id]?.date || tl.relative_time, shouldShowYear(tl, idx))}</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="map-corner-label">{UI_TEXT.mapCorner || 'Jerusalem Region · c. AD 30'}</div>
    </div>
  );
}

/* ── TIMELINE PANEL ── */
function TimelinePanel({ activeEventId, onEventChange }) {
  const scrollRef = useRef(null);
  const entryRefs = useRef({});
  const observing = useRef(false);

  // IntersectionObserver: set active event as entries scroll into view
  useEffect(() => {
    const root = scrollRef.current;
    if (!root) return;
    const scores = {};
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { scores[e.target.dataset.eid] = e.intersectionRatio; });
      if (!observing.current) return;
      const best = Object.entries(scores).sort((a,b) => b[1]-a[1])[0];
      if (best && best[1] > 0.15) onEventChange(best[0]);
    }, { root, threshold: [0.1, 0.3, 0.5], rootMargin: '-20% 0px -55% 0px' });

    Object.values(entryRefs.current).forEach(el => el && obs.observe(el));
    return () => obs.disconnect();
  }, [onEventChange]);

  const handleClick = useCallback((eid) => {
    observing.current = false;
    onEventChange(eid);
    const el = entryRefs.current[eid];
    if (el && scrollRef.current) {
      scrollRef.current.scrollTo({ top: el.offsetTop - 30, behavior: 'smooth' });
    }
    setTimeout(() => { observing.current = true; }, 800);
  }, [onEventChange]);

  const handleWheel = useCallback((event) => {
    const root = scrollRef.current;
    if (!root || event.deltaY <= 0) return;
    const nearBottom = root.scrollTop + root.clientHeight >= root.scrollHeight - 8;
    if (nearBottom) window.top.location.href = '/bible/acts/002';
  }, []);

  useEffect(() => {
    const el = entryRefs.current[activeEventId];
    const root = scrollRef.current;
    if (!el || !root) return;
    observing.current = false;
    root.scrollTo({ top: Math.max(0, el.offsetTop - 46), behavior: 'smooth' });
    const timer = setTimeout(() => { observing.current = true; }, 900);
    return () => clearTimeout(timer);
  }, [activeEventId]);

  return (
    <div className="tl-col">
      <div className="tl-chapter-strip">
        <div className="tl-ch-label">{UI_TEXT.shortBook || 'Acts'} · {INITIAL_LANG === 'da' ? 'Kapitel' : 'Chapter'} 1</div>
        <div className="tl-ch-title">{UI_TEXT.timelineTitle ? <>{UI_TEXT.timelineTitle[0]} <em>{UI_TEXT.timelineTitle[1]}</em></> : <>Waiting for <em>the Promise</em></>}</div>
      </div>

      <div className="tl-list" ref={scrollRef} onWheel={handleWheel}>
        <div className="tl-spine">
          {DATA.timeline.map((tl, idx) => {
            const ev = DATA.events.find(e => e.id === tl.event_id);
            if (!ev) return null;
            const active = activeEventId === tl.event_id;
            const timeInfo = ABSOLUTE_TIMES[tl.event_id];
            // Year badges: one before prologue (composition date), one before the AD30 events
            const showYearBadge = idx === 0 || idx === 1;
            const yearLabel = UI_TEXT.yearBadges?.[idx === 0 ? 0 : 1] || (idx === 0 ? 'c. AD 62–80 — Written' : 'Spring AD 30 — Events');
            return (
              <React.Fragment key={tl.event_id}>
                {showYearBadge && (
                  <div className="tl-year-sep">
                    <div className="tl-year-badge">{yearLabel}</div>
                    <div className="tl-year-line" />
                  </div>
                )}
                <div
                  ref={el => entryRefs.current[tl.event_id] = el}
                  data-eid={tl.event_id}
                  data-screen-label={`${idx+1}. ${tl.label}`}
                  className={`tl-item${active ? ' active' : ''}`}
                  onClick={() => handleClick(tl.event_id)}
                >
                  <div className="tl-l">
                    <div className="tl-seq">{String(tl.position).padStart(2,'0')}</div>
                    <div className="tl-dot"><div className="tl-dot-pip" /></div>
                  </div>
                  <div className="tl-r">
                    <div className="tl-date">{timeInfo?.date || ''}</div>
                    <div className="tl-rel-time">{timeInfo?.period || tl.relative_time}</div>
                    <div className="tl-ev-title">{tl.label}</div>
                    <div className="tl-ev-verses">{ev.verses}</div>
                  </div>
                </div>
              </React.Fragment>
            );
          })}
          {/* bottom pad — extra tall so last item can fully scroll into the trigger zone */}
          <div style={{ height: 'calc(100vh - 200px)' }} />
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const firstTimelineEvent = DATA.timeline[0]?.event_id || DATA.events[0]?.id;
  const [activeEv, setActiveEv] = useState(firstTimelineEvent);

  useEffect(() => {
    document.body.className = 'theme-a';
    document.documentElement.lang = INITIAL_LANG;
    document.title = `${DATA.book} ${INITIAL_LANG === 'da' ? 'kapitel' : 'Chapter'} 1 — ${DATA.chapter_title}`;
    localStorage.setItem('bf-theme', 'a');
  }, []);

  const handleEventChange = useCallback(id => setActiveEv(id), []);
  const stepEvent = useCallback((dir) => {
    setActiveEv(prev => {
      const current = DATA.timeline.findIndex(t => t.event_id === prev);
      if (dir > 0 && current === DATA.timeline.length - 1) {
        window.top.location.href = '/bible/acts/002';
        return prev;
      }
      const next = (current + dir + DATA.timeline.length) % DATA.timeline.length;
      return DATA.timeline[next].event_id;
    });
  }, []);

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <span className="hdr-book">{UI_TEXT.shortBook || 'Acts'} · {INITIAL_LANG === 'da' ? 'Kap.' : 'Ch.'} 1</span>
        <span className="hdr-title">{DATA.chapter_title}</span>
        <span className="hdr-sub">{UI_TEXT.headerSub || '— Spring AD 30'}</span>
        <div className="hdr-space" />
        <a className="home-link" href="/bible" target="_top">
          {INITIAL_LANG === 'da' ? 'Hjem' : 'Home'}
        </a>
        <button className="lang-btn" type="button" onClick={() => setLanguage(INITIAL_LANG === 'da' ? 'en' : 'da')}>
          {INITIAL_LANG === 'da' ? 'En' : 'Da'}
        </button>
      </div>

      {/* Body */}
      <div className="body">
        <TimelinePanel activeEventId={activeEv} onEventChange={handleEventChange} />
        <MapPanel
          activeEventId={activeEv}
          onStep={stepEvent}
          onEventChange={handleEventChange}
        />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
