<script>
const ACTS_CH5 = {
  "book": "Acts",
  "chapter": 5,
  "chapter_title": "Judgment, Jailbreak, and the Unstoppable Word",
  "chapter_summary": "Acts 5 opens with the sudden deaths of two members of the early Jerusalem church, Ananias and Sapphira, who lied about a property sale — a sobering sign that the new community is held to absolute integrity before God. The apostles then draw enormous crowds through miraculous healings, prompting the Sadducean authorities to arrest and imprison them, only for an angel to free them overnight with orders to keep preaching. After a second confrontation before the full Sanhedrin, the wise Pharisee Gamaliel persuades the council to release the apostles; flogged but jubilant, they return immediately to daily teaching in the temple and in homes across Jerusalem.",
  "date_range": {
    "approximate": "c. Spring–Summer AD 30 (or AD 33)",
    "notes": "Scholars divide primarily between AD 30 and AD 33 for the crucifixion and Pentecost that launched the Jerusalem church. Acts 5 is set in the weeks or months following that Pentecost."
  },
  "persons": [
    { "id": "ananias", "name": "Ananias", "role": "Believer (Deceased)", "first_mention_verse": "5:1", "summary": "A member of the early Jerusalem church who, with his wife Sapphira, sold a field and secretly withheld part of the proceeds while presenting the rest as the full sale price. When Peter confronted him about lying to the Holy Spirit rather than to human beings, Ananias fell dead on the spot.", "significance": "His death establishes a sharp boundary for the new community: deception of God within the church is treated with the same gravity as pagan sacrilege." },
    { "id": "sapphira", "name": "Sapphira", "role": "Believer (Deceased)", "first_mention_verse": "5:1", "summary": "The wife of Ananias and a willing co-conspirator in the deception; she was fully aware of the price withheld. Arriving about three hours after her husband's death and unaware of what had happened, she confirmed the lie to Peter under direct questioning and likewise fell dead at his feet.", "significance": "Her separate condemnation establishes that she bore independent moral responsibility." },
    { "id": "peter", "name": "Peter", "role": "Apostle", "first_mention_verse": "5:3", "summary": "The leading apostle of the Jerusalem church, who confronts both Ananias and Sapphira with apparent prophetic insight, and who later defends the apostolic mission before the Sanhedrin with the declaration 'We must obey God rather than men.'", "significance": "Peter is the dominant human figure in the first half of Acts, embodying apostolic authority, prophetic discernment, and fearless proclamation." },
    { "id": "john", "name": "John", "role": "Apostle", "first_mention_verse": "5:29", "summary": "One of Jesus' inner circle and Peter's consistent ministry partner throughout Acts 1–8. Though John speaks no individual words in this chapter, he is included among the apostles arrested, miraculously freed, brought before the Sanhedrin, and flogged.", "significance": "John's consistent presence alongside Peter reinforces the collegial and communal nature of apostolic leadership in Acts." },
    { "id": "the_apostles", "name": "The Apostles", "role": "Group — Apostles", "first_mention_verse": "5:12", "summary": "The collective body of Jesus' commissioned witnesses who operate together in Solomon's Portico performing signs and wonders, endure arrest and imprisonment as a unit, and leave the Sanhedrin rejoicing that they were 'counted worthy to suffer dishonor for the name.'", "significance": "As a group the apostles model Spirit-empowered communal witness under persecution." },
    { "id": "high_priest", "name": "The High Priest", "role": "Jewish Religious Authority", "first_mention_verse": "5:17", "summary": "The unnamed head of the Jerusalem priesthood — almost certainly Caiaphas — who leads the Sadducean opposition against the apostles out of jealousy at their popular influence, orders their arrest, presides over the Sanhedrin hearing, and ultimately approves their flogging.", "significance": "The high priest represents the established religious order that perceives the apostolic movement as both a theological challenge and a political threat." },
    { "id": "sadducees", "name": "The Sadducees", "role": "Group — Jewish Religious Party", "first_mention_verse": "5:17", "summary": "The priestly aristocratic party aligned with the high priest who are described as 'filled with jealousy' at the apostles' popularity. They are the driving force behind the arrests.", "significance": "The Sadducees' opposition introduces the recurring dynamic in Acts where the resurrection of Jesus serves simultaneously as the gospel's core claim and the precise point of maximum institutional resistance." },
    { "id": "angel_of_the_lord", "name": "An Angel of the Lord", "role": "Heavenly Messenger", "first_mention_verse": "5:19", "summary": "A divine messenger who appears at night, opens the locked prison doors, leads the apostles out, and commands them to return to the temple to speak 'all the words of this Life.'", "significance": "The angelic jailbreak signals divine endorsement of the apostolic mission and establishes a pattern repeated later in Acts." },
    { "id": "gamaliel", "name": "Gamaliel", "role": "Pharisee / Teacher of the Law", "first_mention_verse": "5:34", "summary": "A widely respected Pharisee, member of the Sanhedrin, and legal scholar who intervenes to prevent the apostles' execution by arguing that human opposition to a divine movement is futile.", "significance": "Gamaliel's counsel saves the apostles' lives and introduces a principle of theological caution. Acts 22:3 later reveals that Saul of Tarsus — who would become Paul — was one of Gamaliel's own students." },
    { "id": "captain_of_the_temple", "name": "The Captain of the Temple Guard", "role": "Temple Security Official", "first_mention_verse": "5:24", "summary": "The commander of the Levitical police force responsible for order on the Temple Mount, who is deeply perplexed when the prison is found empty, and who subsequently retrieves the apostles from the temple — carefully, without force, because he fears the crowd might stone his officers.", "significance": "His cautious approach illustrates that the apostles' popular support among ordinary Jerusalemites already constrains the authorities' power over them." },
    { "id": "young_men", "name": "The Young Men", "role": "Group — Church Members", "first_mention_verse": "5:6", "summary": "Unnamed members of the Jerusalem community who wrap Ananias's body immediately after his death and carry him out for burial; a separate group returns three hours later to do the same for Sapphira.", "significance": "Their prompt, organized action indicates that the early church already had informal roles and communal practices for handling the dead." }
  ],
  "locations": [
    { "id": "jerusalem", "name": "Jerusalem", "modern_name": "Jerusalem, Israel", "lat": 31.7767, "lng": 35.2345, "description": "The holy city and capital of Judea, seat of the early church and the setting for every event in Acts 5." },
    { "id": "solomons_colonnade", "name": "Solomon's Portico", "modern_name": "Eastern wall of Temple Mount, Jerusalem", "lat": 31.7781, "lng": 35.2363, "description": "A long roofed colonnade running along the eastern edge of the Temple's outer court, used by the apostles as their regular public gathering place." },
    { "id": "temple", "name": "The Temple", "modern_name": "Temple Mount, Jerusalem", "lat": 31.7782, "lng": 35.2354, "description": "Herod's great sanctuary complex at the heart of Jerusalem, where the apostles continued to teach at daybreak after their angelic release from prison." },
    { "id": "public_prison", "name": "The Public Prison", "modern_name": "Unknown (Jerusalem area)", "lat": 31.7773, "lng": 35.2337, "description": "The common civic jail of Jerusalem where the apostles were held overnight after their arrest by the Sadducees, from which an angel freed them by opening locked doors." },
    { "id": "council_chamber", "name": "The Council (Sanhedrin)", "modern_name": "Unknown (traditionally near Temple Mount, Jerusalem)", "lat": 31.7776, "lng": 35.2341, "description": "The meeting place of the Sanhedrin where the apostles were interrogated twice, heard Gamaliel's pivotal defense speech, and were flogged before being released." }
  ],
  "events": [
    { "id": "ananias_deception_and_death", "sequence": 1, "verses": "5:1-6", "title": "Ananias Lies and Dies", "description": "Ananias and his wife Sapphira sell a piece of property and bring part of the proceeds to the apostles, secretly pretending the partial payment represents the full sale price. Peter confronts Ananias directly, making clear that the sin is not keeping money — which was his right — but lying about it to the Holy Spirit, and therefore to God. The moment Peter finishes speaking, Ananias collapses and dies. Young men from the congregation wrap his body, carry him out, and bury him.", "location_id": "jerusalem", "persons_present": ["ananias", "peter", "the_apostles", "young_men"], "timeline_label": "Day 1 — Morning", "scroll_anchor": "ananias-deception-and-death" },
    { "id": "sapphira_deception_and_death", "sequence": 2, "verses": "5:7-11", "title": "Sapphira Confirms the Lie and Dies", "description": "About three hours after her husband's death, Sapphira arrives at the gathering with no knowledge of what has happened. Peter tests her with a single question: 'Is this the price you and Ananias received for the land?' She confirms the deception without hesitation. Peter announces that the same men who buried her husband are at the door and will carry her out as well. Immediately she falls at his feet and dies. Great fear sweeps over the whole church and everyone who hears the story.", "location_id": "jerusalem", "persons_present": ["sapphira", "peter", "the_apostles", "young_men"], "timeline_label": "Day 1 — ~3 hours later", "scroll_anchor": "sapphira-deception-and-death" },
    { "id": "signs_wonders_at_colonnade", "sequence": 3, "verses": "5:12-16", "title": "Mass Healings at Solomon's Portico", "description": "The apostles gather regularly in Solomon's Portico where they perform many signs and wonders. Their reputation grows so extraordinary that people carry the sick into the surrounding streets on cots and sleeping mats, hoping that even Peter's shadow might fall on them as he passes by. Crowds stream in from towns around Jerusalem, bringing those with diseases and those tormented by unclean spirits. The text states plainly that all of them are healed.", "location_id": "solomons_colonnade", "persons_present": ["peter", "john", "the_apostles"], "timeline_label": "Days following — ongoing ministry", "scroll_anchor": "signs-wonders-at-colonnade" },
    { "id": "apostles_arrested", "sequence": 4, "verses": "5:17-18", "title": "The Apostles Are Arrested", "description": "The high priest and his Sadducean allies, consumed with jealousy at the apostles' explosive popular influence, decide to act. They arrest the entire group of apostles and have them thrown into the public prison. No specific legal charge is recorded in the text — the apostles' growing influence and their proclamation of resurrection are sufficient to motivate the crackdown.", "location_id": "public_prison", "persons_present": ["high_priest", "sadducees", "captain_of_the_temple", "the_apostles", "peter", "john"], "timeline_label": "A subsequent day — arrest", "scroll_anchor": "apostles-arrested" },
    { "id": "angel_frees_apostles", "sequence": 5, "verses": "5:19-20", "title": "An Angel Opens the Prison", "description": "During the night, an angel of the Lord appears at the prison, opens the locked doors, and leads the apostles out. The angel's instruction is striking for what it does not say: it does not tell them to flee or hide. Instead it commands them to return to the temple and 'speak to the people all the words of this Life' — resuming the very activity that caused their arrest. The guards remain at their posts, the doors stay apparently locked, and no alarm is raised.", "location_id": "public_prison", "persons_present": ["angel_of_the_lord", "the_apostles", "peter", "john"], "timeline_label": "That night — miraculous release", "scroll_anchor": "angel-frees-apostles" },
    { "id": "apostles_teach_at_dawn", "sequence": 6, "verses": "5:21", "title": "Back in the Temple at Daybreak", "description": "Obeying the angel's command without delay, the apostles enter the temple at first light and begin to teach. This single verse is brief but dramatic: the same men who were in prison hours earlier are now publicly instructing crowds in the most prominent religious site in Jerusalem, before the authorities have even assembled. Their immediate obedience underscores the mission's absolute priority over personal safety.", "location_id": "temple", "persons_present": ["the_apostles", "peter", "john"], "timeline_label": "Next morning — dawn teaching", "scroll_anchor": "apostles-teach-at-dawn" },
    { "id": "sanhedrin_assembles_finds_prison_empty", "sequence": 7, "verses": "5:21-25", "title": "Empty Cells, Baffled Rulers", "description": "The high priest convenes the full Sanhedrin and sends officers to the prison to bring the apostles for formal trial. The officers return empty-handed and baffled: the prison is securely locked, the guards are at their posts, but the cells are completely empty. Then a messenger arrives: 'The men you put in prison are standing in the temple and teaching the people.' The council's impotence in the face of a divinely protected mission is exposed in the most concrete possible terms.", "location_id": "council_chamber", "persons_present": ["high_priest", "sadducees", "captain_of_the_temple"], "timeline_label": "Next morning — council convenes", "scroll_anchor": "sanhedrin-assembles-finds-prison-empty" },
    { "id": "apostles_brought_before_sanhedrin", "sequence": 8, "verses": "5:26-32", "title": "Apostles Before the Council", "description": "The captain goes to the temple and brings the apostles back without using force — he fears the crowd might stone his officers. Before the council, the high priest rebukes the apostles for defying the earlier prohibition on teaching in Jesus' name. Peter responds for all of them: 'We must obey God rather than men.' He then delivers a compressed proclamation — Jesus was killed by human hands, raised by God, exalted as Leader and Savior, and now offers repentance and forgiveness to Israel through the Holy Spirit.", "location_id": "council_chamber", "persons_present": ["the_apostles", "peter", "john", "high_priest", "sadducees", "captain_of_the_temple"], "timeline_label": "Morning — trial before Sanhedrin", "scroll_anchor": "apostles-brought-before-sanhedrin" },
    { "id": "gamaliel_counsel", "sequence": 9, "verses": "5:33-39", "title": "Gamaliel's Wise Warning", "description": "The council is furious enough to order the apostles killed. But Gamaliel — a Pharisee, respected legal scholar, and member of the Sanhedrin — has the apostles temporarily removed and delivers a careful argument. He cites two recent examples of messianic movements that collapsed after their founders died: Theudas and Judas the Galilean. The logic: if this movement is merely human, it will collapse on its own. But if it is from God, the council cannot stop it without 'fighting against God.' The council is persuaded.", "location_id": "council_chamber", "persons_present": ["gamaliel", "high_priest", "sadducees"], "timeline_label": "Morning — Gamaliel intervenes", "scroll_anchor": "gamaliel-counsel" },
    { "id": "apostles_flogged_and_released", "sequence": 10, "verses": "5:40-42", "title": "Flogged but Fearless", "description": "Following Gamaliel's counsel, the council calls the apostles back in, has them flogged — the painful punishment of thirty-nine lashes — renews the prohibition on speaking in Jesus' name, and releases them. Rather than leaving in humiliation or defeat, the apostles depart rejoicing that they were 'counted worthy to suffer dishonor for the name.' Every single day, in the temple courts and from house to house, they continue teaching and proclaiming Jesus as the Messiah.", "location_id": "council_chamber", "persons_present": ["the_apostles", "peter", "john", "high_priest", "sadducees"], "timeline_label": "Morning — released; daily preaching resumes", "scroll_anchor": "apostles-flogged-and-released" }
  ],

    { "person_id": "gamaliel", "path": [
      { "order": 1, "location_id": "council_chamber", "event_id": "gamaliel_counsel" }

  ],
  "timeline": [
    { "event_id": "ananias_deception_and_death", "position": 1, "label": "Ananias Dies", "relative_time": "Day 1 — Morning", "absolute_time": "c. Spring–Summer AD 30 (or AD 33)" },
    { "event_id": "sapphira_deception_and_death", "position": 2, "label": "Sapphira Dies", "relative_time": "Day 1 — ~3 hours later", "absolute_time": "c. Spring–Summer AD 30 (or AD 33)" },
    { "event_id": "signs_wonders_at_colonnade", "position": 3, "label": "Mass Healings at the Temple", "relative_time": "Days following — ongoing", "absolute_time": "c. Spring–Summer AD 30 (or AD 33)" },
    { "event_id": "apostles_arrested", "position": 4, "label": "Apostles Imprisoned", "relative_time": "A subsequent day", "absolute_time": "c. Spring–Summer AD 30 (or AD 33)" },

    { "event_id": "sanhedrin_assembles_finds_prison_empty", "position": 7, "label": "Council Finds Empty Prison", "relative_time": "Next morning — shortly after dawn", "absolute_time": "c. Spring–Summer AD 30 (or AD 33)" },
    { "event_id": "apostles_brought_before_sanhedrin", "position": 8, "label": "Trial Before the Sanhedrin", "relative_time": "Next morning — mid-morning", "absolute_time": "c. Spring–Summer AD 30 (or AD 33)" },

function localizeChapter(base, lang) {
  const t = CHAPTER_TEXT[lang];
  if (!t) return base;
  return {
    ...base,
    book: t.book,
    chapter_title: t.chapterTitle,
    persons: base.persons.map(p => ({ ...p, name: t.persons[p.id] || p.name })),
    locations: base.locations.map(l => ({ ...l, ...(t.locations[l.id] || {}) })),
    events: base.events.map(e => ({ ...e, ...(t.events[e.id] || {}) })),
    routes: base.routes.map(r => ({ ...r, label: t.persons[r.person_id] || r.label })),
    timeline: base.timeline.map(tl => ({ ...tl, ...(t.timeline[tl.event_id] || {}) }))
  };
}

const DATA = localizeChapter(ACTS_CH5, INITIAL_LANG);

  const match = value.match(/AD\s*\d+(?:[–-]\d+)?/) || value.match(/år\s*\d+(?:[–-]\d+)?/);
  return match ? match[0].trim() : '';
}
function compactTimeLabel(value = '', includeYear = false) {
  const marker = yearMarker(value);
  const shortLabel = value
    .replace(/^c\.\s*/, '').replace(/Late /, '').replace(/sidst i /, '')
    .replace(/,?\s*AD\s*\d+(?:[–-]\d+)?\b/g, '').replace(/\s*år\s*\d+(?:[–-]\d+)?\b/g, '').trim();
  return includeYear && marker ? `${marker} ${shortLabel}`.trim() : (shortLabel || marker);
}
function shouldShowYear(tl, idx) {
  const current = yearMarker(ABSOLUTE_TIMES[tl.event_id]?.date || tl.relative_time);
  if (!current) return false;
  const previous = DATA.timeline[idx - 1];
  if (!previous) return true;
  return current !== yearMarker(ABSOLUTE_TIMES[previous.event_id]?.date || previous.relative_time);
}

function dotTimeLabel(tl, idx) {
  const base = (tl.relative_time || '').replace(/\s*[—–]\s.*$/, '').trim();
  const marker = shouldShowYear(tl, idx) ? yearMarker(ABSOLUTE_TIMES[tl.event_id]?.date || '') : '';
  return marker ? `${marker} ${base}`.trim() : base;

const PCOLORS = {
  peter: '#5B8FA8', john: '#A09070', the_apostles: '#6B9B7E',

};

const ABSOLUTE_TIMES = Object.fromEntries(
  DATA.timeline.map(t => [t.event_id, { date: t.absolute_time || '', period: t.relative_time || '' }])
);

function buildRoutes() {
  const out = {};
  DATA.routes.forEach(r => {
    const person = DATA.persons.find(p => p.id === r.person_id);
    out[r.person_id] = {
      color: PCOLORS[r.person_id] || '#888',
      label: r.label || person?.name || r.person_id,
      stops: r.path.map(s => ({ ...s, ...(LOCS[s.location_id] || { x: 360, y: 360 }) })),
    };
  });
  DATA.persons.forEach(person => {
    if (out[person.id]) return;
    const stops = DATA.events
      .filter(ev => ev.location_id && ev.persons_present?.includes(person.id))
      .map((ev, idx) => ({ order: idx + 1, location_id: ev.location_id, event_id: ev.id, ...(LOCS[ev.location_id] || { x: 360, y: 360 }) }));

    out[person.id] = { color: PCOLORS[person.id] || '#888', label: person.name, stops };
  });
  return out;
}
const ROUTES = buildRoutes();

function personStateAt(eventId) {
  const evIdx = DATA.events.findIndex(e => e.id === eventId);
  const ev    = DATA.events[evIdx];
  const result = {};
  Object.entries(ROUTES).forEach(([pid, route]) => {
    let lastStop = null;
    route.stops.forEach(stop => {
      const si = DATA.events.findIndex(e => e.id === stop.event_id);
      if (si <= evIdx) lastStop = stop;
    });
    if (!lastStop) return;
    const active = ev?.persons_present?.includes(pid) ?? false;
    result[pid] = { color: route.color, label: route.label, pos: { x: lastStop.x, y: lastStop.y }, active, faded: !active };
  });
  return result;
}

function RouteLines() { return null; }

function LocationMarkers({ activeLocId }) {
  return (
    <g>
      {Object.entries(LOCS).map(([id, loc]) => {
        const on = id === activeLocId;
        return (
          <g key={id}>
            {on && <circle cx={loc.x} cy={loc.y} r="36" fill="var(--accent)" opacity=".09" />}
            {on && <circle cx={loc.x} cy={loc.y} r="22" fill="var(--accent)" opacity=".07" />}
            <circle cx={loc.x} cy={loc.y} r={on ? 10 : 7} fill={on ? 'var(--accent)' : 'var(--fg-muted)'} stroke="var(--map-land)" strokeWidth="3" style={{ transition: 'r .3s' }} />
            <text className="loc-label" x={loc.x + 16} y={loc.y + 5} fontSize={on ? 17 : 14} fontFamily="Barlow Condensed" fontWeight={on ? '800' : '600'} fill={on ? 'var(--fg)' : 'var(--fg-muted)'} letterSpacing=".5" style={{ transition: 'font-size .3s' }}>{loc.label}</text>
          </g>
        );
      })}
    </g>
  );
}

function PersonDots({ personStates, prevStates }) {
  const pids = Object.keys(ROUTES);
  const computePos = (states, pid) => {
    const s = states?.[pid];
    if (!s || !s.pos) return null;
    const snapX = Math.round(s.pos.x / 20) * 20;
    const snapY = Math.round(s.pos.y / 20) * 20;
    const siblings = pids.filter(p => {
      const ps = states[p];
      if (!ps || !ps.pos) return false;
      return Math.round(ps.pos.x/20)*20 === snapX && Math.round(ps.pos.y/20)*20 === snapY;
    });
    const myGroupIdx = siblings.indexOf(pid);
    const groupSize  = siblings.length;
    const cols = Math.min(3, groupSize);
    const row = Math.floor(myGroupIdx / cols);
    const col = myGroupIdx % cols;
    const rows = Math.ceil(groupSize / cols);
    const spacing = 30;
    const offsetX = (col - (cols - 1) / 2) * spacing;
    const offsetY = (row - (rows - 1) / 2) * spacing;
    const labelAvoidance = s.pos.y < 300 ? { x: 0, y: 46 } : { x: 0, y: -46 };
    const x = Math.max(70, Math.min(VW - 70, s.pos.x + labelAvoidance.x + offsetX));
    const y = Math.max(120, Math.min(VH - 70, s.pos.y + labelAvoidance.y + offsetY));
    return { x, y };
  };
  return (
    <g>
      {pids.map((pid) => {
        const s = personStates[pid];
        if (!s || !s.pos) return null;
        const cur  = computePos(personStates, pid);
        const prev = computePos(prevStates, pid);
        if (!cur) return null;
        const hasMoved = prev && (Math.abs(prev.x - cur.x) > 8 || Math.abs(prev.y - cur.y) > 8);
        const dotR = s.active ? 14 : 10;
        return (
          <g key={pid} style={{ opacity: s.faded ? 0.22 : 1, transition: 'opacity 0.7s ease' }}>
            {hasMoved && (
              <g>
                <line x1={prev.x} y1={prev.y} x2={cur.x} y2={cur.y} stroke={s.color} strokeWidth="3" strokeLinecap="round" strokeDasharray="5 7" opacity=".28" />
                <circle cx={prev.x} cy={prev.y} r={dotR * 0.55} fill={s.color} opacity=".2" />
                <circle cx={(prev.x*2+cur.x)/3} cy={(prev.y*2+cur.y)/3} r={dotR * 0.38} fill={s.color} opacity=".13" />
                <circle cx={(prev.x+cur.x*2)/3} cy={(prev.y+cur.y*2)/3} r={dotR * 0.25} fill={s.color} opacity=".08" />
              </g>
            )}
            <circle cx={cur.x} cy={cur.y} r={dotR} fill={s.color} stroke="var(--map-land)" strokeWidth="2.5" style={{ transition: 'cx 0.9s cubic-bezier(0.4,0,0.2,1), cy 0.9s cubic-bezier(0.4,0,0.2,1), r 0.35s' }} />
            <text x={cur.x} y={cur.y + 5} textAnchor="middle" fontSize={s.active ? 13 : 10} fontWeight="800" fill="white" fontFamily="Barlow Condensed" pointerEvents="none" style={{ transition: 'x 0.9s cubic-bezier(0.4,0,0.2,1), y 0.9s cubic-bezier(0.4,0,0.2,1)' }}>{(s.label || '?').charAt(0)}</text>
            {s.active && (
              <text className="person-name-label" x={cur.x} y={cur.y + dotR + 16} textAnchor="middle" fontSize="12" fontWeight="800" fill={s.color} fontFamily="Barlow Condensed" pointerEvents="none" style={{ transition: 'x 0.9s cubic-bezier(0.4,0,0.2,1), y 0.9s cubic-bezier(0.4,0,0.2,1)' }}>{s.label}</text>
            )}
          </g>
        );
      })}
    </g>
  );
}

function MapPanel({ activeEventId, onStep, onEventChange }) {
  const ev      = DATA.events.find(e => e.id === activeEventId);
  const locId   = ev?.location_id;
  const states  = useMemo(() => personStateAt(activeEventId), [activeEventId]);
  const loc     = DATA.locations.find(l => l.id === locId);
  const activeIndex = DATA.timeline.findIndex(t => t.event_id === activeEventId);
  const prevStatesRef = useRef(null);
  const prevEventRef  = useRef(null);
  const [prevStates, setPrevStates] = useState(null);
  useEffect(() => {
    if (prevEventRef.current !== activeEventId) {
      setPrevStates(prevStatesRef.current);
      prevStatesRef.current = states;
      prevEventRef.current  = activeEventId;
    }
  }, [activeEventId, states]);
  const legendItems = Object.entries(states).filter(([, s]) => s.active);
  return (
    <div className="map-col">
      <div className="map-event-banner">
        <div className="ban-verses">{ev?.verses}</div>
        <div className="ban-content">
          <div className="ban-title">{ev?.title}</div>
          <div className="ban-desc">{ev?.description}</div>
        </div>
        {loc && <div className="ban-loc"><div className="ban-loc-dot" />{loc.name}</div>}
      </div>
      <div className="map-svg-wrap">
        <svg className="map-svg" viewBox={`0 0 ${VW} ${VH}`} preserveAspectRatio="xMidYMid meet">
          <Terrain />
          <LocationMarkers activeLocId={locId} />
          <PersonDots personStates={states} prevStates={prevStates} />
        </svg>
      </div>
      <div className="map-controls-panel">
        <div className="map-person-legend">
          {legendItems.map(([pid, s]) => (
            <div key={pid} className={`map-leg-item ${s.faded ? 'faded' : ''}`}>
              <div className="map-leg-dot" style={{ background: s.color }} />
              <span>{s.label}</span>
            </div>
          ))}
        </div>
        <div className="map-playback">
          <div className="playback-top">
            <div className="playback-label">{activeIndex + 1}. {ev?.timeline_label || ev?.title}</div>
            <div className="playback-buttons">
              <button className="playback-btn" type="button" aria-label={INITIAL_LANG === 'da' ? 'Forrige begivenhed' : 'Previous event'} onClick={() => onStep(-1)}>‹</button>
              <button className="playback-btn" type="button" aria-label={INITIAL_LANG === 'da' ? 'Næste begivenhed' : 'Next event'} onClick={() => onStep(1)}>›</button>
            </div>
          </div>
          <div className="playback-track" style={{ '--step-count': DATA.timeline.length }}>
            {DATA.timeline.map((tl, idx) => (
              <button key={tl.event_id} type="button"
                className={`playback-step${idx < activeIndex ? ' done' : ''}${idx === activeIndex ? ' active' : ''}`}
                aria-label={`${INITIAL_LANG === 'da' ? 'Gå til' : 'Go to'} ${tl.label}`}
                onClick={() => onEventChange(tl.event_id)}>
                <span className="playback-step-time">{dotTimeLabel(tl, idx)}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="map-corner-label">{UI_TEXT.mapCorner || 'Jerusalem · Temple Area'}</div>
    </div>
  );
}

function TimelinePanel({ activeEventId, onEventChange }) {
  const scrollRef = useRef(null);
  const entryRefs = useRef({});
  const observing = useRef(false);
  useEffect(() => {
    const root = scrollRef.current;
    if (!root) return;
    const scores = {};
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { scores[e.target.dataset.eid] = e.intersectionRatio; });
      if (!observing.current) return;
      const best = Object.entries(scores).sort((a,b) => b[1]-a[1])[0];
      if (best && best[1] > 0.15) onEventChange(best[0]);
    }, { root, threshold: [0.1, 0.3, 0.5], rootMargin: '-20% 0px -55% 0px' });
    Object.values(entryRefs.current).forEach(el => el && obs.observe(el));
    return () => obs.disconnect();
  }, [onEventChange]);
  const handleClick = useCallback((eid) => {
    observing.current = false;
    onEventChange(eid);
    const el = entryRefs.current[eid];
    if (el && scrollRef.current) scrollRef.current.scrollTo({ top: el.offsetTop - 30, behavior: 'smooth' });
    setTimeout(() => { observing.current = true; }, 800);
  }, [onEventChange]);
  useEffect(() => {
    const el = entryRefs.current[activeEventId];
    const root = scrollRef.current;
    if (!el || !root) return;
    observing.current = false;
    root.scrollTo({ top: Math.max(0, el.offsetTop - 46), behavior: 'smooth' });
    const timer = setTimeout(() => { observing.current = true; }, 900);
    return () => clearTimeout(timer);
  }, [activeEventId]);

  const BADGE_POSITIONS = { 0: 0, 3: 1, 5: 2 };
  const DEFAULT_BADGES = ['Day 1 — Judgment in the Community', 'Arrest and Angelic Release', 'Morning Trial'];

  return (
    <div className="tl-col">
      <div className="tl-chapter-strip">
        <div className="tl-ch-label">{UI_TEXT.shortBook || 'Acts'} · {INITIAL_LANG === 'da' ? 'Kapitel' : 'Chapter'} {DATA.chapter}</div>
        <div className="tl-ch-title">{UI_TEXT.timelineTitle ? <>{UI_TEXT.timelineTitle[0]} <em>{UI_TEXT.timelineTitle[1]}</em></> : <>Judgment, Jailbreak, <em>Unstoppable Word</em></>}</div>
      </div>
      <div className="tl-list" ref={scrollRef}>
        <div className="tl-spine">
          {DATA.timeline.map((tl, idx) => {
            const ev = DATA.events.find(e => e.id === tl.event_id);
            if (!ev) return null;
            const active = activeEventId === tl.event_id;
            const timeInfo = ABSOLUTE_TIMES[tl.event_id];
            const showYearBadge = idx in BADGE_POSITIONS;
            const yearLabel = showYearBadge
              ? (UI_TEXT.yearBadges?.[BADGE_POSITIONS[idx]] ?? DEFAULT_BADGES[BADGE_POSITIONS[idx]])
              : '';
            return (
              <React.Fragment key={tl.event_id}>
                {showYearBadge && (
                  <div className="tl-year-sep">
                    <div className="tl-year-badge">{yearLabel}</div>
                    <div className="tl-year-line" />
                  </div>
                )}
                <div ref={el => entryRefs.current[tl.event_id] = el} data-eid={tl.event_id}
                  data-screen-label={`${idx+1}. ${tl.label}`}
                  className={`tl-item${active ? ' active' : ''}`}
                  onClick={() => handleClick(tl.event_id)}>
                  <div className="tl-l">
                    <div className="tl-seq">{String(tl.position).padStart(2,'0')}</div>
                    <div className="tl-dot"><div className="tl-dot-pip" /></div>
                  </div>
                  <div className="tl-r">
                    <div className="tl-date">{timeInfo?.date || ''}</div>
                    <div className="tl-rel-time">{timeInfo?.period || tl.relative_time}</div>
                    <div className="tl-ev-title">{tl.label}</div>
                    <div className="tl-ev-verses">{ev.verses}</div>
                  </div>
                </div>
              </React.Fragment>
            );
          })}
          <div style={{ height: 'calc(100vh - 200px)' }} />
        </div>
      </div>
    </div>
  );
}

function App() {
  const firstTimelineEvent = DATA.timeline[0]?.event_id || DATA.events[0]?.id;
  const [activeEv, setActiveEv] = useState(firstTimelineEvent);
  useEffect(() => {
    document.body.className = 'theme-a';
    document.documentElement.lang = INITIAL_LANG;
    document.title = `${DATA.book} ${INITIAL_LANG === 'da' ? 'kapitel' : 'Chapter'} ${DATA.chapter} — ${DATA.chapter_title}`;
    localStorage.setItem('bf-theme', 'a');
  }, []);
  const handleEventChange = useCallback(id => setActiveEv(id), []);
  const stepEvent = useCallback((dir) => {
    setActiveEv(prev => {
      const current = DATA.timeline.findIndex(t => t.event_id === prev);
      if (dir < 0 && current === 0) {
        window.top.location.href = '/bible/acts/004';
        return prev;
      }
      const next = (current + dir + DATA.timeline.length) % DATA.timeline.length;
      return DATA.timeline[next].event_id;
    });
  }, []);
  return (
    <div className="app">
      <div className="header">
        <span className="hdr-book">{UI_TEXT.shortBook || 'Acts'} · {INITIAL_LANG === 'da' ? 'Kap.' : 'Ch.'} {DATA.chapter}</span>
        <span className="hdr-title">{DATA.chapter_title}</span>
        <span className="hdr-sub">{UI_TEXT.headerSub || '— Jerusalem · AD 30'}</span>
        <div className="hdr-space" />
        <a className="home-link" href="/bible" target="_top">{INITIAL_LANG === 'da' ? 'Hjem' : 'Home'}</a>
        <button className="lang-btn" type="button" onClick={() => setLanguage(INITIAL_LANG === 'da' ? 'en' : 'da')}>{INITIAL_LANG === 'da' ? 'En' : 'Da'}</button>
      </div>
      <div className="body">
        <TimelinePanel activeEventId={activeEv} onEventChange={handleEventChange} />
        <MapPanel activeEventId={activeEv} onStep={stepEvent} onEventChange={handleEventChange} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
